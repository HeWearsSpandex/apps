<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Face Marker on Google Maps</title>

  <script>
    let resolveMapsReady;
    window.mapsReadyPromise = new Promise(res => { resolveMapsReady = res; });
    window.onMapsReady = () => resolveMapsReady();
  </script>

  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA23ORAayerNpeDh8WhQkwsv0ZNAon41FI&libraries=geometry&callback=onMapsReady"></script>

  <style>
    html, body { margin:0; padding:0; height:100%; }
    #map { position:absolute; top:0; left:0; right:0; bottom:0; }

    #leaderboard {
      position: absolute;
      top: 10px; right: 10px; bottom: 10px;
      width: 300px;
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 1002;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    #leaderboard .logo { text-align: center; margin-bottom: 8px; }
    #leaderboard .logo img { max-width: 120px; height: auto; }
    #leaderboard h2 { text-align: center; margin: 4px 0 12px; font-size: 16px; }
    #leaderboard .header-row {
      display: flex; font-weight: bold;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px; margin-bottom: 8px;
    }
    .col-rank { width: 30px; text-align: center; flex-shrink: 0; }
    .col-face { width: 42px; margin: 0 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .col-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .static-section { flex-shrink: 0; }
    .scrollable-section { flex-grow: 1; overflow: hidden; position: relative; }
    .scrollable-inner {
      height: 100%; overflow-y: auto;
      scrollbar-width: none; -ms-overflow-style: none;
      padding-right: 4px;
    }
    .scrollable-inner::-webkit-scrollbar { display: none; }
    #static-rank1, #other-ranks {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 4px;
    }
    #static-rank1 li, #other-ranks li {
      display: flex; align-items: center; min-height: 42px;
    }
    img.face { border-radius: 50%; }

    .spinner-wrap {
      display: flex; justify-content: center;
      align-items: center; padding: 20px 0;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #f4f4f4;
      border-top-color: #c00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #map-spinner {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.7);
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #map-spinner .spinner { width: 64px; height: 64px; border-width: 6px; }
  </style>
</head>
<body>

  <div id="map-spinner"><div class="spinner"></div></div>

  <div id="leaderboard">
    <div class="logo"><img src="/img/JHB%20Logo.png" alt="Logo"></div>
    <h2>Bonus Metres Leaderboard</h2>
    <div class="header-row">
      <span class="col-rank">#</span>
      <span class="col-face"></span>
      <span class="col-name">Name</span>
    </div>
    <div class="static-section"><ul id="static-rank1"></ul></div>
    <div class="scrollable-section">
      <div class="scrollable-inner" id="scroll-container">
        <div class="spinner-wrap" id="leaderboard-spinner"><div class="spinner"></div></div>
        <ul id="other-ranks"></ul>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://oxgehlmalbvppjmdaswn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_43D7ggkEiM_OpKpakPVxSQ_uHN35QbN';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const IMG_PATH = '/img/';
    const CSV_URL  = '/bonus-metres/data/actual_distances.csv';
    const HQ       = { lat: 50.43135, lng: -3.797092 };
    const ROUTE_URL = '/bonus-metres/data/route.json';

    async function fetchPeople() {
      const today = new Date().toISOString().split('T')[0];
      const { data, error } = await sb
        .from('employees')
        .select('full_name, status, leaving_date')
        .or(`status.eq.active,status.eq.probation,and(status.eq.inactive,leaving_date.gte.${today})`);
      if (error) throw new Error('Failed to load employees: ' + error.message);
      return data.map(e => e.full_name);
    }

    const csvPromise      = fetchActualMeters();
    const mapsReadyPromise = window.mapsReadyPromise;

    async function fetchActualMeters() {
      const res = await fetch(CSV_URL, { cache: 'no-cache' });
      if (!res.ok) throw new Error('CSV load failed: ' + res.status);
      const lines = (await res.text()).trim().split(/\r?\n/);
      const keys = lines.shift().split(',').map(h => h.trim());
      const data = {};
      lines.forEach(line => {
        const cols = line.split(',');
        const row  = keys.reduce((o, k, i) => (o[k] = (cols[i] || '').trim(), o), {});
        data[row['NAME']] = parseFloat((row['TOTAL METERS'] || '0').replace(/,/g, '')) || 0;
      });
      return data;
    }

    async function loadImage(src) {
      return new Promise(res => {
        const img = new Image(); img.crossOrigin = 'anonymous';
        img.onload = () => res(img);
        img.onerror = () => {
          const c = document.createElement('canvas'); c.width = c.height = 64;
          const ctx = c.getContext('2d'); ctx.fillStyle = '#ccc'; ctx.fillRect(0,0,64,64);
          res(c);
        };
        img.src = src;
      });
    }

    async function drawIcon(name, haloColor, faceSize = 32, halo = haloColor ? 5 : 0) {
      const total = faceSize + halo*2;
      const canvas = document.createElement('canvas'); canvas.width = canvas.height = total;
      const ctx = canvas.getContext('2d');
      if (haloColor) {
        ctx.fillStyle = haloColor;
        ctx.beginPath();
        ctx.arc(total/2, total/2, faceSize/2 + halo, 0, 2*Math.PI);
        ctx.arc(total/2, total/2, faceSize/2, 0, 2*Math.PI);
        ctx.fill('evenodd');
      }
      const img = await loadImage(`${IMG_PATH}${encodeURIComponent(name.trim())}_cvface1.png`);
      ctx.drawImage(img, halo, halo, faceSize, faceSize);
      return canvas.toDataURL();
    }

    function assignRanks(parts) {
      let last = null, rank = 0;
      parts.forEach((p, i) => {
        if (p.bonus !== last) { rank = i + 1; last = p.bonus; }
        p.rank = rank;
        p.halo = p.rank === 1 ? 'gold'
               : p.rank === 2 ? 'silver'
               : p.rank === 3 ? '#cd7f32' : null;
      });
    }

    async function renderLeaderboard(parts) {
      const staticUl = document.getElementById('static-rank1');
      const otherUl  = document.getElementById('other-ranks');
      staticUl.innerHTML = '';
      otherUl.innerHTML  = '';

      parts.forEach(p => {
        const ties = parts.filter(x => x.bonus === p.bonus).length > 1;
        const txt  = (ties ? '=' : '') + p.rank;
        const li   = document.createElement('li');
        li.id = 'lb-' + p.name.replace(/\s+/g, '-');
        li.innerHTML =
          `<span class="col-rank">${txt}</span>` +
          `<span class="col-face" id="face-${li.id}"><div style="width:32px;height:32px;border-radius:50%;background:#ddd;"></div></span>` +
          `<span class="col-name">${p.name}</span>`;
        (p.rank === 1 ? staticUl : otherUl).appendChild(li);
      });

      document.getElementById('leaderboard-spinner').style.display = 'none';

      const icons = await Promise.all(parts.map(p => drawIcon(p.name, p.halo, 32, p.halo ? 5 : 0)));
      parts.forEach((p, idx) => {
        const sz     = 32 + (p.halo ? 5 : 0);
        const faceEl = document.getElementById('face-lb-' + p.name.replace(/\s+/g, '-'));
        if (faceEl) faceEl.innerHTML = `<img class="face" src="${icons[idx]}" width="${sz}" height="${sz}">`;
      });

      setTimeout(startPingPongScroll, 1000);
    }

    function startPingPongScroll() {
      const ct = document.getElementById('scroll-container');
      const speed = 0.05, pause = 1000;
      let dir = 1, paused = false, last = performance.now(), elapsed = 0;
      function step(now) {
        const dt = now - last; last = now;
        if (paused) {
          elapsed += dt; if (elapsed >= pause) { paused = false; elapsed = 0; }
        } else {
          ct.scrollTop += speed * dt * dir;
          const max = ct.scrollHeight - ct.clientHeight;
          if (ct.scrollTop >= max) { ct.scrollTop = max; dir = -1; paused = true; }
          else if (ct.scrollTop <= 0) { ct.scrollTop = 0; dir = 1; paused = true; }
        }
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    async function init() {
      const [actualMeters, PEOPLE] = await Promise.all([csvPromise, fetchPeople(), mapsReadyPromise]);

      document.getElementById('map-spinner').style.display = 'none';

      const map = new google.maps.Map(document.getElementById('map'), {
        padding: { top:70, right:10, bottom:10, left:10 }
      });
      window.map = map;

      new google.maps.Marker({
        map, position: HQ, zIndex: 9999,
        icon: {
          url: `${IMG_PATH}JHB Logo.png`,
          scaledSize: new google.maps.Size(115, 64),
          anchor: new google.maps.Point(57, 32)
        }
      });

      const parts = PEOPLE.map(name => ({ name, bonus: actualMeters[name] || 0 }));
      parts.sort((a, b) => b.bonus - a.bonus);
      assignRanks(parts);

      renderLeaderboard(parts);

      const routeData = await fetch(ROUTE_URL).then(r => r.json());
      animateRoute(parts, routeData.points);
    }

    async function animateRoute(parts, path) {
      const map = window.map;

      const distances = path.slice(0, -1).map((_, i) => {
        const a = new google.maps.LatLng(path[i].lat, path[i].lng);
        const b = new google.maps.LatLng(path[i+1].lat, path[i+1].lng);
        return google.maps.geometry.spherical.computeDistanceBetween(a, b);
      });
      const cum = distances.reduce((arr, d) => (arr.push((arr.slice(-1)[0]||0) + d), arr), []);

      parts.forEach(p => {
        let idx = cum.findIndex(d => p.bonus <= d);
        if (idx < 0) idx = cum.length - 1;
        const prev = cum[idx-1] || 0;
        const frac = distances[idx] ? (p.bonus - prev) / distances[idx] : 0;
        const p0 = path[idx], p1 = path[idx+1] || p0;
        p.target = {
          lat: p0.lat + (p1.lat - p0.lat) * frac,
          lng: p0.lng + (p1.lng - p0.lng) * frac
        };
      });

      const mapIcons = await Promise.all(
        parts.map(p => drawIcon(p.name, p.halo, 64, p.halo ? 10 : 0))
      );

      parts.forEach((p, idx) => {
        const size = 64 + (p.halo ? 10 : 0);
        p.marker = new google.maps.Marker({
          map, position: HQ, zIndex: 1,
          icon: {
            url: mapIcons[idx],
            scaledSize: new google.maps.Size(size, size),
            anchor: new google.maps.Point(size/2, size/2)
          }
        });
      });

      const bounds = new google.maps.LatLngBounds();
      parts.forEach(p => bounds.extend(p.target));
      bounds.extend(HQ);
      map.fitBounds(bounds);

      const startTime = performance.now();
      const dur = 5000;
      function animateAll(now) {
        const t = Math.min((now - startTime) / dur, 1);
        parts.forEach(p => {
          p.marker.setPosition({
            lat: HQ.lat + (p.target.lat - HQ.lat) * t,
            lng: HQ.lng + (p.target.lng - HQ.lng) * t
          });
        });
        if (t < 1) requestAnimationFrame(animateAll);
      }
      requestAnimationFrame(animateAll);
    }

    init().catch(e => console.error(e));
  </script>
</body>
</html>
