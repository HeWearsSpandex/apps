<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonus Metres – My Stats</title>

  <script>
    let resolveMapsReady;
    window.mapsReadyPromise = new Promise(res => { resolveMapsReady = res; });
    window.onMapsReady = () => resolveMapsReady();
  </script>
  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA23ORAayerNpeDh8WhQkwsv0ZNAon41FI&libraries=geometry&callback=onMapsReady"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex; flex-direction: column;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .header img { max-width: 70px; height: auto; }

    /* ── Hero ── */
    .hero {
      background: #fff;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .hero-face img {
      border-radius: 50%;
      width: 48px; height: 48px;
      border: 3px solid #ddd;
      flex-shrink: 0;
    }
    .hero-info h1 {
      margin: 0 0 1px;
      font-size: 16px;
      line-height: 1.2;
    }
    .hero-info .subtitle {
      color: #999;
      font-size: 11px;
    }

    /* ── Stats grid — 2 cols mobile first ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      padding: 8px;
      flex-shrink: 0;
    }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      min-width: 0; /* prevents overflow */
    }
    .stat-card.highlight { border-top: 3px solid #c00; }
    .stat-card.full-width { grid-column: 1 / -1; } /* always spans all columns */

    .stat-card .label {
      font-size: 9px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 3px;
    }
    .stat-card .value {
      font-size: 15px;
      font-weight: bold;
      color: #222;
      line-height: 1.2;
    }
    .stat-card .sub {
      font-size: 10px;
      color: #bbb;
      margin-top: 2px;
    }

    /* Arrow colours */
    .up   { color: #2a9d2a; }
    .down { color: #c00; }
    .same { color: #888; }

    /* ── Map — fills remaining space ── */
    .map-wrap {
      flex: 1 1 0;
      position: relative;
      min-height: 120px;
    }
    #map {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }

    /* ── Spinners ── */
    .spinner-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #f0f0f0;
      border-top-color: #c00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error / not found ── */
    .error {
      text-align: center;
      padding: 40px 20px;
      color: #c00;
      font-size: 16px;
    }
    .not-found {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
    .not-found h2 { color: #333; margin-bottom: 8px; }

    /* ── Scale up for larger screens ── */
    @media (min-width: 400px) {
      .header img        { max-width: 90px; }
      .hero-face img     { width: 56px; height: 56px; }
      .hero-info h1      { font-size: 18px; }
      .stat-card .value  { font-size: 17px; }
    }

    @media (min-width: 540px) {
      .stats-grid        { grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
      .stat-card.full-width { grid-column: 1 / -1; }
      .stat-card .value  { font-size: 19px; }
      .header img        { max-width: 110px; }
    }

    @media (min-width: 768px) {
      .header img        { max-width: 140px; }
      .hero              { padding: 14px 20px; max-width: 700px; margin: 0 auto; width: 100%; }
      .hero-face img     { width: 72px; height: 72px; }
      .hero-info h1      { font-size: 22px; }
      .stats-grid        { padding: 12px 16px; gap: 10px; max-width: 700px; margin: 0 auto; width: 100%; }
      .stat-card         { padding: 12px; }
      .stat-card .label  { font-size: 11px; }
      .stat-card .value  { font-size: 22px; }
      .stat-card .sub    { font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="/img/JHB Logo.png" alt="JHB Logo">
  </div>

  <div id="content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;">
    <div class="spinner-overlay" id="main-spinner">
      <div class="spinner"></div>
    </div>
  </div>

  <script src="/js/people.js"></script>
  <script>
    const CSV_URL   = '/bonus-metres/data/actual_distances.csv';
    const ROUTE_URL = '/bonus-metres/data/route.json';
    const IMG_PATH  = '/img/';
    const HQ = { lat: 50.43135, lng: -3.797092 };

    // Kick off all fetches immediately
    const csvPromise   = fetchCSV();
    const mapsPromise  = window.mapsReadyPromise;
    const routePromise = fetch(ROUTE_URL).then(r => r.json());

    function getPlayerName() {
      return decodeURIComponent(new URLSearchParams(location.search).get('name') || '').trim();
    }

    async function fetchCSV() {
      const r = await fetch(CSV_URL, { cache: 'no-cache' });
      if (!r.ok) throw new Error('CSV failed: ' + r.status);
      const txt = await r.text();
      const lines = txt.trim().split(/\r?\n/);
      const keys = lines.shift().split(',').map(h => h.trim());
      return lines.map(l => {
        const cols = l.split(',');
        return keys.reduce((o, k, i) => (o[k] = (cols[i] || '').trim(), o), {});
      });
    }

    async function loadImage(src) {
      return new Promise(res => {
        const img = new Image(); img.crossOrigin = 'anonymous';
        img.onload = () => res(img);
        img.onerror = () => {
          const c = document.createElement('canvas'); c.width = c.height = 64;
          c.getContext('2d').fillStyle = '#ccc';
          c.getContext('2d').fillRect(0, 0, 64, 64);
          res(c);
        };
        img.src = src;
      });
    }

    async function drawIcon(name, haloColor, faceSize = 64, halo = haloColor ? 10 : 0) {
      const total = faceSize + halo * 2;
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = total;
      const ctx = canvas.getContext('2d');
      if (haloColor) {
        ctx.fillStyle = haloColor;
        ctx.beginPath();
        ctx.arc(total/2, total/2, faceSize/2 + halo, 0, 2*Math.PI);
        ctx.arc(total/2, total/2, faceSize/2, 0, 2*Math.PI);
        ctx.fill('evenodd');
      }
      const img = await loadImage(`${IMG_PATH}${encodeURIComponent(name.trim())}_cvface1.png`);
      ctx.drawImage(img, halo, halo, faceSize, faceSize);
      return canvas.toDataURL();
    }

    function val(row, col) {
      return parseFloat((row[col] || '0').replace(/,/g, '')) || 0;
    }

    function haloForRank(rank) {
      return rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? '#cd7f32' : null;
    }

    async function build() {
      const name    = getPlayerName();
      const content = document.getElementById('content');

      if (!name || !PEOPLE.includes(name)) {
        document.getElementById('main-spinner').style.display = 'none';
        content.innerHTML = `
          <div class="not-found">
            <h2>Player not found</h2>
            <p>No player named "<strong>${name || '?'}</strong>" exists in the leaderboard.</p>
          </div>`;
        return;
      }

      // Load everything in parallel
      const [data] = await Promise.all([csvPromise, mapsPromise, routePromise]);

      const player = data.find(r => r['NAME'] === name);
      if (!player) {
        document.getElementById('main-spinner').style.display = 'none';
        content.innerHTML = `<div class="not-found"><h2>No data found for ${name}</h2></div>`;
        return;
      }

      // Overall rank by total metres
      const ranked = data
        .filter(r => PEOPLE.includes(r['NAME']) && val(r, 'TOTAL METERS') > 0)
        .sort((a, b) => val(b, 'TOTAL METERS') - val(a, 'TOTAL METERS'));
      let lastVal = null, overallRank = 0;
      ranked.forEach((r, i) => {
        const v = val(r, 'TOTAL METERS');
        if (v !== lastVal) { overallRank = i + 1; lastVal = v; }
        r._overallRank = overallRank;
      });

      // This month rank
      const tmRanked = data
        .filter(r => PEOPLE.includes(r['NAME']) && r['T/M RANK'])
        .sort((a, b) => +a['T/M RANK'] - +b['T/M RANK']);
      let lastTM = null, tmRank = 0;
      tmRanked.forEach((r, i) => {
        const v = +r['T/M RANK'];
        if (v !== lastTM) { tmRank = i + 1; lastTM = v; }
        r._tmRank = tmRank;
      });

      // Last month rank
      const lmRanked = data
        .filter(r => PEOPLE.includes(r['NAME']) && r['L/M RANK'])
        .sort((a, b) => +a['L/M RANK'] - +b['L/M RANK']);
      let lastLM = null, lmRank = 0;
      lmRanked.forEach((r, i) => {
        const v = +r['L/M RANK'];
        if (v !== lastLM) { lmRank = i + 1; lastLM = v; }
        r._lmRank = lmRank;
      });

      const myTM      = val(player, 'THIS MONTH');
      const myLM      = val(player, 'LAST MONTH');
      const myTotal   = val(player, 'TOTAL METERS');
      const myTMRank  = tmRanked.find(r => r['NAME'] === name)?._tmRank  || '-';
      const myLMRank  = lmRanked.find(r => r['NAME'] === name)?._lmRank  || '-';
      const myOverall = ranked.find(r => r['NAME'] === name)?._overallRank || '-';

      const tmLeader  = val(tmRanked[0], 'THIS MONTH');
      const lmLeader  = val(lmRanked[0], 'LAST MONTH');
      const totLeader = val(ranked[0],   'TOTAL METERS');

      const tmDiff  = myTM    === tmLeader  ? 'Leader' : `-${(tmLeader  - myTM).toLocaleString()}m`;
      const lmDiff  = myLM    === lmLeader  ? 'Leader' : `-${(lmLeader  - myLM).toLocaleString()}m`;
      const totDiff = myTotal === totLeader ? 'Leader' : `-${(totLeader - myTotal).toLocaleString()}m`;

      // Positional change
      const tmCurrent = +player['T/M RANK'] || 0;
      const tmLast    = +player['T/M LAST RANK'] || 0;
      let changeArrow = '—', changeText = 'No change', changeClass = 'same';
      if (tmLast && tmCurrent) {
        if      (tmCurrent < tmLast) { changeArrow = '▲'; changeText = `Up ${tmLast - tmCurrent}`; changeClass = 'up'; }
        else if (tmCurrent > tmLast) { changeArrow = '▼'; changeText = `Down ${tmCurrent - tmLast}`; changeClass = 'down'; }
      }

      // Draw player face
      const playerIcon = await drawIcon(name, null, 64, 0);

      // Render page
      document.getElementById('main-spinner').style.display = 'none';
      content.innerHTML = `
        <div class="hero">
          <div class="hero-face"><img src="${playerIcon}" alt="${name}"></div>
          <div class="hero-info">
            <h1>${name}</h1>
            <div class="subtitle">Bonus Metres – Personal Stats</div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card highlight">
            <div class="label">This Month</div>
            <div class="value">${myTM.toLocaleString()}m</div>
            <div class="sub">Rank #${myTMRank}</div>
          </div>
          <div class="stat-card highlight">
            <div class="label">Last Month</div>
            <div class="value">${myLM.toLocaleString()}m</div>
            <div class="sub">Rank #${myLMRank}</div>
          </div>
          <div class="stat-card highlight full-width">
            <div class="label">Total Metres</div>
            <div class="value">${myTotal.toLocaleString()}m</div>
            <div class="sub">Overall #${myOverall}</div>
          </div>
          <div class="stat-card">
            <div class="label">vs This Month Leader</div>
            <div class="value">${tmDiff}</div>
          </div>
          <div class="stat-card">
            <div class="label">vs Last Month Leader</div>
            <div class="value">${lmDiff}</div>
          </div>
          <div class="stat-card full-width">
            <div class="label">vs Overall Leader</div>
            <div class="value">${totDiff}</div>
          </div>
          <div class="stat-card full-width">
            <div class="label">Positional Change This Month</div>
            <div class="value ${changeClass}">${changeArrow} ${changeText}</div>
          </div>
        </div>

        <div class="map-wrap">
          <div class="spinner-overlay" id="map-spinner"><div class="spinner"></div></div>
          <div id="map"></div>
        </div>
      `;

      await renderMap(name, ranked, data);
    }

    async function renderMap(playerName, ranked, data) {
      const map = new google.maps.Map(document.getElementById('map'), {
        zoom: 8,
        center: HQ
      });

      document.getElementById('map-spinner').style.display = 'none';

      const routeData = await routePromise;
      const path = routeData.points;

      const distances = path.slice(0, -1).map((_, i) => {
        const a = new google.maps.LatLng(path[i].lat, path[i].lng);
        const b = new google.maps.LatLng(path[i+1].lat, path[i+1].lng);
        return google.maps.geometry.spherical.computeDistanceBetween(a, b);
      });
      const cum = distances.reduce((arr, d) => (arr.push((arr.slice(-1)[0]||0) + d), arr), []);

      function getPosition(metres) {
        let idx = cum.findIndex(d => metres <= d);
        if (idx < 0) idx = cum.length - 1;
        const prev = cum[idx-1] || 0;
        const frac = distances[idx] ? (metres - prev) / distances[idx] : 0;
        const p0 = path[idx], p1 = path[idx+1] || p0;
        return {
          lat: p0.lat + (p1.lat - p0.lat) * frac,
          lng: p0.lng + (p1.lng - p0.lng) * frac
        };
      }

      // Show player + top 3 (deduplicated)
      const top3 = ranked.slice(0, 3);
      const showNames = [...new Set([playerName, ...top3.map(r => r['NAME'])])];
      const showParts = showNames.map(n => {
        const row      = data.find(r => r['NAME'] === n);
        const total    = val(row, 'TOTAL METERS');
        const rank     = ranked.find(r => r['NAME'] === n)?._overallRank || 99;
        const isPlayer = n === playerName;
        return { name: n, total, isPlayer, rank, halo: isPlayer && rank > 3 ? '#1a73e8' : haloForRank(rank) };
      });

      // Draw all icons in parallel
      const icons = await Promise.all(showParts.map(p => drawIcon(p.name, p.halo, 64, p.halo ? 10 : 0)));

      const bounds = new google.maps.LatLngBounds();
      bounds.extend(HQ);

      showParts.forEach((p, idx) => {
        const pos  = getPosition(p.total);
        const size = 64 + (p.halo ? 10 : 0);
        new google.maps.Marker({
          map,
          position: pos,
          zIndex: p.isPlayer ? 9999 : 1,
          icon: {
            url: icons[idx],
            scaledSize: new google.maps.Size(size, size),
            anchor: new google.maps.Point(size/2, size/2)
          }
        });
        bounds.extend(pos);
      });

      map.fitBounds(bounds);
    }

    build().catch(e => {
      console.error(e);
      document.getElementById('main-spinner').style.display = 'none';
      document.getElementById('content').innerHTML =
        `<div class="error">Error loading stats. Please try again.</div>`;
    });
  </script>
</body>
</html>
