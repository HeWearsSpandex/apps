<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHB — Crew Analysis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #c00;
      --red-dk:   #900;
      --red-lt:   #fff0f0;
      --green:    #2a9d2a;
      --green-lt: #f0fff0;
      --orange:   #e65100;
      --orange-lt:#fff3e0;
      --blue:     #1a73e8;
      --blue-lt:  #e8f0fe;
      --gold:     #f9a825;
      --gold-lt:  #fffde7;
      --purple:   #7c3aed;
      --purple-lt:#f5f3ff;
      --grey:     #f4f5f7;
      --border:   #e0e0e0;
      --text:     #1a1a1a;
      --muted:    #888;
      --white:    #fff;
      --shadow:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg:0 8px 32px rgba(0,0,0,0.14);
      --radius:   10px;
    }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--grey); color: var(--text); min-height: 100vh; }
    .main { margin-left: 220px; padding: 28px 32px; min-height: 100vh; }

    .page-header { margin-bottom: 24px; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .page-header h2 { font-size: 22px; font-weight: 700; }
    .page-header p  { font-size: 13px; color: var(--muted); margin-top: 3px; }

    /* ── FILTERS ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 18px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .filter-bar label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
    .filter-bar input[type=date] {
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .filter-bar input[type=date]:focus { border-color: var(--red); }
    .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    .size-pills { display: flex; gap: 6px; }
    .size-pill {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--muted);
      transition: all 0.15s;
    }
    .size-pill.active { background: var(--red); color: var(--white); border-color: var(--red); }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }
    .btn-primary       { background: var(--red);   color: var(--white); }
    .btn-primary:hover { background: var(--red-dk); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── SUMMARY STATS ── */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--border);
    }
    .stat-card.gold   { border-left-color: var(--gold); }
    .stat-card.blue   { border-left-color: var(--blue); }
    .stat-card.green  { border-left-color: var(--green); }
    .stat-card.purple { border-left-color: var(--purple); }
    .stat-val { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 3px; }
    .stat-card.gold   .stat-val { color: var(--gold); }
    .stat-card.blue   .stat-val { color: var(--blue); }
    .stat-card.green  .stat-val { color: var(--green); }
    .stat-card.purple .stat-val { color: var(--purple); }

    /* ── CREW GRID ── */
    .crew-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .crew-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .crew-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

    .crew-card-header {
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .crew-rank {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      width: 28px;
      flex-shrink: 0;
    }
    .crew-rank.gold-rank   { color: var(--gold); font-size: 18px; }
    .crew-rank.silver-rank { color: #999;        font-size: 16px; }
    .crew-rank.bronze-rank { color: #cd7f32;     font-size: 14px; }

    .crew-avatars {
      display: flex;
      align-items: center;
      flex: 1;
      padding: 0 8px;
    }
    .crew-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--white);
      margin-left: -8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .crew-avatar:first-child { margin-left: 0; }

    .crew-size-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .crew-size-badge.size-2 { background: var(--blue-lt);   color: var(--blue); }
    .crew-size-badge.size-3 { background: var(--green-lt);  color: var(--green); }
    .crew-size-badge.size-4 { background: var(--orange-lt); color: var(--orange); }
    .crew-size-badge.size-5 { background: var(--purple-lt); color: var(--purple); }
    .crew-size-badge.size-6 { background: var(--gold-lt);   color: var(--gold); }

    .crew-card-body { padding: 12px 16px; }

    .crew-names {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .crew-initials {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .crew-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .crew-metric { text-align: center; }
    .crew-metric .m-val { font-size: 15px; font-weight: 700; }
    .crew-metric .m-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; margin-top: 1px; }
    .crew-metric.bonus .m-val  { color: var(--gold); }
    .crew-metric.metres .m-val { color: var(--blue); }
    .crew-metric.visits .m-val   { color: var(--green); }
    .crew-metric.highlighted   { background: var(--grey); border-radius: 8px; padding: 4px 2px; }

    .crew-bar-wrap {
      margin-top: 10px;
      height: 4px;
      background: var(--grey);
      border-radius: 2px;
      overflow: hidden;
    }
    .crew-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--orange));
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    /* ── EMPTY / LOADING ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    .spinner-wrap { display: flex; justify-content: center; padding: 60px; grid-column: 1/-1; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-header h3 { font-size: 15px; font-weight: 700; }
    .section-header .count { font-size: 12px; color: var(--muted); }

    @media (max-width: 900px) {
      .main { margin-left: 0; padding: 16px; }
      .summary-row { grid-template-columns: repeat(2, 1fr); }
      .crew-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
  <div id="sidebarMount"></div>

  <div class="main" id="mainContent" style="display:none">

    <div class="page-header">
      <div>
        <h2>Crew Analysis</h2>
        <p>Which combinations of staff earn the most bonus metres together</p>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <!-- Row 1: dates + analyse button -->
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;width:100%;">
        <label>From</label>
        <input type="date" id="date-from">
        <label>To</label>
        <input type="date" id="date-to">
        <div class="filter-sep"></div>
        <label>Crew Size</label>
        <div class="size-pills">
          <span class="size-pill active" data-size="0" onclick="setSizePill(this)">All</span>
          <span class="size-pill" data-size="2" onclick="setSizePill(this)">2</span>
          <span class="size-pill" data-size="3" onclick="setSizePill(this)">3</span>
          <span class="size-pill" data-size="4" onclick="setSizePill(this)">4</span>
          <span class="size-pill" data-size="5" onclick="setSizePill(this)">5+</span>
        </div>
        <div class="filter-sep"></div>
        <button class="btn btn-primary" id="analyse-btn" onclick="runAnalysis()">🔍 Analyse</button>
      </div>
      <!-- Row 2: sort pills -->
      <div style="display:flex;align-items:center;gap:10px;width:100%;padding-top:8px;border-top:1px solid var(--border);">
        <label>Sort By</label>
        <div class="size-pills" id="sort-pills">
          <span class="size-pill active" data-sort="bonus"  onclick="setSortPill(this)">Total Bonus</span>
          <span class="size-pill"        data-sort="avg"    onclick="setSortPill(this)">Avg / Job</span>
          <span class="size-pill"        data-sort="metres" onclick="setSortPill(this)">Metres</span>
          <span class="size-pill"        data-sort="visits"   onclick="setSortPill(this)">Most Visits</span>
        </div>
      </div>
    </div>

    <!-- Summary stats -->
    <div class="summary-row" id="summary-row" style="display:none">
      <div class="stat-card gold">
        <div class="stat-val" id="stat-total-bonus">—</div>
        <div class="stat-lbl">Total Bonus Earned</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-val" id="stat-total-metres">—</div>
        <div class="stat-lbl">Total Metres</div>
      </div>
      <div class="stat-card green">
        <div class="stat-val" id="stat-total-visits">—</div>
        <div class="stat-lbl">Total Visits</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-val" id="stat-total-crews">—</div>
        <div class="stat-lbl">Unique Crew Combos</div>
      </div>
    </div>

    <!-- Crew cards -->
    <div class="section-header" id="results-header" style="display:none">
      <h3>Top Crews by Bonus Earned</h3>
      <span class="count" id="results-count"></span>
    </div>
    <div class="crew-grid" id="crew-grid">
      <div class="empty-state">
        <div class="icon">👥</div>
        <p>Set a date range and click Analyse to see crew performance</p>
      </div>
    </div>

  </div>

  <script>
    let allEmployeeMap = {}; // id -> employee
    let currentSizeFilter = 0;
    let currentSort = 'bonus';
    let allCrews = [];

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      const ok = await requireAuth();
      if (!ok) return;
      document.getElementById('mainContent').style.display = 'block';

      // Default date range — earliest transaction to today
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date-to').value = today;

      // Load all employees into a map
      const { data } = await sb.from('employees')
        .select('id, full_name, initials, status');
      (data || []).forEach(e => { allEmployeeMap[e.id] = e; });

      // Find earliest transaction date
      const { data: earliest } = await sb
        .from('transactions')
        .select('date')
        .order('date', { ascending: true })
        .limit(1);
      const fromDate = earliest?.[0]?.date || today;
      document.getElementById('date-from').value = fromDate;

      await runAnalysis();
    }

    // ── Size filter ───────────────────────────────────────────────────────────
    function setSizePill(el) {
      document.querySelectorAll('.size-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      currentSizeFilter = parseInt(el.dataset.size);
      renderCrews();
    }

    function setSortPill(el) {
      document.querySelectorAll('#sort-pills .size-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      currentSort = el.dataset.sort;
      renderCrews();
    }

    // ── Analysis ──────────────────────────────────────────────────────────────
    async function runAnalysis() {
      const dateFrom = document.getElementById('date-from').value;
      const dateTo   = document.getElementById('date-to').value;

      if (!dateFrom || !dateTo) { showToast('Select a date range', 'error'); return; }

      const btn = document.getElementById('analyse-btn');
      btn.disabled = true; btn.textContent = 'Analysing…';

      document.getElementById('crew-grid').innerHTML =
        '<div class="spinner-wrap"><div class="spinner"></div></div>';
      document.getElementById('summary-row').style.display   = 'none';
      document.getElementById('results-header').style.display = 'none';

      try {
        // Fetch via transaction_operatives to avoid generated column issues
        const { data: opsData, error } = await sb
          .from('transaction_operatives')
          .select(`employee_id, share_value,
                   transactions!inner(id, bonus_metres, rate, date)`)
          .gte('transactions.date', dateFrom)
          .lte('transactions.date', dateTo);

        if (error) throw new Error(error.message);

        // Group by transaction first, then build crew map
        const txMap = {};
        (opsData || []).forEach(op => {
          const tx = op.transactions;
          if (!tx) return;
          if (!txMap[tx.id]) {
            txMap[tx.id] = {
              id:      tx.id,
              date:    tx.date,
              metres:  parseFloat(tx.bonus_metres || 0),
              value:   parseFloat(tx.bonus_metres || 0) * parseFloat(tx.rate || 0.03),
              ops:     []
            };
          }
          txMap[tx.id].ops.push(op.employee_id);
        });

        const crewMap = {};
        let totalBonus  = 0;
        let totalMetres = 0;
        let totalVisits   = 0;

        Object.values(txMap).forEach(tx => {
          if (!tx.ops.length) return;
          totalVisits++;
          totalBonus  += tx.value;
          totalMetres += tx.metres;

          const ids = [...tx.ops].sort();
          const key = ids.join('|');
          if (!crewMap[key]) crewMap[key] = { key, ids, visits: 0, bonus: 0, metres: 0 };
          crewMap[key].visits++;
          crewMap[key].bonus  += tx.value;
          crewMap[key].metres += tx.metres;
        });

        // Sort by bonus desc
        allCrews = Object.values(crewMap)
          .sort((a, b) => b.bonus - a.bonus);

        // Summary stats
        document.getElementById('stat-total-bonus').textContent  = `£${totalBonus.toFixed(0)}`;
        document.getElementById('stat-total-metres').textContent = `${totalMetres.toLocaleString()}m`;
        document.getElementById('stat-total-visits').textContent   = totalVisits.toLocaleString();
        document.getElementById('stat-total-crews').textContent  = allCrews.length.toLocaleString();
        document.getElementById('summary-row').style.display     = 'grid';
        document.getElementById('results-header').style.display  = 'flex';

        renderCrews();

      } catch(e) {
        console.error(e);
        showToast('Error: ' + e.message, 'error');
        document.getElementById('crew-grid').innerHTML =
          `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
      } finally {
        btn.disabled = false; btn.textContent = '🔍 Analyse';
      }
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderCrews() {
      const grid = document.getElementById('crew-grid');

      let filtered = allCrews.filter(c => {
        if (currentSizeFilter === 0) return true;
        if (currentSizeFilter === 5) return c.ids.length >= 5;
        return c.ids.length === currentSizeFilter;
      });

      // Sort by selected metric
      const sortFn = {
        bonus:  (a, b) => b.bonus - a.bonus,
        avg:    (a, b) => (b.bonus / b.visits) - (a.bonus / a.visits),
        metres: (a, b) => b.metres - a.metres,
        visits:   (a, b) => b.visits - a.visits,
      };
      filtered = [...filtered].sort(sortFn[currentSort] || sortFn.bonus);

      const sortLabels = {
        bonus:  'Total Bonus',
        avg:    'Avg / Job',
        metres: 'Total Metres',
        visits:   'Most Visits',
      };
      document.getElementById('results-header').querySelector('h3').textContent =
        `Top Crews by ${sortLabels[currentSort]}`;

      document.getElementById('results-count').textContent =
        `${filtered.length} crew combination${filtered.length !== 1 ? 's' : ''}`;

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No crews found for this filter</p></div>`;
        return;
      }

      // Bar is relative to the top value of the current sort metric
      const topVal = currentSort === 'avg'    ? (filtered[0].bonus / filtered[0].visits)
                   : currentSort === 'metres' ? filtered[0].metres
                   : currentSort === 'visits'   ? filtered[0].visits
                   : filtered[0].bonus;

      grid.innerHTML = filtered.map((crew, idx) => {
        const rank      = idx + 1;
        const size      = crew.ids.length;
        const avgPerVisit = crew.visits > 0 ? crew.bonus / crew.visits : 0;

        // Bar width based on current sort metric
        const sortVal = currentSort === 'avg'    ? avgPerVisit
                      : currentSort === 'metres' ? crew.metres
                      : currentSort === 'visits'   ? crew.visits
                      : crew.bonus;
        const pct = topVal > 0 ? (sortVal / topVal) * 100 : 0;

        let rankHtml;
        if      (rank === 1) rankHtml = `<div class="crew-rank gold-rank">🥇</div>`;
        else if (rank === 2) rankHtml = `<div class="crew-rank silver-rank">🥈</div>`;
        else if (rank === 3) rankHtml = `<div class="crew-rank bronze-rank">🥉</div>`;
        else                 rankHtml = `<div class="crew-rank">#${rank}</div>`;

        const sizeCls = `size-${Math.min(size, 6)}`;

        const avatarHtml = crew.ids.map(id => {
          const emp = allEmployeeMap[id];
          if (!emp) return '';
          const src      = `https://oxgehlmalbvppjmdaswn.supabase.co/storage/v1/object/public/images/${encodeURIComponent(emp.full_name)}_cvface1.jpg`;
          const initials = emp.initials || emp.full_name.charAt(0);
          const fb       = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><circle cx='18' cy='18' r='18' fill='%231a1a2e'/><text x='18' y='23' text-anchor='middle' font-size='${initials.length > 2 ? 9 : 11}' font-weight='700' fill='%23ffffff' font-family='Arial,sans-serif'>${initials}</text></svg>`;
          return `<img class="crew-avatar" src="${src}" onerror="this.src='${fb}'" title="${emp.full_name}">`;
        }).join('');

        const names    = crew.ids.map(id => allEmployeeMap[id]?.full_name || 'Unknown').join(', ');
        const initials = crew.ids.map(id => allEmployeeMap[id]?.initials  || '?').join(' · ');

        // Highlight the active sort metric
        const bonusCls  = currentSort === 'bonus'  ? 'bonus highlighted'  : 'bonus';
        const metresCls = currentSort === 'metres' ? 'metres highlighted' : 'metres';
        const visitsCls   = currentSort === 'visits'   ? 'visits highlighted'   : 'visits';

        return `<div class="crew-card">
          <div class="crew-card-header">
            ${rankHtml}
            <div class="crew-avatars">${avatarHtml}</div>
            <span class="crew-size-badge ${sizeCls}">${size} person${size > 1 ? 's' : ''}</span>
          </div>
          <div class="crew-card-body">
            <div class="crew-names">${names}</div>
            <div class="crew-initials">${initials}</div>
            <div class="crew-metrics">
              <div class="crew-metric ${bonusCls}">
                <div class="m-val">£${crew.bonus.toFixed(0)}</div>
                <div class="m-lbl">Total Bonus</div>
              </div>
              <div class="crew-metric ${metresCls}">
                <div class="m-val">${(crew.metres/1000).toFixed(1)}k</div>
                <div class="m-lbl">Metres</div>
              </div>
              <div class="crew-metric ${visitsCls}">
                <div class="m-val">${crew.visits}</div>
                <div class="m-lbl">Visits</div>
              </div>
            </div>
            <div class="crew-bar-wrap">
              <div class="crew-bar" style="width:${pct}%"></div>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between">
              <span>Avg <strong style="color:var(--text)">£${avgPerVisit.toFixed(0)}</strong> / visit</span>
              <span>Avg <strong style="color:var(--text)">${(crew.metres/crew.visits).toFixed(0)}m</strong> / visit</span>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    init();
  </script>
</body>
</html>
