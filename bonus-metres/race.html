<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHB Grand Prix 🏁</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky: #5c94fc;
      --grass-light: #52c41a;
      --grass-dark: #389e0d;
      --road: #888;
      --road-edge: #aaa;
      --kerb-red: #ff4444;
      --kerb-white: #fff;
      --yellow: #ffe000;
      --dark: #111;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; min-height: 100vh;
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--sky);
      overflow-x: hidden;
    }

    /* ── CLOUDS ── */
    .clouds {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .cloud {
      position: absolute; background: #fff; border-radius: 50px;
      opacity: 0.85;
      animation: drift linear infinite;
    }
    .cloud::before, .cloud::after {
      content: ''; position: absolute; background: #fff; border-radius: 50%;
    }
    .cloud::before { width: 60%; height: 160%; top: -40%; left: 15%; }
    .cloud::after  { width: 40%; height: 130%; top: -25%; right: 15%; }
    @keyframes drift { from { transform: translateX(-200px); } to { transform: translateX(110vw); } }

    /* ── HEADER ── */
    .header {
      position: relative; z-index: 10;
      background: linear-gradient(180deg, #cc0000 0%, #880000 100%);
      border-bottom: 6px solid #ffcc00;
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 0 #660000;
    }
    .header img { height: 42px; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5)); }
    .header-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px; color: var(--yellow);
      text-shadow: 3px 3px 0 #990000, -1px -1px 0 #ff6600;
      letter-spacing: 1px;
    }
    .header-sub {
      font-size: 11px; color: #ffaaaa; letter-spacing: 2px;
      text-transform: uppercase; margin-top: 4px;
    }
    .header-right { text-align: right; }
    .fy-badge {
      background: var(--yellow); color: #cc0000;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; padding: 4px 10px; border-radius: 4px;
      display: inline-block; margin-bottom: 4px;
      box-shadow: 2px 2px 0 #997700;
    }

    /* ── LAYOUT ── */
    .race-layout {
      position: relative; z-index: 5;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 0;
      min-height: calc(100vh - 80px);
    }

    /* ── TRACK CANVAS AREA ── */
    .track-area {
      position: relative;
      background: linear-gradient(180deg, #5c94fc 0%, #7ab8f5 100%);
      overflow: hidden;
    }

    /* Hills in background */
    .hills {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 45%; pointer-events: none;
    }

    canvas#raceCanvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* Spinner */
    .race-spinner {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: rgba(92,148,252,0.9);
      z-index: 20;
    }
    .spinner-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px; color: var(--yellow);
      animation: blink 0.8s step-end infinite;
    }
    .spinner-karts { font-size: 40px; animation: bounce 0.5s ease-in-out infinite alternate; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes bounce { to { transform: translateY(-8px); } }

    /* ── LEADERBOARD ── */
    .leaderboard {
      background: linear-gradient(180deg, #1a0a00 0%, #2d1600 100%);
      border-left: 4px solid var(--yellow);
      display: flex; flex-direction: column;
    }
    .lb-header {
      background: linear-gradient(135deg, #cc0000, #ff4444);
      padding: 14px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px; color: var(--yellow);
      text-shadow: 2px 2px 0 #660000;
      border-bottom: 3px solid var(--yellow);
      text-align: center;
    }
    .lb-scroll { flex: 1; overflow-y: auto; }
    .lb-scroll::-webkit-scrollbar { width: 4px; }
    .lb-scroll::-webkit-scrollbar-thumb { background: #cc0000; border-radius: 2px; }

    .lb-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.3s;
    }
    .lb-row:hover { background: rgba(255,255,255,0.05); }

    .lb-pos {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px; width: 24px; text-align: center; flex-shrink: 0;
    }
    .lb-pos.p1 { color: #ffd700; }
    .lb-pos.p2 { color: #c0c0c0; }
    .lb-pos.p3 { color: #cd7f32; }
    .lb-pos.rest { color: #666; font-size: 9px; }

    .lb-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.15);
    }
    .lb-avatar-fb {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; color: #fff; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.15);
    }

    .lb-info { flex: 1; min-width: 0; }
    .lb-name { font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-metres { font-size: 11px; color: var(--yellow); font-weight: 700; }

    .lb-move {
      font-size: 10px; font-weight: 900; flex-shrink: 0;
      padding: 2px 5px; border-radius: 3px;
    }
    .lb-move.up   { background: #155a15; color: #52c41a; }
    .lb-move.down { background: #5a0000; color: #ff4444; }
    .lb-move.same { color: #444; }

    /* KART colours per position */
    .kc0 { background: #cc0000; }
    .kc1 { background: #0055cc; }
    .kc2 { background: #00aa44; }
    .kc3 { background: #cc8800; }
    .kc4 { background: #8800cc; }
    .kc5 { background: #cc0088; }
    .kc6 { background: #00aacc; }
    .kc7 { background: #cc4400; }
    .kc8 { background: #446600; }
    .kc9 { background: #004466; }
  </style>
</head>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://oxgehlmalbvppjmdaswn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_43D7ggkEiM_OpKpakPVxSQ_uHN35QbN';
const STORAGE_URL  = `${SUPABASE_URL}/storage/v1/object/public/images/`;
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Kart colours ──────────────────────────────────────────────────
const KART_COLOURS = [
  '#cc0000','#1155cc','#00994d','#cc8800',
  '#8800cc','#cc0088','#00aacc','#cc5500',
  '#556600','#005577'
];

// ── Track path: Mario Kart style winding road ─────────────────────
// Defined as a series of bezier control points forming a closed loop
// We'll use a parametric path on the canvas

function buildTrackPath(W, H) {
  // Control points for a fun winding track (normalised 0-1, will scale to canvas)
  const pts = [
    // Start straight (top)
    { x: 0.5, y: 0.08 },
    // Right curve going down
    { x: 0.82, y: 0.08 },
    { x: 0.88, y: 0.20 },
    { x: 0.88, y: 0.35 },
    // Chicane right
    { x: 0.88, y: 0.45 },
    { x: 0.70, y: 0.48 },
    { x: 0.72, y: 0.60 },
    // Bottom right sweep
    { x: 0.75, y: 0.80 },
    { x: 0.60, y: 0.88 },
    // Bottom straight
    { x: 0.40, y: 0.88 },
    // Bottom left hairpin
    { x: 0.22, y: 0.88 },
    { x: 0.12, y: 0.75 },
    { x: 0.18, y: 0.60 },
    // Left chicane
    { x: 0.24, y: 0.50 },
    { x: 0.14, y: 0.40 },
    { x: 0.12, y: 0.28 },
    // Top left curve back to start
    { x: 0.12, y: 0.10 },
    { x: 0.30, y: 0.06 },
    { x: 0.5,  y: 0.08 },
  ].map(p => ({ x: p.x * W, y: p.y * H }));
  return pts;
}

// Get point on track at t (0..1) using Catmull-Rom spline
function catmullRomPoint(pts, t) {
  const n  = pts.length - 1;
  const ft = t * n;
  const i  = Math.min(Math.floor(ft), n - 1);
  const u  = ft - i;

  const p0 = pts[Math.max(0, i - 1)];
  const p1 = pts[i];
  const p2 = pts[Math.min(n, i + 1)];
  const p3 = pts[Math.min(n, i + 2)];

  const x = 0.5 * ((2*p1.x) + (-p0.x+p2.x)*u + (2*p0.x-5*p1.x+4*p2.x-p3.x)*u*u + (-p0.x+3*p1.x-3*p2.x+p3.x)*u*u*u);
  const y = 0.5 * ((2*p1.y) + (-p0.y+p2.y)*u + (2*p0.y-5*p1.y+4*p2.y-p3.y)*u*u + (-p0.y+3*p1.y-3*p2.y+p3.y)*u*u*u);
  return { x, y };
}

function catmullRomAngle(pts, t) {
  const dt = 0.005;
  const a  = catmullRomPoint(pts, Math.max(0, t - dt));
  const b  = catmullRomPoint(pts, Math.min(1, t + dt));
  return Math.atan2(b.y - a.y, b.x - a.x);
}

// ── Canvas drawing ────────────────────────────────────────────────
const canvas = document.getElementById('raceCanvas');
const ctx    = canvas.getContext('2d');
let trackPts = [];
let W = 0, H = 0;

function resizeCanvas() {
  const area = document.getElementById('trackArea');
  W = area.offsetWidth;
  H = area.offsetHeight;
  canvas.width  = W;
  canvas.height = H;
  trackPts = buildTrackPath(W, H);
  drawScene();
}

function drawScene() {
  if (!W || !H) return;
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  sky.addColorStop(0, '#3a7bd5');
  sky.addColorStop(1, '#7ab8f5');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Hills
  drawHills();

  // Ground
  const ground = ctx.createLinearGradient(0, H * 0.48, 0, H);
  ground.addColorStop(0, '#52c41a');
  ground.addColorStop(1, '#237804');
  ctx.fillStyle = ground;
  ctx.fillRect(0, H * 0.48, W, H * 0.52);

  // Track shadow
  drawTrackLayer(28, 'rgba(0,0,0,0.25)', false);
  // Track border (red/white kerbs)
  drawKerbs();
  // Track asphalt
  drawTrackLayer(20, '#666', false);
  // Track centre line
  drawTrackLayer(1, 'rgba(255,255,255,0.4)', true, [15, 10]);

  // Start/finish line
  drawStartFinish();

  // Karts
  drawKarts();
}

function drawHills() {
  ctx.save();
  // Back hills
  ctx.fillStyle = '#1a6b3a';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.55);
  for (let x = 0; x <= W; x += 20) {
    const y = H * 0.42 + Math.sin(x * 0.008) * H * 0.06 + Math.sin(x * 0.02) * H * 0.03;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H);
  ctx.closePath(); ctx.fill();

  // Front hills
  ctx.fillStyle = '#237804';
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 15) {
    const y = H * 0.62 + Math.sin(x * 0.015 + 1) * H * 0.05 + Math.sin(x * 0.03 + 2) * H * 0.02;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawTrackLayer(width, colour, dashed, dashPat) {
  ctx.save();
  ctx.strokeStyle = colour;
  ctx.lineWidth   = width;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  if (dashed && dashPat) ctx.setLineDash(dashPat);
  ctx.beginPath();
  const p0 = catmullRomPoint(trackPts, 0);
  ctx.moveTo(p0.x, p0.y);
  for (let i = 1; i <= 200; i++) {
    const p = catmullRomPoint(trackPts, i / 200);
    ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawKerbs() {
  const steps = 200;
  for (let i = 0; i < steps; i++) {
    const t    = i / steps;
    const p    = catmullRomPoint(trackPts, t);
    const ang  = catmullRomAngle(trackPts, t);
    const perp = ang + Math.PI / 2;
    const d    = 23;
    const col  = Math.floor(i / 4) % 2 === 0 ? '#dd0000' : '#fff';

    // Left kerb
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(p.x + Math.cos(perp)*d, p.y + Math.sin(perp)*d, 3, 0, Math.PI*2);
    ctx.fill();

    // Right kerb
    ctx.beginPath();
    ctx.arc(p.x - Math.cos(perp)*d, p.y - Math.sin(perp)*d, 3, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawStartFinish() {
  const p   = catmullRomPoint(trackPts, 0);
  const ang = catmullRomAngle(trackPts, 0);
  const perp = ang + Math.PI / 2;

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(perp);

  const sqW = 6, sqH = 5;
  const rows = 4, cols = 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#fff' : '#000';
      ctx.fillRect(c * sqW - cols * sqW / 2, r * sqH - rows * sqH / 2, sqW, sqH);
    }
  }

  // FLAG POLE
  ctx.fillStyle = '#fff';
  ctx.fillRect(-1, -rows * sqH / 2 - 20, 2, 20);

  ctx.restore();
}

// ── Kart drawing ──────────────────────────────────────────────────
let racers  = [];
let kartImgs = {}; // preloaded Image objects

function drawKarts() {
  // Draw in reverse order so leader is on top
  [...racers].reverse().forEach((r, ri) => {
    const actualIdx = racers.length - 1 - ri;
    const t   = r.t;
    const p   = catmullRomPoint(trackPts, t);
    const ang = catmullRomAngle(trackPts, t);

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(ang);

    const col = KART_COLOURS[actualIdx % KART_COLOURS.length];

    // Shadow
    ctx.save();
    ctx.translate(3, 4);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 0, 20, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Kart body
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.roundRect(-18, -7, 36, 14, 4);
    ctx.fill();

    // Windshield
    ctx.fillStyle = 'rgba(150,220,255,0.8)';
    ctx.beginPath();
    ctx.roundRect(2, -5, 10, 10, 2);
    ctx.fill();

    // Nose cone
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(18, -4);
    ctx.lineTo(26, 0);
    ctx.lineTo(18, 4);
    ctx.closePath();
    ctx.fill();

    // Rear wing
    ctx.fillStyle = '#222';
    ctx.fillRect(-20, -9, 4, 18);

    // Wheels (4)
    const wheelPositions = [
      [-10, -10], [12, -10], [-10, 10], [12, 10]
    ];
    wheelPositions.forEach(([wx, wy]) => {
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.ellipse(wx, wy, 5, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.stroke();
    });

    // Driver photo or initials
    ctx.save();
    ctx.beginPath();
    ctx.arc(-2, 0, 8, 0, Math.PI * 2);
    ctx.clip();

    const img = kartImgs[r.id];
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, -10, -8, 16, 16);
    } else {
      ctx.fillStyle = '#fff';
      ctx.fillRect(-10, -8, 16, 16);
      ctx.fillStyle = col;
      ctx.font = 'bold 6px Barlow Condensed, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(r.initials, -2, 0);
    }
    ctx.restore();

    // Rank badge
    ctx.fillStyle = actualIdx === 0 ? '#ffd700' : actualIdx === 1 ? '#c0c0c0' : actualIdx === 2 ? '#cd7f32' : '#333';
    ctx.beginPath();
    ctx.arc(-16, -12, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = actualIdx < 3 ? '#000' : '#fff';
    ctx.font = 'bold 7px Barlow Condensed, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(actualIdx + 1), -16, -12);

    // Name label
    ctx.fillStyle = '#000';
    ctx.font = 'bold 8px Barlow Condensed, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const firstName = r.name.split(' ')[0];
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.strokeText(firstName, 0, 13);
    ctx.fillText(firstName, 0, 13);

    ctx.restore();
  });
}

// ── Animation loop ─────────────────────────────────────────────────
let targetTs    = {};
let currentTs   = {};
let animRunning = false;

function animateTo(newRacers) {
  newRacers.forEach(r => {
    targetTs[r.id]  = r.t;
    if (currentTs[r.id] === undefined) currentTs[r.id] = r.t;
  });
  if (!animRunning) {
    animRunning = true;
    requestAnimationFrame(animFrame);
  }
}

function animFrame() {
  let allDone = true;
  racers.forEach(r => {
    const curr = currentTs[r.id] ?? r.t;
    const tgt  = targetTs[r.id]  ?? r.t;
    const diff = tgt - curr;
    if (Math.abs(diff) > 0.0005) {
      currentTs[r.id] = curr + diff * 0.04; // ease
      allDone = false;
    } else {
      currentTs[r.id] = tgt;
    }
    r.t = currentTs[r.id];
  });

  drawScene();
  if (!allDone) requestAnimationFrame(animFrame);
  else animRunning = false;
}

// ── Preload photos ─────────────────────────────────────────────────
function preloadImages(newRacers) {
  newRacers.forEach(r => {
    if (!kartImgs[r.id]) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = r.img;
      img.onload  = () => { kartImgs[r.id] = img; drawScene(); };
      img.onerror = () => { kartImgs[r.id] = null; };
      kartImgs[r.id] = img;
    }
  });
}

// ── Load race data ─────────────────────────────────────────────────
let prevPositions = {};

async function loadRace() {
  const from = '2026-04-01';
  const to   = '2027-03-31';

  const { data: ops } = await sb
    .from('transaction_operatives')
    .select(`employee_id,
             transactions!inner(date, bonus_metres),
             employees!inner(full_name, initials, status)`)
    .gte('transactions.date', from)
    .lte('transactions.date', to)
    .not('employees.status', 'eq', 'inactive')
    .not('employees.status', 'eq', 'token');

  const empMap = {};
  (ops || []).forEach(o => {
    const emp = o.employees;
    if (!emp) return;
    const id = o.employee_id;
    if (!empMap[id]) empMap[id] = { id, name: emp.full_name, initials: emp.initials, metres: 0 };
    empMap[id].metres += parseFloat(o.transactions?.bonus_metres || 0);
  });

  const sorted = Object.values(empMap)
    .sort((a, b) => b.metres - a.metres);

  // If no data yet (new FY), show all active employees at the start line
  if (!sorted.length) {
    const { data: emps } = await sb.from('employees')
      .select('id, full_name, initials, status')
      .in('status', ['active', 'probation'])
      .order('full_name');

    (emps || []).forEach(e => {
      if (e.status !== 'token') sorted.push({ id: e.id, name: e.full_name, initials: e.initials, metres: 0 });
    });
  }

  return sorted.map((e, i, arr) => ({
    ...e,
    rank: i + 1,
    // Space karts evenly — leader near t=0.98, last at t=0.60 (or compressed if few)
    t: arr.length === 1 ? 0.98 : Math.max(0.02, 0.98 - (i / Math.max(arr.length - 1, 1)) * 0.38),
    img: `${STORAGE_URL}${encodeURIComponent(e.name)}_cvface1.jpg`,
  }));
}

// ── Leaderboard ────────────────────────────────────────────────────
function renderLeaderboard(newRacers) {
  const list = document.getElementById('lb-list');
  list.innerHTML = newRacers.map((r, i) => {
    const posClass = i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : 'rest';
    const prev     = prevPositions[r.id];
    let moveHtml   = '';
    if (prev !== undefined && prev !== i) {
      if (prev > i) moveHtml = `<div class="lb-move up">▲${prev - i}</div>`;
      else          moveHtml = `<div class="lb-move down">▼${i - prev}</div>`;
    }
    const col = KART_COLOURS[i % KART_COLOURS.length];
    return `<div class="lb-row">
      <div class="lb-pos ${posClass}">${i + 1}</div>
      <img class="lb-avatar" src="${r.img}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
           alt="${r.name}">
      <div class="lb-avatar-fb kc${i % 10}" style="display:none">${r.initials}</div>
      <div class="lb-info">
        <div class="lb-name">${r.name}</div>
        <div class="lb-metres">${r.metres > 0 ? Math.round(r.metres).toLocaleString() + 'm' : 'On the grid'}</div>
      </div>
      ${moveHtml}
    </div>`;
  }).join('');
}

// ── Init ───────────────────────────────────────────────────────────
async function init() {
  // Generate clouds
  const cloudsEl = document.getElementById('clouds');
  for (let i = 0; i < 6; i++) {
    const c = document.createElement('div');
    c.className = 'cloud';
    const w = 80 + Math.random() * 120;
    c.style.cssText = `
      width:${w}px; height:${w * 0.4}px;
      top:${5 + Math.random() * 25}%;
      left:${Math.random() * 100}%;
      animation-duration:${25 + Math.random() * 40}s;
      animation-delay:-${Math.random() * 30}s;
      opacity:${0.6 + Math.random() * 0.3}`;
    cloudsEl.appendChild(c);
  }

  // Resize canvas
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Load data
  const newRacers = await loadRace();
  racers = newRacers;

  preloadImages(racers);

  // Init positions
  racers.forEach(r => { currentTs[r.id] = r.t; targetTs[r.id] = r.t; });
  prevPositions = Object.fromEntries(racers.map((r, i) => [r.id, i]));

  // Hide spinner
  document.getElementById('spinner').style.display = 'none';

  renderLeaderboard(racers);
  drawScene();

  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

  // Refresh every 60s
  setInterval(async () => {
    const newRacers = await loadRace();
    const prevPos   = Object.fromEntries(racers.map((r, i) => [r.id, i]));

    racers = newRacers;
    preloadImages(racers);
    renderLeaderboard(racers);
    animateTo(racers);

    prevPositions = prevPos;

    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  }, 60000);

  // Keep drawing
  function loop() { drawScene(); requestAnimationFrame(loop); }
  loop();
}

init();
</script>
</body>
</html>
