<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHB — Admin Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #c00; --red-dk: #900; --red-lt: #fff0f0;
      --gold: #f9a825; --green: #2a9d2a; --green-lt: #f0fff0;
      --orange: #e65100; --orange-lt: #fff3e0;
      --blue: #1a73e8; --blue-lt: #e8f0fe;
      --grey: #f4f5f7; --border: #e0e0e0; --text: #1a1a1a;
      --muted: #888; --white: #fff;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
      --radius: 10px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--grey); color: var(--text); min-height: 100vh; }

    /* Login */
    .login-screen { min-height:100vh; display:none; align-items:center; justify-content:center; background:linear-gradient(135deg,#1a1a2e 0%,#c00 100%); padding:20px; }
    .login-card { background:var(--white); border-radius:16px; box-shadow:var(--shadow-lg); padding:40px 36px; width:100%; max-width:400px; text-align:center; }
    .login-card img { max-width:120px; margin-bottom:24px; }
    .login-card h1  { font-size:22px; font-weight:700; margin-bottom:6px; }
    .login-card p   { font-size:13px; color:var(--muted); margin-bottom:24px; line-height:1.6; }
    .login-input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; outline:none; margin-bottom:12px; transition:border-color 0.15s; }
    .login-input:focus { border-color:var(--red); }
    .login-btn { width:100%; padding:12px; background:var(--red); color:var(--white); border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:background 0.15s; }
    .login-btn:hover { background:var(--red-dk); }
    .login-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .login-msg { margin-top:14px; font-size:13px; min-height:20px; line-height:1.5; }
    .login-msg.success { color:var(--green); }
    .login-msg.error   { color:var(--red); }

    /* App */
    .app  { display:none; }
    .main { padding:24px; }

    /* Page header */
    .page-header { margin-bottom:24px; }
    .page-header h2 { font-size:22px; font-weight:700; }
    .page-header p  { font-size:13px; color:var(--muted); margin-top:3px; }

    /* Stats */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
    .stat-card { background:var(--white); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:4px; }
    .stat-card .stat-icon { font-size:22px; margin-bottom:4px; }
    .stat-card .stat-val  { font-size:26px; font-weight:700; line-height:1; }
    .stat-card .stat-lbl  { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; }
    .stat-card .stat-sub  { font-size:11px; color:var(--muted); margin-top:2px; }
    .stat-card.green .stat-val { color:var(--green); }
    .stat-card.red   .stat-val { color:var(--red); }
    .stat-card.gold  .stat-val { color:var(--gold); }
    .stat-card.blue  .stat-val { color:var(--blue); }

    /* Grid */
    .dashboard-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .panel { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .panel.full { grid-column:1/-1; }
    .panel-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .panel-header h3 { font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
    .panel-body { padding:16px 18px; }

    /* Tasks */
    .task-item { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
    .task-item:last-child { border-bottom:none; }
    .task-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
    .task-icon.warn   { background:var(--orange-lt); }
    .task-icon.danger { background:var(--red-lt); }
    .task-body  { flex:1; min-width:0; }
    .task-title { font-size:13px; font-weight:600; }
    .task-desc  { font-size:11px; color:var(--muted); margin-top:2px; line-height:1.4; }
    .task-action { font-size:11px; color:var(--blue); text-decoration:underline; margin-top:4px; display:inline-block; }
    .all-clear  { text-align:center; padding:24px; color:var(--green); font-size:14px; }
    .all-clear .icon { font-size:36px; margin-bottom:8px; }

    /* People */
    .people-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .people-item:last-child { border-bottom:none; }
    .people-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; flex-shrink:0; border:2px solid var(--border); }
    .people-name   { font-size:13px; font-weight:600; flex:1; }
    .people-meta   { font-size:11px; color:var(--muted); }
    .days-badge    { font-size:11px; font-weight:600; padding:2px 8px; border-radius:10px; white-space:nowrap; }
    .days-badge.urgent { background:var(--red-lt);    color:var(--red); }
    .days-badge.soon   { background:var(--orange-lt); color:var(--orange); }
    .days-badge.future { background:var(--blue-lt);   color:var(--blue); }

    /* Actions */
    .actions-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
    .action-btn { display:flex; flex-direction:column; align-items:center; gap:8px; padding:16px 12px; background:var(--grey); border:1.5px solid var(--border); border-radius:var(--radius); cursor:pointer; text-decoration:none; transition:all 0.15s; color:var(--text); }
    .action-btn:hover { border-color:var(--red); background:var(--red-lt); }
    .action-btn .action-icon  { font-size:24px; }
    .action-btn .action-label { font-size:12px; font-weight:600; text-align:center; }

    /* Spinner */
    .spin-wrap { display:flex; justify-content:center; padding:30px; }
    .spinner   { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:768px) {
      .dashboard-grid { grid-template-columns:1fr; }
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .main { padding:16px; }
    }
  </style>
</head>
<body>

  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <img src="/img/JHB Logo.png" alt="JHB">
      <h1>Admin Portal</h1>
      <p>Sign in with your JHB Microsoft account to continue.</p>
      <button class="login-btn" id="loginBtn" onclick="signInWithMicrosoft()">
        <img src="https://authjs.dev/img/providers/microsoft-entra-id.svg" style="height:18px;vertical-align:middle;margin-right:8px;">
        Sign in with Microsoft
      </button>
      <div class="login-msg" id="loginMsg"></div>
    </div>
  </div>

  <div class="app" id="app">
    <div id="sidebarMount"></div>
    <main class="main">
      <div class="page-header">
        <h2>Dashboard</h2>
        <p id="dashSubtitle">Loading…</p>
      </div>

      <div class="stats-row" id="statsRow">
        <div class="spin-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
      </div>

      <div class="dashboard-grid" id="dashGrid" style="display:none">

        <div class="panel">
          <div class="panel-header">
            <h3>⚠️ Tasks <span id="taskCount" style="font-weight:400;color:var(--muted);font-size:12px;"></span></h3>
          </div>
          <div class="panel-body" id="tasksPanel"><div class="spin-wrap"><div class="spinner"></div></div></div>
        </div>

        <div class="panel">
          <div class="panel-header"><h3>🚪 Upcoming Leavers</h3></div>
          <div class="panel-body" id="leaversPanel"><div class="spin-wrap"><div class="spinner"></div></div></div>
        </div>

        <div class="panel">
          <div class="panel-header"><h3>🔍 On Probation</h3></div>
          <div class="panel-body" id="probationPanel"><div class="spin-wrap"><div class="spinner"></div></div></div>
        </div>

        <div class="panel full">
          <div class="panel-header"><h3>⚡ Quick Actions</h3></div>
          <div class="panel-body">
            <div class="actions-grid">
              <a class="action-btn" href="employees.html"><span class="action-icon">👥</span><span class="action-label">Manage Employees</span></a>
              <a class="action-btn" href="transactions.html"><span class="action-icon">🔧</span><span class="action-label">Transactions</span></a>
              <a class="action-btn" href="month-end.html"><span class="action-icon">📅</span><span class="action-label">Run Month End</span></a>
              <a class="action-btn" href="notifications.html"><span class="action-icon">🔔</span><span class="action-label">Send Notifications</span></a>
              <a class="action-btn" href="/bonus-metres/new-this-month.html" target="_blank"><span class="action-icon">🏆</span><span class="action-label">View Leaderboard</span></a>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
  <script>
    const IMG_PATH_WEB   = '/img/';
    let allEmployees = [];

    async function signInWithMicrosoft() {
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('loginMsg');
      btn.disabled = true;
      btn.textContent = 'Redirecting…';
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'azure',
        options: {
          scopes: 'email',
          redirectTo: 'https://apps-nu-sand.vercel.app/bonus-metres/dashboard.html',
          skipBrowserRedirect: false
        }
      });
      if (error) {
        msg.textContent = '✗ ' + error.message;
        msg.className   = 'login-msg error';
        btn.disabled    = false;
        btn.innerHTML   = '<img src="https://authjs.dev/img/providers/microsoft-entra-id.svg" style="height:18px;vertical-align:middle;margin-right:8px;"> Sign in with Microsoft';
      }
    }

    async function init() {
      console.log('init() called');
      console.log('URL hash:', location.hash);
      console.log('URL search:', location.search);

      // Handle OAuth callback — extract tokens from URL hash and let Supabase
      // set the full session (including fetching the user object) via setSession()
      // Note: manual cookieStorage writes omitted — setSession() writes via the
      // adapter automatically, including the user object that getSession() needs.
      if (location.hash && location.hash.includes('access_token')) {
        console.log('Found access_token in hash');
        const params       = new URLSearchParams(location.hash.replace('#', ''));
        const accessToken  = params.get('access_token');
        const refreshToken = params.get('refresh_token');
        console.log('access_token found:', !!accessToken);

        if (accessToken) {
          try {
            const { data, error } = await sb.auth.setSession({
              access_token:  accessToken,
              refresh_token: refreshToken || ''
            });
            console.log('setSession result — user:', data?.session?.user?.email ?? 'none', '| error:', error?.message ?? 'none');
          } catch (err) {
            console.log('setSession failed:', err.message);
          }
          history.replaceState(null, '', location.pathname);
        }
      } else {
        console.log('No access_token in hash');
      }

      console.log('Checking getSession...');
      const { data, error } = await sb.auth.getSession();
      const session = data?.session;
      console.log('Session result:', session ? 'found' : 'null', '| User:', session?.user?.email ?? 'none', '| Error:', error);

      // FIX: guard on session.user — a session without a user object cannot proceed
      if (!session || !session.user) {
        console.log('No session or no user — showing login screen');
        document.getElementById('loginScreen').style.display = 'flex';
        return;
      }

      console.log('Session found — showing dashboard');
      await showDashboard();
    }

    async function showDashboard() {
      const ok = await requireAuth();
      if (!ok) { document.getElementById('loginScreen').style.display = 'flex'; return; }
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('dashSubtitle').textContent =
        `Welcome back, ${currentAdmin.name || 'Admin'} — ` +
        new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
      await loadDashboard();
    }

    async function loadDashboard() {
      const { data, error } = await sb.from('employees').select('*').order('full_name');
      if (error) { showToast('Error: ' + error.message, 'error'); return; }
      allEmployees = data;
      await renderStats(); await renderTasks(); renderLeavers(); renderProbation();
      document.getElementById('dashGrid').style.display = 'grid';
    }

    async function renderStats() {
      const today   = new Date().toISOString().split('T')[0];
      const active  = allEmployees.filter(e => e.status === 'active').length;
      const prob    = allEmployees.filter(e => e.status === 'probation').length;
      const leaving = allEmployees.filter(e => e.status === 'inactive' && e.leaving_date && e.leaving_date >= today).length;
      const month   = new Date().toLocaleDateString('en-GB', { month:'long', year:'numeric' });

      // Calculate outstanding pot per-person, floored at zero each
      // so someone in debt doesn't reduce the pot for everyone else

      // Unpaid transaction shares per employee
      const { data: unpaidTx } = await sb
        .from('transaction_operatives')
        .select('employee_id, share_value, transactions!inner(date_paid)')
        .is('transactions.date_paid', null);

      // Unpaid bonus entries per employee (excluding leavers)
      const { data: unpaidEntries } = await sb
        .from('bonus_entries')
        .select('employee_id, type, amount, employees(status, leaving_date)')
        .is('date_paid', null);

      const perPerson = {};
      (unpaidTx || []).forEach(r => {
        if (!perPerson[r.employee_id]) perPerson[r.employee_id] = { earned: 0, ded: 0 };
        perPerson[r.employee_id].earned += parseFloat(r.share_value);
      });
      (unpaidEntries || []).forEach(e => {
        const emp = e.employees;
        const hasLeft = emp && emp.status === 'inactive' && emp.leaving_date && emp.leaving_date < today;
        if (hasLeft) return;
        if (!perPerson[e.employee_id]) perPerson[e.employee_id] = { earned: 0, ded: 0 };
        if (e.type === 'special_bonus') perPerson[e.employee_id].earned += parseFloat(e.amount);
        if (e.type === 'deduction')     perPerson[e.employee_id].ded    += parseFloat(e.amount);
      });

      // Sum per-person net floored at zero
      let outstandingPot = Object.values(perPerson)
        .reduce((sum, p) => sum + Math.max(0, p.earned - p.ded), 0);

      // Fetch last month-end run
      const { data: lastRun } = await sb
        .from('month_end_runs')
        .select('period_name, total_paid, payment_date')
        .order('payment_date', { ascending: false })
        .limit(1);

      const lastPaid    = lastRun?.[0]?.total_paid ?? null;
      const lastPeriod  = lastRun?.[0]?.period_name ?? null;

      const potVal     = `£${outstandingPot.toFixed(2)}`;
      const potSub     = lastPaid
        ? `Last paid: £${parseFloat(lastPaid).toFixed(2)} (${lastPeriod})`
        : 'No month end run yet';

      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card green"><div class="stat-icon">👥</div><div class="stat-val">${active}</div><div class="stat-lbl">Active Staff</div><div class="stat-sub">${prob} on probation</div></div>
        <div class="stat-card blue"><div class="stat-icon">📅</div><div class="stat-val" style="font-size:16px;padding-top:4px;">${month}</div><div class="stat-lbl">Current Month</div><div class="stat-sub">${lastPeriod ? `Last run: ${lastPeriod}` : 'Month end not yet run'}</div></div>
        <div class="stat-card ${leaving > 0 ? 'red' : 'green'}"><div class="stat-icon">🚪</div><div class="stat-val">${leaving}</div><div class="stat-lbl">Upcoming Leavers</div><div class="stat-sub">Next 30 days</div></div>
        <div class="stat-card gold"><div class="stat-icon">💷</div><div class="stat-val" style="font-size:18px;padding-top:4px">${potVal}</div><div class="stat-lbl">Outstanding Bonus Pot</div><div class="stat-sub">${potSub}</div></div>`;
    }

    async function renderTasks() {
      const tasks = [];
      const missingPhotos = await checkMissingPhotos();
      if (missingPhotos.length) tasks.push({ icon:'🖼️', type:'warn', title:`${missingPhotos.length} employee${missingPhotos.length>1?'s':''} missing photo`, desc:missingPhotos.slice(0,3).map(e=>e.full_name).join(', ')+(missingPhotos.length>3?` +${missingPhotos.length-3} more`:''), action:'Fix in Employee Management', href:'employees.html?filter=no-photo' });
      const missingEmails = allEmployees.filter(e => (e.status==='active'||e.status==='probation') && !e.email);
      if (missingEmails.length) tasks.push({ icon:'📧', type:'warn', title:`${missingEmails.length} employee${missingEmails.length>1?'s':''} missing email`, desc:missingEmails.slice(0,3).map(e=>e.full_name).join(', ')+(missingEmails.length>3?` +${missingEmails.length-3} more`:''), action:'Fix in Employee Management', href:'employees.html?filter=no-email' });
      const today = new Date(); const in7 = new Date(today); in7.setDate(today.getDate()+7);
      const urgent = allEmployees.filter(e => { if(e.status!=='inactive'||!e.leaving_date) return false; const ld=new Date(e.leaving_date); return ld>=today&&ld<=in7; });
      if (urgent.length) tasks.push({ icon:'🚨', type:'danger', title:`${urgent.length} staff leaving within 7 days`, desc:urgent.map(e=>`${e.full_name} (${e.leaving_date})`).join(', '), action:null });
      const badge = document.getElementById('taskBadge');
      if (tasks.length) { badge.textContent=tasks.length; badge.style.display='inline-block'; } else badge.style.display='none';
      document.getElementById('taskCount').textContent = tasks.length ? `(${tasks.length})` : '';
      document.getElementById('tasksPanel').innerHTML = !tasks.length
        ? `<div class="all-clear"><div class="icon">✅</div><div>All clear — no tasks outstanding</div></div>`
        : tasks.map(t=>`<div class="task-item"><div class="task-icon ${t.type}">${t.icon}</div><div class="task-body"><div class="task-title">${t.title}</div><div class="task-desc">${t.desc}</div>${t.action?`<a class="task-action" href="${t.href}">${t.action} →</a>`:''}</div></div>`).join('');
    }

    async function checkMissingPhotos() {
      const active = allEmployees.filter(e => e.status==='active'||e.status==='probation');
      const checks = await Promise.all(active.map(async e => {
        try { const r = await fetch(`${IMG_PATH_WEB}${encodeURIComponent(e.full_name+'_cvface1.png')}`,{method:'HEAD'}); return r.ok?null:e; } catch { return e; }
      }));
      return checks.filter(Boolean);
    }

    function renderLeavers() {
      const today=new Date(); const in30=new Date(today); in30.setDate(today.getDate()+30);
      const leavers=allEmployees.filter(e=>e.status==='inactive'&&e.leaving_date&&new Date(e.leaving_date)>=today&&new Date(e.leaving_date)<=in30).sort((a,b)=>new Date(a.leaving_date)-new Date(b.leaving_date));
      const fallback = e => `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 36%22><circle cx=%2218%22 cy=%2218%22 r=%2218%22 fill=%22%23ddd%22/><text x=%2218%22 y=%2223%22 text-anchor=%22middle%22 font-size=%2214%22 fill=%22%23999%22>${e.full_name.charAt(0)}</text></svg>`;
      document.getElementById('leaversPanel').innerHTML = !leavers.length
        ? `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">No upcoming leavers in the next 30 days</div>`
        : leavers.map(e=>{const d=Math.ceil((new Date(e.leaving_date)-today)/86400000);const c=d<=7?'urgent':d<=14?'soon':'future';return`<div class="people-item"><img class="people-avatar" src="${IMG_PATH_WEB}${encodeURIComponent(e.full_name+'_cvface1.png')}" onerror="this.src='${fallback(e)}'"><div style="flex:1;min-width:0;"><div class="people-name">${e.full_name}</div><div class="people-meta">Leaving ${new Date(e.leaving_date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div></div><span class="days-badge ${c}">${d}d</span></div>`;}).join('');
    }

    function renderProbation() {
      const onProb=allEmployees.filter(e=>e.status==='probation');
      const fallback = e => `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 36%22><circle cx=%2218%22 cy=%2218%22 r=%2218%22 fill=%22%23ddd%22/><text x=%2218%22 y=%2223%22 text-anchor=%22middle%22 font-size=%2214%22 fill=%22%23999%22>${e.full_name.charAt(0)}</text></svg>`;
      document.getElementById('probationPanel').innerHTML = !onProb.length
        ? `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">No staff currently on probation</div>`
        : onProb.map(e=>`<div class="people-item"><img class="people-avatar" src="${IMG_PATH_WEB}${encodeURIComponent(e.full_name+'_cvface1.png')}" onerror="this.src='${fallback(e)}'" style="border-color:var(--orange)"><div style="flex:1;min-width:0;"><div class="people-name">${e.full_name}</div><div class="people-meta">${e.start_date?'Since '+new Date(e.start_date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'Start date not set'}</div></div><a href="employees.html" style="font-size:11px;color:var(--blue);">Review →</a></div>`).join('');
    }

    init();

  </script>
</body>
</html>
