<!-- Save as: this-month.html (paged with search, fast parallel icon loading) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Bonus Metres – Current Month's Leaderboard</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      display: flex; flex-direction: column;
    }
    .logo { text-align: center; margin: 20px 0 10px; }
    .logo img { max-width: 200px; height: auto; }
    .title-block { text-align: center; margin: 20px 0 10px; }
    .title-main { font-size: 32px; font-weight: bold; }
    .title-sub { font-size: 18px; color: #444; }
    .nav-row {
      display: flex; align-items: center;
      justify-content: center; gap: 20px; margin-top: 6px;
    }
    .nav-arrow { font-size: 32px; cursor: pointer; user-select: none; }
    .search-container {
      position: relative; margin-top: 10px;
      display: flex; justify-content: center;
    }
    .search-input {
      padding: 6px 10px; font-size: 16px;
      width: 60%; max-width: 400px; text-align: center;
    }
    .search-dropdown {
      position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%);
      width: 60%; max-width: 400px;
      background: #fff; border: 1px solid #ccc;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      z-index: 10; display: none;
      max-height: 200px; overflow-y: auto;
    }
    .search-item { padding: 6px 10px; cursor: pointer; text-align: left; font-size: 14px; }
    .search-item:hover { background: #f0f0f0; }
    .search-item.disabled { cursor: default; color: #999; }
    table {
      width: 100%; max-width: 750px; margin: auto;
      border-collapse: collapse; table-layout: fixed;
    }
    th, td { padding: 8px; text-align: center; }
    th { background: #f4f4f4; }
    img.face { border-radius: 50%; vertical-align: middle; }
    td.rank { font-weight: bold; }
    .static-section { flex-shrink: 0; }
    .scrollable-section { flex-grow: 1; overflow: hidden; position: relative; }
    .scrollable-inner {
      height: 100%; overflow-y: auto;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .scrollable-inner::-webkit-scrollbar { display: none; }
    .highlight-row { background-color: #fff7c2; transition: background-color 1s ease; }

    /* Spinner */
    .spinner-wrap {
      display: flex; justify-content: center;
      align-items: center; padding: 40px 0;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid #f4f4f4;
      border-top-color: #c00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="static-section">
    <div class="logo">
      <img src="/img/JHB Logo.png" alt="JHB Logo">
    </div>
    <div class="title-block">
      <div class="title-main">Bonus Metres – Current Month's Leaderboard</div>
      <div class="nav-row">
        <span class="nav-arrow" id="nav-prev">&#8592;</span>
        <div class="title-sub" id="title-sub">Positions</div>
        <span class="nav-arrow" id="nav-next">&#8594;</span>
      </div>
      <div class="search-container">
        <input id="searchBox" class="search-input" type="text" placeholder="Search for a name…" />
        <div id="searchDropdown" class="search-dropdown"></div>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Face</th>
          <th>Name</th>
          <th>Positional Change</th>
          <th>Bonus Metres</th>
          <th>Diff. from Leader</th>
        </tr>
      </thead>
      <tbody id="top-rank"></tbody>
    </table>
  </div>

  <div class="scrollable-section">
    <div class="scrollable-inner" id="scroll-container">
      <div class="spinner-wrap" id="spinner">
        <div class="spinner"></div>
      </div>
      <table>
        <tbody id="other-ranks"></tbody>
      </table>
    </div>
  </div>

  <!-- Shared people list -->
  <script src="/js/people.js"></script>
  <script>
    const CSV_URL  = '/bonus-metres/data/actual_distances.csv';
    const IMG_PATH = '/img/';
    const ITEMS_PER_PAGE = 8;

    let ALL_ROWS  = [];
    let ALL_ICONS = [];  // pre-drawn icons cached here

    function getPage() {
      const p = parseInt(new URLSearchParams(location.search).get('page'), 10);
      return Number.isInteger(p) && p > 0 ? p : 1;
    }

    function getHighlightName() {
      return new URLSearchParams(location.search).get('highlight') || null;
    }

    function gotoPage(newPage, highlightName) {
      const params = new URLSearchParams(location.search);
      params.set('page', newPage);
      if (highlightName) { params.set('highlight', highlightName); }
      else { params.delete('highlight'); }
      location.search = params.toString();
    }

    async function loadImageElement(src, size) {
      return new Promise(res => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => res(img);
        img.onerror = () => {
          const c = document.createElement('canvas');
          c.width = c.height = size;
          const ctx = c.getContext('2d');
          ctx.fillStyle = '#ccc';
          ctx.fillRect(0, 0, size, size);
          res(c);
        };
        img.src = src;
      });
    }

    async function drawIcon(name, haloColor) {
      const base = 64, halo = haloColor ? 10 : 0, total = base + 2 * halo;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.height = total;
      if (haloColor) {
        ctx.fillStyle = haloColor;
        ctx.beginPath();
        ctx.arc(total/2, total/2, base/2 + halo, 0, 2*Math.PI);
        ctx.arc(total/2, total/2, base/2, 0, 2*Math.PI);
        ctx.fill('evenodd');
      }
      const img = await loadImageElement(IMG_PATH + encodeURIComponent(name.trim()) + '_cvface1.png', base);
      ctx.drawImage(img, halo, halo, base, base);
      return canvas.toDataURL();
    }

    async function fetchData() {
      const r = await fetch(CSV_URL, { cache: 'no-cache' });
      if (!r.ok) throw new Error('CSV failed: ' + r.status);
      const txt = await r.text();
      const lines = txt.trim().split(/\r?\n/);
      const keys = lines.shift().split(',').map(h => h.trim());
      return lines.map(l => {
        const cols = l.split(',');
        return keys.reduce((o, k, i) => (o[k] = (cols[i] || '').trim(), o), {});
      });
    }

    async function build() {
      const data = await fetchData();
      const rows = data
        .filter(r => r['T/M RANK'] && PEOPLE.includes(r['NAME']))
        .sort((a, b) => +a['T/M RANK'] - +b['T/M RANK']);

      if (!rows.length) return;

      const leaderValue = parseFloat((rows[0]['THIS MONTH'] || '0').replace(/,/g, '')) || 0;
      const counts = rows.reduce((acc, r) => {
        const rk = +r['T/M RANK'];
        acc[rk] = (acc[rk] || 0) + 1;
        return acc;
      }, {});

      let lastRank = null, displayRank = 0;
      rows.forEach((r, idx) => {
        const v = +r['T/M RANK'];
        if (v !== lastRank) { displayRank = idx + 1; lastRank = v; }
        r._display = displayRank;
        r._value = parseFloat((r['THIS MONTH'] || '0').replace(/,/g, '')) || 0;
        r._diff   = leaderValue - r._value;
        r._isTie  = counts[v] > 1;
        r._halo   = r._display === 1 ? 'gold'
                  : r._display === 2 ? 'silver'
                  : r._display === 3 ? '#cd7f32' : null;
      });

      ALL_ROWS = rows;

      // Draw ALL icons in parallel and cache them
      ALL_ICONS = await Promise.all(rows.map(r => drawIcon(r['NAME'], r._halo)));

      // Hide spinner
      document.getElementById('spinner').style.display = 'none';

      setupSearch();
      await renderCurrentPage();
    }

    async function renderCurrentPage() {
      const rows = ALL_ROWS;
      if (!rows.length) return;

      const page       = getPage();
      const totalPages = Math.ceil(rows.length / ITEMS_PER_PAGE);
      const start      = (page - 1) * ITEMS_PER_PAGE;
      const end        = Math.min(start + ITEMS_PER_PAGE, rows.length);
      const highlightName = getHighlightName();

      document.getElementById('title-sub').textContent = `Positions ${start + 1}–${end}`;

      const prevArrow = document.getElementById('nav-prev');
      const nextArrow = document.getElementById('nav-next');
      prevArrow.style.visibility = page === 1 ? 'hidden' : 'visible';
      nextArrow.style.visibility = page === totalPages ? 'hidden' : 'visible';
      prevArrow.onclick = () => { if (page > 1) gotoPage(page - 1); };
      nextArrow.onclick = () => { if (page < totalPages) gotoPage(page + 1); };

      const topEl   = document.getElementById('top-rank');
      const otherEl = document.getElementById('other-ranks');
      topEl.innerHTML = otherEl.innerHTML = '';

      for (let i = start; i < end; i++) {
        const r    = rows[i];
        const icon = ALL_ICONS[i];
        const size = 64 + (r._halo ? 10 : 0);
        const tm   = +r['T/M RANK'];
        const lm   = +r['T/M LAST RANK'] || Infinity;
        const arrowImg  = tm < lm ? 'Green%20Arrow.png' : tm > lm ? 'Red%20Arrow.png' : '';
        const rankTxt   = (r._isTie ? '=' : '') + r._display;
        const metresTxt = r._value.toLocaleString() + 'm';
        const diffTxt   = r._diff === 0 ? 'Leader' : '-' + r._diff.toLocaleString() + 'm';

        const tr = document.createElement('tr');
        tr.dataset.name = r['NAME'];
        tr.innerHTML = `
          <td class="rank">${rankTxt}</td>
          <td><img src="${icon}" width="${size}" height="${size}" class="face"></td>
          <td>${r['NAME']}</td>
          <td>${arrowImg ? `<img src="${IMG_PATH}${arrowImg}" width="32" height="32">` : ''}</td>
          <td>${metresTxt}</td>
          <td>${diffTxt}</td>
        `;
        (r._display === 1 && page === 1 ? topEl : otherEl).appendChild(tr);
      }

      if (highlightName) {
        const match = [...topEl.querySelectorAll('tr'), ...otherEl.querySelectorAll('tr')]
          .find(tr => tr.dataset.name === highlightName);
        if (match) {
          match.classList.add('highlight-row');
          if (otherEl.contains(match)) {
            const ct = document.getElementById('scroll-container');
            const rect = match.getBoundingClientRect();
            const crect = ct.getBoundingClientRect();
            if (rect.top < crect.top || rect.bottom > crect.bottom) {
              ct.scrollTop = match.offsetTop - 20;
            }
          }
        }
      }
    }

    function clearHighlightState() {
      const highlighted = document.querySelector('.highlight-row');
      if (highlighted) highlighted.classList.remove('highlight-row');
      const params = new URLSearchParams(location.search);
      if (params.has('highlight')) {
        params.delete('highlight');
        const q = params.toString();
        history.replaceState(null, '', window.location.pathname + (q ? '?' + q : ''));
      }
    }

    function setupSearch() {
      const input    = document.getElementById('searchBox');
      const dropdown = document.getElementById('searchDropdown');
      if (!input || !dropdown) return;

      const closeDropdown = () => { dropdown.style.display = 'none'; dropdown.innerHTML = ''; };

      input.addEventListener('focus', clearHighlightState);

      input.addEventListener('input', () => {
        const query = input.value.trim().toLowerCase();
        dropdown.innerHTML = '';
        if (!query) { closeDropdown(); return; }

        const matches = ALL_ROWS.filter(r => r['NAME'].toLowerCase().includes(query));
        if (!matches.length) {
          dropdown.innerHTML = '<div class="search-item disabled">No matches</div>';
          dropdown.style.display = 'block';
          return;
        }

        const frag = document.createDocumentFragment();
        matches.forEach(r => {
          const div = document.createElement('div');
          div.className = 'search-item';
          div.textContent = r['NAME'];
          div.dataset.name = r['NAME'];
          frag.appendChild(div);
        });
        dropdown.appendChild(frag);
        dropdown.style.display = 'block';
      });

      dropdown.addEventListener('click', e => {
        const item = e.target.closest('.search-item');
        if (!item || item.classList.contains('disabled')) return;
        const name = item.dataset.name;
        if (!name) return;
        const index = ALL_ROWS.findIndex(r => r['NAME'] === name);
        if (index === -1) return;
        closeDropdown();
        input.blur();
        gotoPage(Math.floor(index / ITEMS_PER_PAGE) + 1, name);
      });

      document.addEventListener('click', e => {
        if (!e.target.closest('.search-container')) closeDropdown();
      });
    }

    build().catch(err => {
      console.error(err);
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('top-rank').innerHTML =
        '<tr><td colspan="6" style="color:red">Error loading leaderboard</td></tr>';
    });
  </script>
</body>
</html>
