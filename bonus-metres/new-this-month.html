<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Bonus Metres – Leaderboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      background: #f4f5f7;
      color: #1a1a1a;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 32px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .header img { height: 40px; }
    .header-title { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; color: #1a1a1a; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .header-updated { font-size: 12px; color: #aaa; text-align: right; }
    .header-updated strong { color: #555; display: block; font-size: 13px; }

    .month-nav { display: flex; align-items: center; gap: 10px; }
    .month-nav-btn {
      width: 32px; height: 32px;
      border: 1.5px solid #e0e0e0;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      color: #555;
      transition: all 0.15s;
      line-height: 1;
      font-family: Arial, sans-serif;
    }
    .month-nav-btn:hover:not(:disabled) { border-color: #c00; color: #c00; }
    .month-nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .month-nav-label {
      font-size: 13px; font-weight: 700; color: #1a1a1a;
      min-width: 120px; text-align: center;
      white-space: nowrap;
    }
    .month-nav-label.current { color: #c00; }

    .body-wrap { flex: 1; display: flex; gap: 0; overflow: hidden; }

    .podium-panel {
      width: 420px; flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding: 16px 20px 0;
      position: relative;
      background: linear-gradient(180deg, #fffde7 0%, #fff 60%);
    }
    .podium-places {
      display: flex; align-items: flex-end;
      justify-content: center; gap: 8px;
      width: 100%; flex: 1;
    }
    .podium-place { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .podium-face-wrap { position: relative; margin-bottom: 8px; }
    .podium-face { border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.2); display: block; }
    .podium-place.p1 .podium-face { width: 100px; height: 100px; border-color: #f9a825; box-shadow: 0 0 24px rgba(249,168,37,0.5); }
    .podium-place.p2 .podium-face { width: 80px;  height: 80px;  border-color: #b0b8c1; box-shadow: 0 0 16px rgba(176,184,193,0.4); }
    .podium-place.p3 .podium-face { width: 70px;  height: 70px;  border-color: #cd7f32; box-shadow: 0 0 12px rgba(205,127,50,0.4); }
    .podium-crown { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 22px; filter: drop-shadow(0 2px 6px rgba(249,168,37,0.8)); }
    .podium-name { font-size: 13px; font-weight: 700; text-align: center; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; padding: 0 4px; color: #1a1a1a; }
    .podium-place.p1 .podium-name { font-size: 15px; color: #b8860b; }
    .podium-place.p2 .podium-name { color: #666; }
    .podium-place.p3 .podium-name { color: #8b5a2b; }
    .podium-metres { font-size: 12px; color: #888; text-align: center; margin-bottom: 8px; }
    .podium-place.p1 .podium-metres { font-size: 14px; color: #555; }
    .podium-block { width: 100%; border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; color: rgba(255,255,255,0.15); }
    .podium-place.p1 .podium-block { height: 90px; background: linear-gradient(180deg, rgba(249,168,37,0.35), rgba(249,168,37,0.15)); border: 1px solid rgba(249,168,37,0.3); }
    .podium-place.p2 .podium-block { height: 64px; background: linear-gradient(180deg, rgba(176,184,193,0.25), rgba(176,184,193,0.1)); border: 1px solid rgba(176,184,193,0.2); }
    .podium-place.p3 .podium-block { height: 46px; background: linear-gradient(180deg, rgba(205,127,50,0.25), rgba(205,127,50,0.1)); border: 1px solid rgba(205,127,50,0.2); }

    .divider { width: 1px; background: #e8e8e8; flex-shrink: 0; margin: 16px 0; }

    .list-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 16px 0 0; background: #fff; }
    .list-header {
      display: grid;
      grid-template-columns: 44px 48px 1fr 90px 110px;
      padding: 6px 20px 10px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: #bbb;
      flex-shrink: 0; border-bottom: 1px solid #f0f0f0;
    }
    .list-scroll-wrap { flex: 1; overflow: hidden; position: relative; }
    .list-scroll { height: 100%; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
    .list-scroll::-webkit-scrollbar { display: none; }
    .list-row {
      display: grid;
      grid-template-columns: 44px 48px 1fr 90px 110px;
      align-items: center; padding: 8px 20px;
      border-bottom: 1px solid #f5f5f5;
    }
    .list-row:hover { background: #fafafa; }
    .row-rank { font-size: 15px; font-weight: 700; color: #ccc; text-align: center; }
    .row-rank.top10 { color: #999; }
    .row-face img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #f0f0f0; display: block; }
    .row-name    { font-size: 14px; font-weight: 600; padding-left: 10px; color: #1a1a1a; }
    .row-metres  { font-size: 15px; font-weight: 700; color: #c00; text-align: right; }
    .row-activity { font-size: 11px; color: #bbb; text-align: right; padding-left: 8px; }
    .row-activity.recent { color: #2e7d32; font-weight: 600; }
    .row-activity.stale  { color: #e65100; }
    .row-arrow { font-size: 13px; font-weight: 900; text-align: center; }
    .row-arrow.up   { color: #2e7d32; }
    .row-arrow.down { color: #c00; }
    .row-arrow.same { color: #ddd; }

    @media (max-width: 700px) {
      .podium-panel { width: 100%; background: #fffde7; }
      .body-wrap { flex-direction: column; }
      .divider { width: 100%; height: 1px; margin: 0; background: #e8e8e8; }
      .list-panel { min-height: 240px; }
      .podium-place.p1 .podium-face { width: 72px; height: 72px; }
      .podium-place.p2 .podium-face { width: 58px; height: 58px; }
      .podium-place.p3 .podium-face { width: 50px; height: 50px; }
      .podium-place.p1 .podium-block { height: 60px; }
      .podium-place.p2 .podium-block { height: 44px; }
      .podium-place.p3 .podium-block { height: 32px; }
      .header { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
      .header-title { font-size: 16px; }
      .list-row { padding: 7px 14px; grid-template-columns: 44px 48px 1fr 90px; }
      .list-header { padding: 6px 14px 8px; grid-template-columns: 44px 48px 1fr 90px; }
      .row-activity { display: none; }
    }

    .spinner-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #fff; z-index: 10; }
    .spinner { width: 48px; height: 48px; border: 5px solid #f0f0f0; border-top-color: #c00; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: #ccc; font-size: 16px; }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://oxgehlmalbvppjmdaswn.supabase.co/storage/v1/object/public/images/JHB%20Logo.png" alt="JHB">
    <div class="header-title">&#127942; Bonus Metres Leaderboard</div>
    <div class="header-right">
      <div class="month-nav">
        <button class="month-nav-btn" id="btn-prev" onclick="changeMonth(-1)" title="Previous period">&#60;</button>
        <div class="month-nav-label" id="month-label">Loading...</div>
        <button class="month-nav-btn" id="btn-next" onclick="changeMonth(1)" title="Next period">&#62;</button>
      </div>
      <div class="header-updated" id="update-lbl">Loading...</div>
    </div>
  </div>

  <div class="body-wrap">
    <div class="podium-panel" id="podium-panel">
      <div class="spinner-overlay" id="podium-spinner"><div class="spinner"></div></div>
      <div class="podium-places" id="podium-places"></div>
    </div>
    <div class="divider"></div>
    <div class="list-panel">
      <div class="list-header">
        <span style="text-align:center">#</span>
        <span></span>
        <span style="padding-left:10px">Name</span>
        <span style="text-align:right">Metres</span>
        <span style="text-align:right;padding-left:8px" id="list-col-label">Last Activity</span>
      </div>
      <div class="list-scroll-wrap">
        <div class="list-scroll" id="list-scroll">
          <div class="spinner-overlay" id="list-spinner"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://oxgehlmalbvppjmdaswn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_43D7ggkEiM_OpKpakPVxSQ_uHN35QbN';
    const sb           = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const IMG_PATH     = SUPABASE_URL + '/storage/v1/object/public/images/';

    let monthEndRuns = [];
    let currentIdx   = 0;
    let scrollAnim   = null;

    function safeImg(name, size) {
      return new Promise(function(res) {
        var img = new Image(); img.crossOrigin = 'anonymous';
        img.onload  = function() { res(img.src); };
        img.onerror = function() { res(null); };
        img.src = IMG_PATH + encodeURIComponent(name) + '_cvface1.jpg';
      });
    }

    function initialsDataUrl(initials, size) {
      var c = document.createElement('canvas'); c.width = c.height = size;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#1a1a2e'; ctx.beginPath(); ctx.arc(size/2,size/2,size/2,0,2*Math.PI); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold ' + Math.floor(size*0.33) + 'px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(initials, size/2, size/2 + 1);
      return c.toDataURL();
    }

    function changeMonth(dir) {
      var newIdx = currentIdx + dir;
      if (newIdx < 0 || newIdx >= monthEndRuns.length) return;
      currentIdx = newIdx;
      loadLeaderboard();
    }

    function updateNav() {
      var run     = monthEndRuns[currentIdx];
      var lbl     = document.getElementById('month-label');
      var btnPrev = document.getElementById('btn-prev');
      var btnNext = document.getElementById('btn-next');

      lbl.textContent = run.label;
      lbl.className   = 'month-nav-label' + (currentIdx === 0 ? ' current' : '');
      btnNext.disabled = currentIdx === 0;
      btnPrev.disabled = currentIdx === monthEndRuns.length - 1;

      document.getElementById('list-col-label').textContent =
        currentIdx === 0 ? 'Last Activity' : 'Bonus Paid';
    }

    async function init() {
      var result = await sb
        .from('month_end_runs')
        .select('id, period_name, payment_date, total_paid')
        .order('payment_date', { ascending: false });

      var runs = result.data || [];

      monthEndRuns = [
        { id: null, label: 'Outstanding', payment_date: null, isCurrent: true }
      ];

      runs.forEach(function(r) {
        // Skip year-end internal runs (zero total)
        if (parseFloat(r.total_paid || 0) === 0) return;
        monthEndRuns.push({
          id:           r.id,
          label:        r.period_name,
          payment_date: r.payment_date,
          total_paid:   r.total_paid,
          isCurrent:    false
        });
      });

      currentIdx = 0;
      await loadLeaderboard();
    }

    async function loadLeaderboard() {
      if (scrollAnim) { cancelAnimationFrame(scrollAnim); scrollAnim = null; }

      document.getElementById('podium-spinner').style.display = 'flex';
      document.getElementById('list-spinner').style.display   = 'flex';
      document.getElementById('podium-places').innerHTML = '';
      document.getElementById('list-scroll').innerHTML   = '';

      updateNav();

      var run    = monthEndRuns[currentIdx];
      var ranked = [];

      if (run.isCurrent) {
        ranked = await loadCurrentMonth();
      } else {
        ranked = await loadHistoricalMonth(run);
      }

      await render(ranked, run);

      if (run.isCurrent) {
        setTimeout(startPingPongScroll, 2000);
      }
    }

    async function loadCurrentMonth() {
      var result = await sb
        .from('transaction_operatives')
        .select('employee_id, share_value, transaction_id, transactions!inner(id, bonus_metres, date_paid, created_at), employees!inner(full_name, initials, status)')
        .is('transactions.date_paid', null);

      var ops = result.data || [];
      if (!ops.length) return [];

      // Count operatives per transaction for metres split
      var txMeta = {};
      ops.forEach(function(op) {
        var txId = op.transactions && op.transactions.id;
        if (!txId) return;
        if (!txMeta[txId]) txMeta[txId] = {
          metres:     parseFloat(op.transactions.bonus_metres || 0),
          count:      0,
          created_at: op.transactions.created_at
        };
        txMeta[txId].count++;
      });

      var latestCreated = null;
      ops.forEach(function(op) {
        var c = op.transactions && op.transactions.created_at;
        if (c && (!latestCreated || c > latestCreated)) latestCreated = c;
      });

      var lbl = document.getElementById('update-lbl');
      if (latestCreated) {
        var d = new Date(latestCreated);
        lbl.innerHTML = 'Last entry: <strong>' +
          d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) +
          ' at ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + '</strong>';
      } else {
        lbl.textContent = 'No outstanding entries';
      }

      var empMap = {};
      ops.forEach(function(op) {
        var emp = op.employees;
        if (!emp || emp.status === 'inactive') return;
        var txId = op.transactions && op.transactions.id;
        if (!txId) return;
        var id = op.employee_id;
        if (!empMap[id]) empMap[id] = {
          id:           id,
          name:         emp.full_name,
          initials:     emp.initials,
          bonus:        0,
          metres:       0,
          visits:       0,
          lastActivity: null
        };
        empMap[id].bonus  += parseFloat(op.share_value || 0);
        empMap[id].visits++;
        var tx = txMeta[txId];
        if (tx) {
          empMap[id].metres += tx.metres / tx.count;
          if (tx.created_at && (!empMap[id].lastActivity || tx.created_at > empMap[id].lastActivity)) {
            empMap[id].lastActivity = tx.created_at;
          }
        }
      });

      return rankPeople(Object.values(empMap));
    }

    async function loadHistoricalMonth(run) {
      // Get all transaction_operatives for this payment date
      // First get transaction IDs paid on this date
      var txResult = await sb
        .from('transactions')
        .select('id, bonus_metres, date_paid')
        .eq('date_paid', run.payment_date);

      var transactions = txResult.data || [];
      if (!transactions.length) return [];

      var txIds = transactions.map(function(t) { return t.id; });

      // Build tx lookup
      var txLookup = {};
      transactions.forEach(function(t) {
        txLookup[t.id] = { metres: parseFloat(t.bonus_metres || 0), count: 0 };
      });

      // Get operatives for those transactions
      var opsResult = await sb
        .from('transaction_operatives')
        .select('employee_id, share_value, transaction_id, employees!inner(full_name, initials, status)')
        .in('transaction_id', txIds);

      var ops = opsResult.data || [];

      // Count crew per transaction
      ops.forEach(function(op) {
        if (txLookup[op.transaction_id]) txLookup[op.transaction_id].count++;
      });

      // Build per-employee totals
      var empMap = {};
      ops.forEach(function(op) {
        var emp = op.employees;
        if (!emp) return;
        var id  = op.employee_id;
        var tx  = txLookup[op.transaction_id];
        if (!empMap[id]) empMap[id] = {
          id:       id,
          name:     emp.full_name,
          initials: emp.initials,
          bonus:    0,
          metres:   0,
          lastActivity: null
        };
        empMap[id].bonus += parseFloat(op.share_value || 0);
        if (tx && tx.count > 0) empMap[id].metres += tx.metres / tx.count;
      });

      var lbl = document.getElementById('update-lbl');
      lbl.innerHTML = 'Paid: <strong>&#163;' + parseFloat(run.total_paid || 0).toFixed(2) + '</strong>';

      return rankPeople(Object.values(empMap));
    }

    function rankPeople(people) {
      var ranked = people
        .filter(function(e) { return e.metres > 0 || e.bonus > 0; })
        .sort(function(a, b) { return b.metres - a.metres; });
      var rank = 1;
      ranked.forEach(function(e, i) {
        if (i > 0 && e.metres < ranked[i-1].metres) rank = i + 1;
        e.rank = rank;
      });
      return ranked;
    }

    async function render(ranked, run) {
      document.getElementById('podium-spinner').style.display = 'none';

      if (!ranked.length) {
        document.getElementById('podium-places').innerHTML = '<div class="empty">No data for this period</div>';
        document.getElementById('list-scroll').innerHTML   = '';
        document.getElementById('list-spinner').style.display = 'none';
        return;
      }

      var prevRanks = {};
      if (run.isCurrent) {
        try { prevRanks = JSON.parse(localStorage.getItem('jhb_lb_ranks') || '{}'); } catch(e) {}
        var newRanks = {};
        ranked.forEach(function(e) { newRanks[e.id] = e.rank; });
        try { localStorage.setItem('jhb_lb_ranks', JSON.stringify(newRanks)); } catch(e) {}
      }

      // Podium
      var podiumGroups = [];
      var podiumCount  = 0;
      for (var i = 0; i < ranked.length; i++) {
        var e = ranked[i];
        if (e.rank > 3 || podiumCount >= 6) break;
        var existing = null;
        for (var j = 0; j < podiumGroups.length; j++) {
          if (podiumGroups[j].rank === e.rank) { existing = podiumGroups[j]; break; }
        }
        if (existing) { existing.people.push(e); }
        else { podiumGroups.push({ rank: e.rank, people: [e] }); }
        podiumCount++;
      }

      var podiumOrder = [
        podiumGroups.find(function(g) { return g.rank === 2; }),
        podiumGroups.find(function(g) { return g.rank === 1; }),
        podiumGroups.find(function(g) { return g.rank === 3; })
      ].filter(Boolean);

      var rankMeta = {
        1: { cls:'p1', crown:'&#129351;', blockH:90, num:'1st' },
        2: { cls:'p2', crown:'&#129352;', blockH:64, num:'2nd' },
        3: { cls:'p3', crown:'&#129353;', blockH:46, num:'3rd' }
      };

      var podiumHtml = await Promise.all(podiumOrder.map(async function(g) {
        var meta    = rankMeta[g.rank];
        var isJoint = g.people.length > 1;
        var imgs    = await Promise.all(g.people.map(function(p) { return safeImg(p.name, 100); }));

        var faces = g.people.map(function(p, i) {
          var fallback = initialsDataUrl(p.initials, 100);
          var size = isJoint ? 60 : (meta.cls === 'p1' ? 100 : meta.cls === 'p2' ? 80 : 70);
          return '<div style="display:flex;flex-direction:column;align-items:center;' + (isJoint?'margin:0 2px':'') + '">' +
            '<img class="podium-face" src="' + (imgs[i] || fallback) + '" onerror="this.src=\'' + fallback + '\'" alt="' + p.name + '" style="width:' + size + 'px;height:' + size + 'px">' +
            '<div class="podium-name">' + p.name.split(' ')[0] + '</div>' +
            '</div>';
        }).join('');

        var statStr = run.isCurrent
          ? Math.round(g.people[0].metres).toLocaleString() + 'm' + (isJoint ? ' each' : '')
          : '&#163;' + g.people[0].bonus.toFixed(2) + (isJoint ? ' each' : '');

        return '<div class="podium-place ' + meta.cls + '">' +
          '<div class="podium-face-wrap">' +
          '<div class="podium-crown">' + (isJoint ? '=' : '') + meta.crown + '</div>' +
          '<div style="display:flex;align-items:flex-end;justify-content:center">' + faces + '</div>' +
          '</div>' +
          '<div class="podium-metres">' + statStr + '</div>' +
          '<div class="podium-block" style="height:' + meta.blockH + 'px">' + (isJoint ? '=' : '') + meta.num + '</div>' +
          '</div>';
      }));

      document.getElementById('podium-places').innerHTML = podiumHtml.join('');

      // List
      var rankCounts = {};
      ranked.forEach(function(e) { rankCounts[e.rank] = (rankCounts[e.rank] || 0) + 1; });
      var tiedRanks  = new Set(Object.keys(rankCounts).filter(function(r) { return rankCounts[r] > 1; }).map(Number));
      var podiumRankSet = new Set(podiumGroups.map(function(g) { return g.rank; }));
      var rest = ranked.filter(function(e) { return !podiumRankSet.has(e.rank); });

      var listImgs = await Promise.all(rest.map(function(p) { return safeImg(p.name, 36); }));

      document.getElementById('list-scroll').innerHTML = rest.length === 0
        ? '<div class="empty" style="padding:30px">Top 3 shown in podium</div>'
        : rest.map(function(p, i) {
            var fallback = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><circle cx='18' cy='18' r='18' fill='%23e8e8e8'/><text x='18' y='23' text-anchor='middle' font-size='11' font-weight='700' fill='%23999' font-family='Arial'>" + p.initials + "</text></svg>";
            var rankLabel = tiedRanks.has(p.rank) ? '=' + p.rank : p.rank;

            var arrowHtml = '';
            if (run.isCurrent) {
              var prev = prevRanks[p.id];
              if (prev === undefined) {
                arrowHtml = '<span class="row-arrow same" title="New entry">&#9679;</span>';
              } else if (p.rank < prev) {
                arrowHtml = '<span class="row-arrow up" title="Up ' + (prev-p.rank) + '">&#9650; ' + (prev-p.rank) + '</span>';
              } else if (p.rank > prev) {
                arrowHtml = '<span class="row-arrow down" title="Down ' + (p.rank-prev) + '">&#9660; ' + (p.rank-prev) + '</span>';
              } else {
                arrowHtml = '<span class="row-arrow same">&#8212;</span>';
              }
            }

            var rightCol = '';
            if (run.isCurrent && p.lastActivity) {
              var d    = new Date(p.lastActivity);
              var days = Math.floor((new Date() - d) / 86400000);
              var cls  = days <= 3 ? 'recent' : days >= 14 ? 'stale' : '';
              rightCol = '<div class="row-activity ' + cls + '">' + d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + '</div>';
            } else if (!run.isCurrent) {
              rightCol = '<div class="row-activity" style="color:#1a1a1a;font-weight:600">&#163;' + p.bonus.toFixed(2) + '</div>';
            } else {
              rightCol = '<div class="row-activity">&#8212;</div>';
            }

            return '<div class="list-row">' +
              '<div class="row-rank ' + (p.rank <= 10 ? 'top10' : '') + '">' + rankLabel + '</div>' +
              '<div class="row-face"><img src="' + (listImgs[i] || fallback) + '" onerror="this.src=\'' + fallback + '\'" alt="' + p.name + '"></div>' +
              '<div class="row-name">' + p.name + ' ' + arrowHtml + '</div>' +
              '<div class="row-metres">' + Math.round(p.metres).toLocaleString() + 'm</div>' +
              rightCol +
              '</div>';
          }).join('');

      document.getElementById('list-spinner').style.display = 'none';
    }

    function startPingPongScroll() {
      var ct = document.getElementById('list-scroll');
      var speed = 0.04, pauseMs = 1500;
      var dir = 1, paused = false, last = performance.now(), elapsed = 0;
      function step(now) {
        var dt = now - last; last = now;
        if (paused) {
          elapsed += dt;
          if (elapsed >= pauseMs) { paused = false; elapsed = 0; }
        } else {
          ct.scrollTop += speed * dt * dir;
          var max = ct.scrollHeight - ct.clientHeight;
          if (max <= 0) return;
          if (ct.scrollTop >= max)       { ct.scrollTop = max; dir = -1; paused = true; }
          else if (ct.scrollTop <= 0)    { ct.scrollTop = 0;   dir =  1; paused = true; }
        }
        scrollAnim = requestAnimationFrame(step);
      }
      scrollAnim = requestAnimationFrame(step);
    }

    init().catch(function(e) {
      console.error(e);
      document.getElementById('podium-spinner').style.display = 'none';
      document.getElementById('list-spinner').style.display   = 'none';
    });
  </script>
</body>
</html>
