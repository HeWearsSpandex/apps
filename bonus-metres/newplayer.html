<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonus Metres – My Stats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex; flex-direction: column;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      padding: 8px 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .header img { max-width: 70px; height: auto; }

    /* ── Hero ── */
    .hero {
      background: #fff;
      padding: 8px 14px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .hero-face img { border-radius: 50%; width: 48px; height: 48px; border: 3px solid #ddd; flex-shrink: 0; }
    .hero-info h1 { margin: 0 0 1px; font-size: 16px; line-height: 1.2; }
    .hero-info .subtitle { color: #999; font-size: 11px; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #e0e0e0;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; padding: 10px 8px;
      font-size: 12px; font-weight: 700; text-align: center;
      cursor: pointer; color: #999;
      border: none; background: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      font-family: Arial, sans-serif;
    }
    .tab-btn.active { color: #c00; border-bottom-color: #c00; }

    /* ── Tab panels ── */
    .tab-panels { flex: 1; overflow: hidden; position: relative; }
    .tab-panel  { display: none; position: absolute; inset: 0; overflow-y: auto; flex-direction: column; }
    .tab-panel.active { display: flex; }

    /* ── Stats tab (original layout) ── */
    .main-grid {
      display: flex; gap: 0;
      margin: 0 8px 6px;
      background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden; flex-shrink: 0;
    }
    .coin-col {
      width: 72px; flex-shrink: 0;
      background: #fffdf0; border-right: 1px solid #f0e8c8;
      display: flex; align-items: flex-end; justify-content: center;
      overflow: hidden; padding: 4px 0;
    }
    .coin-zero { font-size: 28px; padding-bottom: 12px; text-align: center; }
    .stats-col { flex: 1; display: flex; flex-direction: column; gap: 1px; background: #f0f0f0; min-width: 0; }
    .stat-card { background: #fff; padding: 7px 10px; min-width: 0; }
    .stat-card.highlight  { border-left: 3px solid #c00; }
    .stat-card.bonus-stat { border-left: 3px solid #2a9d2a; background: #f8fff8; }
    .stat-card .label { font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
    .stat-card .value { font-size: 14px; font-weight: bold; color: #222; line-height: 1.2; }
    .stat-card .sub   { font-size: 9px; color: #bbb; margin-top: 1px; }
    .coin-amount { font-size: 20px; font-weight: bold; color: #1b5e20; line-height: 1.2; }
    .two-col-inner { display: flex; gap: 0; }
    .two-col-inner > div { flex: 1; padding: 2px 0; min-width: 0; }
    .two-col-inner > div:first-child { border-right: 1px solid #eee; padding-right: 6px; }
    .two-col-inner > div:last-child  { padding-left: 6px; }
    .up   { color: #2a9d2a; }
    .down { color: #c00; }
    .same { color: #888; }
    .msg-banner {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; margin: 0 8px 8px;
      border-radius: 8px; font-size: 13px; font-weight: bold; line-height: 1.3;
    }
    .msg-emoji    { font-size: 20px; flex-shrink: 0; }
    .msg-gold     { background: #fff8e1; border-left: 4px solid gold;    color: #7a5c00; }
    .msg-positive { background: #e8f5e9; border-left: 4px solid #2a9d2a; color: #1b5e20; }
    .msg-warning  { background: #fff3e0; border-left: 4px solid #e65100; color: #7a3300; }
    .msg-neutral  { background: #f0f4ff; border-left: 4px solid #3a7bd5; color: #1a3a6e; }

    /* ── Mini Race Track ── */
    .race-wrap {
      flex-shrink: 0; position: relative;
      margin: 0 8px 8px; border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .race-sky-mini {
      height: 32px;
      background: linear-gradient(180deg, #2255cc 0%, #87ceeb 100%);
      position: relative; overflow: hidden;
    }
    .race-rail-mini { height: 5px; background: linear-gradient(180deg, #a0522d, #6b3410); }
    .race-lanes-mini {
      position: relative; overflow: hidden;
      background: #2d7a2d;
    }
    .race-rail-bot-mini { height: 5px; background: linear-gradient(180deg, #6b3410, #a0522d); }
    .race-lane-bg-mini {
      position: absolute; left: 0; right: 0;
    }
    .race-lane-bg-mini.odd  { background: #2d7a2d; }
    .race-lane-bg-mini.even { background: #267326; }
    .race-horse-unit {
      position: absolute; display: flex; align-items: center; gap: 4px;
      will-change: left;
    }
    .race-horse-stack { position: relative; display: inline-flex; align-items: flex-end; }
    .race-horse-emoji {
      display: block; transform: scaleX(-1);
      filter: drop-shadow(1px 2px 1px rgba(0,0,0,0.4));
      animation: gallop-mini 0.32s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    @keyframes gallop-mini {
      0%   { transform: scaleX(-1) scaleY(1.0)  translateY(0px)  rotate(-1deg); }
      100% { transform: scaleX(-1) scaleY(0.93) translateY(2px)  rotate(1deg); }
    }
    .race-horse-unit:nth-child(2n) .race-horse-emoji { animation-delay: -0.08s; }
    .race-horse-unit:nth-child(3n) .race-horse-emoji { animation-delay: -0.16s; }
    .race-horse-unit:nth-child(4n) .race-horse-emoji { animation-delay: -0.24s; }
    .race-jockey-wrap {
      position: absolute; bottom: 58%; left: 30%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      z-index: 2; pointer-events: none;
    }
    .race-jockey-photo { border-radius: 50%; object-fit: cover; display: block; border: 2px solid #fff; }
    .race-jockey-silk  { border-radius: 2px 2px 4px 4px; position: relative; overflow: hidden; margin-top: -1px; }
    .race-silk-stripe  { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 100%; background: rgba(255,255,255,0.35); }
    .race-pos-badge {
      position: absolute; top: -4px; left: -4px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; z-index: 3; font-size: 7px;
    }
    .race-horse-name {
      font-weight: 700; color: #fff; white-space: nowrap;
      font-family: 'Barlow Condensed', 'Segoe UI', sans-serif;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.9), -1px -1px 2px rgba(0,0,0,0.9);
    }
    .race-player-label {
      color: #ffe082; font-weight: 900;
    }
    .race-finish-mini {
      position: absolute; top: 0; bottom: 0; width: 14px; z-index: 4;
      pointer-events: none; opacity: 0; transition: opacity 0.6s;
    }
    .race-finish-mini::before {
      content: ''; position: absolute; top: 0; bottom: 0; left: 4px; width: 4px;
      background: repeating-linear-gradient(180deg, #000 0, #000 7px, #fff 7px, #fff 14px);
      box-shadow: 0 0 4px rgba(0,0,0,0.4);
    }
    .race-f-post-mini {
      position: absolute; top: -16px; bottom: -8px; width: 5px;
      border-radius: 3px;
      background: linear-gradient(180deg, #fff, #ddd);
      box-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    }
    .race-f-banner-mini {
      position: absolute; top: -12px; left: 0; right: -10px; height: 8px;
      background: repeating-conic-gradient(#000 0% 25%, #fff 0% 50%) 0 0/8px 8px;
      border-radius: 1px;
    }

    /* ── Bonus tab ── */
    .bonus-tab-inner { padding: 10px 8px 20px; display: flex; flex-direction: column; gap: 10px; }

    /* Summary cards row */
    .bonus-summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .bonus-summary-card {
      background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 10px 12px;
      border-left: 4px solid #e0e0e0;
    }
    .bonus-summary-card.green  { border-left-color: #2a9d2a; }
    .bonus-summary-card.red    { border-left-color: #c00; }
    .bonus-summary-card.gold   { border-left-color: #f9a825; }
    .bonus-summary-card.orange { border-left-color: #e65100; }
    .bsc-val { font-size: 18px; font-weight: 700; line-height: 1.2; }
    .bsc-lbl { font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }
    .bonus-summary-card.green  .bsc-val { color: #2a9d2a; }
    .bonus-summary-card.red    .bsc-val { color: #c00; }
    .bonus-summary-card.gold   .bsc-val { color: #f9a825; }
    .bonus-summary-card.orange .bsc-val { color: #e65100; }

    /* Section */
    .bonus-section { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
    .bonus-section-header {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .bonus-section-header h3 { font-size: 13px; font-weight: 700; margin: 0; }
    .bonus-section-header .total-chip {
      font-size: 12px; font-weight: 700;
      padding: 2px 10px; border-radius: 10px;
      background: #f0f2f5; color: #333;
    }
    .bonus-section-header .total-chip.green  { background: #e8f5e9; color: #2a9d2a; }
    .bonus-section-header .total-chip.red    { background: #fff0f0; color: #c00; }
    .bonus-section-header .total-chip.orange { background: #fff3e0; color: #e65100; }

    /* Job rows */
    .job-row {
      display: flex; align-items: flex-start;
      padding: 8px 12px; border-bottom: 1px solid #f5f5f5;
      gap: 8px;
    }
    .job-row:last-child { border-bottom: none; }
    .job-date {
      font-size: 10px; color: #bbb; flex-shrink: 0;
      width: 44px; padding-top: 2px; text-align: center;
    }
    .job-date .day  { font-size: 14px; font-weight: 700; color: #555; line-height: 1; }
    .job-date .mon  { font-size: 9px; text-transform: uppercase; }
    .job-info { flex: 1; min-width: 0; }
    .job-site { font-size: 12px; font-weight: 600; color: #222; }
    .job-ref  { font-size: 10px; color: #bbb; margin-top: 1px; }
    .job-meta { font-size: 10px; color: #999; margin-top: 2px; }
    .job-val  { font-size: 13px; font-weight: 700; color: #2a9d2a; flex-shrink: 0; padding-top: 4px; }

    /* Deduction rows */
    .ded-row {
      display: flex; align-items: center;
      padding: 8px 12px; border-bottom: 1px solid #f5f5f5; gap: 8px;
    }
    .ded-row:last-child { border-bottom: none; }
    .ded-icon  { font-size: 16px; flex-shrink: 0; }
    .ded-info  { flex: 1; min-width: 0; }
    .ded-reason { font-size: 12px; font-weight: 600; color: #222; }
    .ded-date   { font-size: 10px; color: #bbb; margin-top: 1px; }
    .ded-val    { font-size: 13px; font-weight: 700; color: #c00; flex-shrink: 0; }

    /* History rows */
    .hist-row {
      display: flex; align-items: center;
      padding: 10px 12px; border-bottom: 1px solid #f5f5f5; gap: 8px;
      cursor: pointer;
    }
    .hist-row:last-child { border-bottom: none; }
    .hist-row:hover { background: #fafafa; }
    .hist-period { flex: 1; }
    .hist-period .name { font-size: 13px; font-weight: 600; color: #222; }
    .hist-period .date { font-size: 10px; color: #bbb; margin-top: 1px; }
    .hist-amount { font-size: 14px; font-weight: 700; color: #2a9d2a; }
    .hist-carry  { font-size: 10px; color: #e65100; font-weight: 600; }
    .hist-chevron { font-size: 14px; color: #ccc; flex-shrink: 0; }

    /* History detail (expanded) */
    .hist-detail {
      display: none;
      background: #fafafa;
      border-top: 1px solid #f0f0f0;
      padding: 8px 12px 10px;
    }
    .hist-detail.open { display: block; }
    .hist-detail-row {
      display: flex; justify-content: space-between;
      font-size: 11px; padding: 3px 0; color: #555;
    }
    .hist-detail-row.total {
      font-weight: 700; font-size: 12px;
      border-top: 1px solid #e0e0e0;
      margin-top: 4px; padding-top: 6px; color: #222;
    }

    /* Scope toggle */
    .scope-toggle {
      display: flex; gap: 6px;
      margin-bottom: 4px;
    }
    .scope-btn {
      flex: 1; padding: 7px 4px;
      font-size: 11px; font-weight: 700;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px; background: #fff;
      color: #999; cursor: pointer;
      font-family: Arial, sans-serif;
      transition: all 0.15s;
    }
    .scope-btn.active { background: #c00; color: #fff; border-color: #c00; }

    /* Empty state */
    .empty-row {
      padding: 20px 12px; text-align: center;
      color: #bbb; font-size: 12px;
    }

    /* Spinner */
    .spinner-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.85);
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #f0f0f0; border-top-color: #c00;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .spinner-sm {
      width: 24px; height: 24px;
      border: 3px solid #f0f0f0; border-top-color: #c00;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 16px auto; display: block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Not found */
    .not-found { text-align: center; padding: 40px 20px; color: #666; }
    .not-found h2 { color: #333; margin-bottom: 8px; }
    .error { text-align: center; padding: 40px 20px; color: #c00; font-size: 16px; }

    @media (min-width: 400px) {
      .header img    { max-width: 90px; }
      .hero-face img { width: 56px; height: 56px; }
      .hero-info h1  { font-size: 18px; }
    }
    @media (min-width: 768px) {
      .header img        { max-width: 140px; }
      .hero              { padding: 14px 20px; }
      .hero-face img     { width: 72px; height: 72px; }
      .hero-info h1      { font-size: 22px; }
      .coin-col          { width: 90px; }
      .stat-card .value  { font-size: 16px; }
      .coin-amount       { font-size: 24px; }
      .bonus-summary-row { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://oxgehlmalbvppjmdaswn.supabase.co/storage/v1/object/public/images/JHB%20Logo.png" alt="JHB Logo">
  </div>

  <div id="content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;">
    <div class="spinner-overlay" id="main-spinner"><div class="spinner"></div></div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // ── Supabase ──────────────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://oxgehlmalbvppjmdaswn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_43D7ggkEiM_OpKpakPVxSQ_uHN35QbN';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const IMG_PATH = 'https://oxgehlmalbvppjmdaswn.supabase.co/storage/v1/object/public/images/';
    const SILKS = ['#cc0000','#1155cc','#00993d','#cc7700','#7700cc','#cc0077','#00aacc','#884400','#336600','#003366'];
    const CAPS  = ['#ffffff','#ffcc00','#ffffff','#000000','#ffcc00','#ffffff','#000033','#ffffcc','#ffff00','#ff9900'];

    function getPlayerName() {
      return decodeURIComponent(new URLSearchParams(location.search).get('name') || '').trim();
    }

    // Financial year helper
    function getFYDates() {
      const now = new Date();
      const m   = now.getMonth();
      const y   = now.getFullYear();
      const fyStart = m >= 3 ? y : y - 1;
      return {
        from:  `${fyStart}-04-01`,
        to:    `${fyStart + 1}-03-31`,
        today: `${y}-${String(m+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`
      };
    }

    async function loadImage(src) {
      return new Promise(res => {
        const img = new Image(); img.crossOrigin = 'anonymous';
        img.onload = () => res(img);
        img.onerror = () => {
          const c = document.createElement('canvas'); c.width = c.height = 64;
          c.getContext('2d').fillStyle = '#ccc'; c.getContext('2d').fillRect(0,0,64,64);
          res(c);
        };
        img.src = src;
      });
    }

    async function drawIcon(name, haloColor, faceSize = 64, halo = haloColor ? 10 : 0) {
      const total = faceSize + halo * 2;
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = total;
      const ctx = canvas.getContext('2d');
      if (haloColor) {
        ctx.fillStyle = haloColor;
        ctx.beginPath();
        ctx.arc(total/2, total/2, faceSize/2 + halo, 0, 2*Math.PI);
        ctx.arc(total/2, total/2, faceSize/2, 0, 2*Math.PI);
        ctx.fill('evenodd');
      }
      const img = await loadImage(`${IMG_PATH}${encodeURIComponent(name.trim())}_cvface1.jpg`);
      ctx.drawImage(img, halo, halo, faceSize, faceSize);
      return canvas.toDataURL();
    }

    function fmtDate(str) {
      const d = new Date(str);
      return {
        day: d.getDate(),
        mon: d.toLocaleDateString('en-GB', { month: 'short' }),
        full: d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })
      };
    }

    function fmt(n) {
      return '£' + parseFloat(n).toFixed(2);
    }

    // ── Bonus tab state ───────────────────────────────────────────────────────
    let bonusScope    = 'unpaid'; // 'unpaid' | 'all'
    let employeeId    = null;
    let bonusLoaded   = false;

    async function loadBonusTab() {
      if (!employeeId) { console.warn('loadBonusTab called before employeeId set'); return; }
      if (bonusLoaded) return;
      bonusLoaded = true;
      renderBonusTab();
    }

    async function renderBonusTab() {
      const container = document.getElementById('bonus-tab-content');
      container.innerHTML = '<div class="spinner-sm"></div>';

      try {
        // ── Unpaid jobs ──
        const { data: unpaidOps } = await sb
          .from('transaction_operatives')
          .select(`share_value,
                   transactions!inner(id, date, job_ref, site_name, bonus_metres, rate, date_paid,
                     transaction_operatives(employee_id))`)
          .eq('employee_id', employeeId)
          .is('transactions.date_paid', null)
          .order('transactions(date)', { ascending: false });

        // ── All paid jobs — full history (no date filter) ──
        const { data: allOps } = await sb
          .from('transaction_operatives')
          .select(`share_value,
                   transactions!inner(id, date, job_ref, site_name, bonus_metres, rate, date_paid,
                     transaction_operatives(employee_id))`)
          .eq('employee_id', employeeId)
          .not('transactions.date_paid', 'is', null)
          .order('transactions(date)', { ascending: false });

        // ── FY paid jobs (for Total Paid to Date this FY) ──
        const { from: fyFrom } = getFYDates();
        const { data: fyPaidOps } = await sb
          .from('transaction_operatives')
          .select('share_value, transactions!inner(date_paid)')
          .eq('employee_id', employeeId)
          .not('transactions.date_paid', 'is', null)
          .gte('transactions.date_paid', fyFrom);

        // ── Unpaid deductions / bonuses ──
        const { data: unpaidEntries } = await sb
          .from('bonus_entries')
          .select('id, date, type, amount, reason')
          .eq('employee_id', employeeId)
          .is('date_paid', null);

        // ── Month-end history ──
        const { data: history } = await sb
          .from('month_end_lines')
          .select(`gross_earned, deductions, carry_over_in, net_payable, carry_over_out,
                   month_end_runs!inner(id, period_name, payment_date)`)
          .eq('employee_id', employeeId)
          .order('month_end_runs(payment_date)', { ascending: false });

        const unpaidJobs    = (unpaidOps    || []);
        const paidJobs      = (allOps       || []);
        const unpaidDeds    = (unpaidEntries|| []).filter(e => e.type === 'deduction');
        const unpaidBonuses = (unpaidEntries|| []).filter(e => e.type === 'special_bonus');
        const hist          = (history      || []);

        // Totals
        const totalUnpaidJobs = unpaidJobs.reduce((s, o) => s + parseFloat(o.share_value), 0);
        const totalUnpaidBon  = unpaidBonuses.reduce((s, e) => s + parseFloat(e.amount), 0);
        const totalUnpaidDed  = unpaidDeds.reduce((s, e) => s + parseFloat(e.amount), 0);
        const netUnpaid       = Math.max(0, totalUnpaidJobs + totalUnpaidBon - totalUnpaidDed);
        const carryDebt       = Math.max(0, totalUnpaidDed - totalUnpaidJobs - totalUnpaidBon);

        // Total paid this FY only
        const totalEverPaid   = (fyPaidOps||[]).reduce((s, o) => s + parseFloat(o.share_value), 0);

        container.innerHTML = `
          <!-- Scope toggle -->
          <div class="scope-toggle">
            <button class="scope-btn ${bonusScope==='unpaid'?'active':''}"
                    onclick="setScope('unpaid')">📬 Outstanding</button>
            <button class="scope-btn ${bonusScope==='all'?'active':''}"
                    onclick="setScope('all')">📜 Full History</button>
          </div>

          <!-- Summary cards -->
          <div class="bonus-summary-row">
            <div class="bonus-summary-card green">
              <div class="bsc-val">${fmt(totalUnpaidJobs)}</div>
              <div class="bsc-lbl">Unpaid Jobs</div>
            </div>
            <div class="bonus-summary-card ${totalUnpaidDed > 0 ? 'red' : 'green'}">
              <div class="bsc-val">${totalUnpaidDed > 0 ? '-' : ''}${fmt(totalUnpaidDed)}</div>
              <div class="bsc-lbl">Deductions</div>
            </div>
            <div class="bonus-summary-card gold">
              <div class="bsc-val">${fmt(netUnpaid)}</div>
              <div class="bsc-lbl">Est. Next Payment</div>
            </div>
            <div class="bonus-summary-card orange">
              <div class="bsc-val">${fmt(totalEverPaid)}</div>
              <div class="bsc-lbl">Paid This FY</div>
            </div>
          </div>

          <!-- Outstanding view -->
          <div id="view-unpaid" style="display:${bonusScope==='unpaid'?'flex':'none'};flex-direction:column;gap:10px;">

            <!-- Unpaid jobs -->
            <div class="bonus-section">
              <div class="bonus-section-header">
                <h3>🔧 Unpaid Jobs (${unpaidJobs.length})</h3>
                <span class="total-chip green">${fmt(totalUnpaidJobs)}</span>
              </div>
              ${unpaidJobs.length === 0
                ? '<div class="empty-row">No unpaid jobs</div>'
                : unpaidJobs.map(o => {
                    const tx = o.transactions;
                    const d  = fmtDate(tx.date);
                    return `<div class="job-row">
                      <div class="job-date">
                        <div class="day">${d.day}</div>
                        <div class="mon">${d.mon}</div>
                      </div>
                      <div class="job-info">
                        <div class="job-site">${tx.site_name || '—'}</div>
                        <div class="job-ref">${tx.job_ref || ''}</div>
                        <div class="job-meta">${Math.round(parseFloat(tx.bonus_metres) / Math.max(1, (tx.transaction_operatives||[]).length)).toLocaleString()}m (${(tx.transaction_operatives||[]).length} crew)</div>
                      </div>
                      <div class="job-val">${fmt(o.share_value)}</div>
                    </div>`;
                  }).join('')}
            </div>

            <!-- Special bonuses -->
            ${unpaidBonuses.length > 0 ? `
            <div class="bonus-section">
              <div class="bonus-section-header">
                <h3>⭐ Special Bonuses (${unpaidBonuses.length})</h3>
                <span class="total-chip green">${fmt(totalUnpaidBon)}</span>
              </div>
              ${unpaidBonuses.map(e => {
                const d = fmtDate(e.date);
                return `<div class="ded-row">
                  <div class="ded-icon">⭐</div>
                  <div class="ded-info">
                    <div class="ded-reason">${e.reason || 'Special Bonus'}</div>
                    <div class="ded-date">${d.full}</div>
                  </div>
                  <div class="job-val">${fmt(e.amount)}</div>
                </div>`;
              }).join('')}
            </div>` : ''}

            <!-- Deductions -->
            ${unpaidDeds.length > 0 ? `
            <div class="bonus-section">
              <div class="bonus-section-header">
                <h3>➖ Deductions (${unpaidDeds.length})</h3>
                <span class="total-chip red">-${fmt(totalUnpaidDed)}</span>
              </div>
              ${unpaidDeds.map(e => {
                const d = fmtDate(e.date);
                return `<div class="ded-row">
                  <div class="ded-icon">➖</div>
                  <div class="ded-info">
                    <div class="ded-reason">${e.reason || 'Deduction'}</div>
                    <div class="ded-date">${d.full}</div>
                  </div>
                  <div class="ded-val">-${fmt(e.amount)}</div>
                </div>`;
              }).join('')}
            </div>` : ''}

            ${carryDebt > 0 ? `
            <div style="background:#fff3e0;border-radius:8px;padding:10px 12px;font-size:12px;color:#e65100;font-weight:600;border-left:4px solid #e65100;">
              ⚠️ Outstanding debt of ${fmt(carryDebt)} will carry forward to next payment
            </div>` : ''}

          </div>

          <!-- Full history view -->
          <div id="view-all" style="display:${bonusScope==='all'?'flex':'none'};flex-direction:column;gap:10px;">

            ${(() => {
              // Group paid jobs by date_paid
              const paymentGroups = {};
              paidJobs.forEach(o => {
                const tx  = o.transactions;
                const key = tx.date_paid;
                if (!paymentGroups[key]) paymentGroups[key] = { date_paid: key, jobs: [], total: 0 };
                paymentGroups[key].jobs.push(o);
                paymentGroups[key].total += parseFloat(o.share_value);
              });

              const groups = Object.values(paymentGroups).sort((a,b) => new Date(b.date_paid) - new Date(a.date_paid));

              if (!groups.length) return '<div class="empty-row">No payment history yet</div>';

              return groups.map((g, gi) => {
                const pd = new Date(g.date_paid).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

                // Check if there's a month_end_run for this payment date
                const run = hist.find(h => h.month_end_runs?.payment_date?.startsWith(g.date_paid));

                const jobRows = g.jobs.map(o => {
                  const tx = o.transactions;
                  const d  = fmtDate(tx.date);
                  return `<div class="job-row" style="border-bottom:1px solid #f0f0f0;padding:10px 16px">
                    <div class="job-date">
                      <div class="day">${d.day}</div>
                      <div class="mon">${d.mon}</div>
                    </div>
                    <div class="job-info">
                      <div class="job-site">${tx.site_name || '—'}</div>
                      <div class="job-ref">${tx.job_ref || ''}</div>
                      <div class="job-meta">${Math.round(parseFloat(tx.bonus_metres) / Math.max(1,(tx.transaction_operatives||[]).length)).toLocaleString()}m · ${(tx.transaction_operatives||[]).length} crew</div>
                    </div>
                    <div class="job-val">${fmt(o.share_value)}</div>
                  </div>`;
                }).join('');

                return `
                  <div class="hist-row" onclick="toggleHistDetail(${gi})" style="cursor:pointer">
                    <div class="hist-period">
                      <div class="name">Payment — ${pd}</div>
                      <div class="date">${g.jobs.length} job${g.jobs.length!==1?'s':''}</div>
                    </div>
                    <div style="text-align:right">
                      <div class="hist-amount">${fmt(g.total)}</div>
                      ${run && parseFloat(run.carry_over_out) > 0 ? `<div class="hist-carry">+${fmt(run.carry_over_out)} carried over</div>` : ''}
                    </div>
                    <div class="hist-chevron" id="chev-${gi}">›</div>
                  </div>
                  <div class="hist-detail" id="hist-detail-${gi}" style="display:none">
                    ${run ? `
                      <div style="padding:10px 16px;background:#f9f9f9;border-bottom:1px solid #f0f0f0;display:flex;gap:16px;flex-wrap:wrap;font-size:12px">
                        <span>Job Bonuses: <strong>${fmt(run.gross_earned)}</strong></span>
                        ${parseFloat(run.deductions)>0?`<span style="color:#c00">Deductions: <strong>-${fmt(run.deductions)}</strong></span>`:''}
                        ${parseFloat(run.carry_over_in)>0?`<span style="color:#e65100">Carry-over in: <strong>-${fmt(run.carry_over_in)}</strong></span>`:''}
                        <span style="color:#2a9d2a">Net paid: <strong>${fmt(run.net_payable)}</strong></span>
                      </div>` : ''}
                    ${jobRows}
                  </div>`;
              }).join('');
            })()}

          </div>
        `;

      } catch(e) {
        console.error(e);
        container.innerHTML = `<div class="empty-row" style="color:#c00">Error loading bonus data: ${e.message}</div>`;
      }
    }

    function setScope(scope) {
      bonusScope = scope;
      bonusLoaded = false;
      loadBonusTab();
    }

    function toggleHistDetail(i) {
      const detail = document.getElementById(`hist-detail-${i}`);
      const chev   = document.getElementById(`chev-${i}`);
      const isOpen = detail.style.display !== 'none';
      detail.style.display = isOpen ? 'none' : 'block';
      chev.textContent = isOpen ? '›' : '⌄';
    }

    // ── Main build ────────────────────────────────────────────────────────────
    async function build() {
      const name    = getPlayerName();
      const content = document.getElementById('content');

      // Check employee exists and is active/probation
      const { data: empData } = await sb
        .from('employees')
        .select('id, full_name, status, initials')
        .eq('full_name', name)
        .in('status', ['active', 'probation'])
        .limit(1);

      if (!name || !empData?.length) {
        document.getElementById('main-spinner').style.display = 'none';
        content.innerHTML = `
          <div class="not-found">
            <h2>Page not found</h2>
            <p>This stats page is not available.</p>
          </div>`;
        return;
      }

      employeeId = empData[0].id;

      const { from: fyFrom, to: fyTo } = getFYDates();

      // ── Load all active employees ──
      const { data: activeEmps } = await sb
        .from('employees')
        .select('id, full_name, initials')
        .in('status', ['active', 'probation']);

      // ── Load all transactions for FY (unpaid OR paid within FY) ──
      const { data: unpaidTxs } = await sb.from('transactions')
        .select('id, bonus_metres').is('date_paid', null);
      const { data: paidFYTxs } = await sb.from('transactions')
        .select('id, bonus_metres').gte('date_paid', fyFrom).lte('date_paid', fyTo);

      const fyTxMap = {};
      [...(unpaidTxs||[]), ...(paidFYTxs||[])].forEach(t => { fyTxMap[t.id] = t; });
      const fyTxIds = Object.keys(fyTxMap);

      // ── Get operatives for FY transactions ──
      const { data: fyOps } = fyTxIds.length
        ? await sb.from('transaction_operatives').select('employee_id, transaction_id').in('transaction_id', fyTxIds)
        : { data: [] };

      // Crew counts
      const crewCount = {};
      (fyOps||[]).forEach(o => { crewCount[o.transaction_id] = (crewCount[o.transaction_id]||0)+1; });

      // ── Build FY metres AND outstanding metres per employee from fyOps ──
      // fyTxMap contains both unpaid and FY-paid transactions
      // unpaidTxIds is the set of unpaid transaction IDs
      const unpaidTxIds = new Set((unpaidTxs||[]).map(t => t.id));

      const fyMetres       = {};
      const outstandingMetres = {};
      (fyOps||[]).forEach(o => {
        const tx = fyTxMap[o.transaction_id]; if (!tx) return;
        const crew = crewCount[o.transaction_id]||1;
        const myM  = parseFloat(tx.bonus_metres||0)/crew;
        fyMetres[o.employee_id] = (fyMetres[o.employee_id]||0) + myM;
        // Only count in outstanding if transaction is unpaid
        if (unpaidTxIds.has(o.transaction_id)) {
          outstandingMetres[o.employee_id] = (outstandingMetres[o.employee_id]||0) + myM;
        }
      });

      // ── Last closed month-end run ──
      const { data: lastRuns } = await sb.from('month_end_runs')
        .select('id, period_name, payment_date')
        .order('payment_date', { ascending: false }).limit(1);
      const lastRun = lastRuns?.[0] || null;

      // Last period metres per employee (from last month_end_lines)
      let lastPeriodMetres = {};
      if (lastRun) {
        // Get transactions paid in the last run's payment date
        const { data: lastPaidTxs } = await sb.from('transactions')
          .select('id, bonus_metres')
          .eq('date_paid', lastRun.payment_date);
        if (lastPaidTxs?.length) {
          const { data: lastOps } = await sb.from('transaction_operatives')
            .select('employee_id, transaction_id')
            .in('transaction_id', lastPaidTxs.map(t=>t.id));
          const lastCrew = {};
          (lastOps||[]).forEach(o => { lastCrew[o.transaction_id]=(lastCrew[o.transaction_id]||0)+1; });
          (lastOps||[]).forEach(o => {
            const tx = lastPaidTxs.find(t=>t.id===o.transaction_id); if (!tx) return;
            lastPeriodMetres[o.employee_id] = (lastPeriodMetres[o.employee_id]||0) + parseFloat(tx.bonus_metres||0)/(lastCrew[o.transaction_id]||1);
          });
        }
      }

      // ── Build ranked list (FY metres) ──
      const allRanked = (activeEmps||[])
        .map(e => ({ id: e.id, name: e.full_name, initials: e.initials, fyM: fyMetres[e.id]||0, outM: outstandingMetres[e.id]||0, lastM: lastPeriodMetres[e.id]||0 }))
        .sort((a,b) => b.fyM - a.fyM);

      // Assign ranks (joint)
      let rank=1;
      allRanked.forEach((e,i) => {
        if (i>0 && e.fyM < allRanked[i-1].fyM) rank=i+1;
        e.rank=rank;
      });

      // Last period ranks
      const lastRanked = [...(activeEmps||[])]
        .map(e => ({ id: e.id, lastM: lastPeriodMetres[e.id]||0 }))
        .sort((a,b) => b.lastM - a.lastM);
      let lrank=1;
      lastRanked.forEach((e,i) => {
        if (i>0 && e.lastM < lastRanked[i-1].lastM) lrank=i+1;
        e.lrank=lrank;
      });

      const me         = allRanked.find(e => e.id === employeeId);
      const myFYM      = me?.fyM   || 0;
      const myOutM     = me?.outM  || 0;
      const myLastM    = me?.lastM || 0;
      const myRank     = me?.rank  || '-';
      const myLastRank = lastRanked.find(e=>e.id===employeeId)?.lrank || '-';

      const leader     = allRanked[0];
      const fyLeader   = leader?.fyM  || 0;
      const outLeader  = (allRanked.find(e=>e.outM>0)||allRanked[0])?.outM || 0;
      const lastLeader = lastRanked[0]?.lastM || 0;

      const fyDiff   = myFYM  >= fyLeader   ? 'Leader' : `-${Math.round(fyLeader - myFYM).toLocaleString()}m`;
      const outDiff  = myOutM >= outLeader  ? 'Leader' : `-${Math.round(outLeader - myOutM).toLocaleString()}m`;
      const lastDiff = myLastM >= lastLeader ? 'Leader' : `-${Math.round(lastLeader - myLastM).toLocaleString()}m`;

      // Positional change: current FY rank vs last period rank
      const posChange = (myLastRank !== '-' && myRank !== '-') ? myLastRank - myRank : 0;
      let changeArrow='—', changeText='No change', changeClass='same';
      if (posChange > 0)      { changeArrow='▲'; changeText=`Up ${posChange}`;           changeClass='up'; }
      else if (posChange < 0) { changeArrow='▼'; changeText=`Down ${Math.abs(posChange)}`; changeClass='down'; }

      // Motivational message
      const RATE = 0.03;
      let msgText='', msgEmoji='', msgClass='msg-neutral';
      if      (myFYM >= fyLeader)                   { msgEmoji='🏆'; msgText="You're leading the way — everyone else is chasing you!";    msgClass='msg-gold'; }
      else if (fyLeader - myFYM <= 500)              { msgEmoji='🔥'; msgText="So close! You're right on the overall leader's heels!";     msgClass='msg-positive'; }
      else if (myOutM >= outLeader)                  { msgEmoji='⚡'; msgText="You've got the most outstanding this period — brilliant!";  msgClass='msg-gold'; }
      else if (posChange >= 5)                       { msgEmoji='🚀'; msgText="You've rocketed up the rankings this period!";             msgClass='msg-positive'; }
      else if (posChange > 0)                        { msgEmoji='👍'; msgText="Moving in the right direction — nice work!";              msgClass='msg-positive'; }
      else if (posChange < -2)                       { msgEmoji='💪'; msgText="Tough period — but there's everything to play for!";      msgClass='msg-warning'; }
      else                                           { msgEmoji='🎯'; msgText="You're holding your ground — stay consistent!";           msgClass='msg-neutral'; }

      const playerIcon = await drawIcon(name, null, 64, 0);

      document.getElementById('main-spinner').style.display = 'none';

      content.innerHTML = `
        <div class="hero">
          <div class="hero-face"><img src="${playerIcon}" alt="${name}"></div>
          <div class="hero-info">
            <h1>${name}</h1>
            <div class="subtitle">Bonus Metres – Personal Stats</div>
          </div>
        </div>

        <div class="tab-bar">
          <button class="tab-btn active" onclick="showTab('stats',this)">📊 Stats</button>
          <button class="tab-btn"        onclick="showTab('bonus',this)">💷 My Bonus</button>
        </div>

        <div class="tab-panels">

          <!-- Stats tab -->
          <div class="tab-panel active" id="tab-stats">
            <div class="main-grid">
              <div class="coin-col" id="coinCol">
                ${myOutM > 0 ? `
                <svg id="coinStackSvg" viewBox="0 0 80 10" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">
                  <defs>
                    <linearGradient id="cTop" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="#FFE566"/>
                      <stop offset="100%" stop-color="#F9A825"/>
                    </linearGradient>
                    <linearGradient id="cSide" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="#E6900A"/>
                      <stop offset="100%" stop-color="#BF6E00"/>
                    </linearGradient>
                  </defs>
                </svg>` : `<div class="coin-zero">🎯</div>`}
              </div>
              <div class="stats-col">
                <div class="stat-card highlight two-col">
                  <div class="two-col-inner">
                    <div>
                      <div class="label">This Period</div>
                      <div class="value">${Math.round(myOutM).toLocaleString()}m</div>
                      <div class="sub">Outstanding</div>
                    </div>
                    <div>
                      <div class="label">Last Period</div>
                      <div class="value">${Math.round(myLastM).toLocaleString()}m</div>
                      <div class="sub">${lastRun ? lastRun.period_name : '—'}</div>
                    </div>
                  </div>
                </div>
                <div class="stat-card highlight">
                  <div class="label">Year to Date</div>
                  <div class="value">${Math.round(myFYM).toLocaleString()}m</div>
                  <div class="sub">Rank #${myRank} this FY</div>
                </div>
                <div class="stat-card two-col">
                  <div class="two-col-inner">
                    <div>
                      <div class="label">vs Period Leader</div>
                      <div class="value">${outDiff}</div>
                    </div>
                    <div>
                      <div class="label">vs Last Period Leader</div>
                      <div class="value">${lastDiff}</div>
                    </div>
                  </div>
                </div>
                <div class="stat-card">
                  <div class="label">vs FY Leader</div>
                  <div class="value">${fyDiff}</div>
                </div>
                <div class="stat-card bonus-stat">
                  <div class="label">💰 Outstanding Bonus</div>
                  <div class="coin-amount" id="coinAmount">£0.00</div>
                  <div class="sub">${Math.round(myOutM).toLocaleString()}m @ £0.03/m</div>
                </div>
                <div class="stat-card">
                  <div class="label">Positional Change</div>
                  <div class="value ${changeClass}">${changeArrow} ${changeText}</div>
                </div>
              </div>
            </div>

            <div class="msg-banner ${msgClass}">
              <span class="msg-emoji">${msgEmoji}</span>
              <span>${msgText}</span>
            </div>

            <div class="race-wrap" id="race-wrap">
              <div class="spinner-overlay" id="race-spinner"><div class="spinner"></div></div>
            </div>
          </div>

          <!-- Bonus tab -->
          <div class="tab-panel" id="tab-bonus">
            <div class="bonus-tab-inner" id="bonus-tab-content">
              <div class="spinner-sm"></div>
            </div>
          </div>

        </div>
      `;

      // Run race and coin animation in parallel
      const racePromise = renderRace(name, allRanked, employeeId);

      // Coin stack animation — based on outstanding bonus
      if (myOutM > 0) {
        const bonusRaw  = myOutM * RATE;
        const BONUS_MAX = 1500;
        const fillRatio = Math.min(bonusRaw / BONUS_MAX, 1);
        const COIN_RX   = 32, COIN_RY = 6, COIN_H = 11, SVG_W = 72;
        const svg      = document.getElementById('coinStackSvg');
        const amountEl = document.getElementById('coinAmount');
        const coinCol  = document.getElementById('coinCol');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const panelH   = Math.max(coinCol.clientHeight, 120);
            const maxCoins = Math.floor((panelH - COIN_RY * 2 - 8) / COIN_H);
            const numCoins = Math.max(1, Math.round(maxCoins * fillRatio));
            svg.setAttribute('viewBox', `0 0 ${SVG_W} ${panelH}`);
            svg.setAttribute('height', String(panelH));
            const NS = 'http://www.w3.org/2000/svg';
            const coins = [];
            for (let i = 0; i < numCoins; i++) {
              const bottomY = panelH - 4 - (i * COIN_H);
              const faceY   = bottomY - COIN_H;
              const isTop   = i === numCoins - 1;
              const cx      = SVG_W / 2;
              const band = document.createElementNS(NS, 'rect');
              band.setAttribute('x', String(cx - COIN_RX)); band.setAttribute('y', String(faceY));
              band.setAttribute('width', String(COIN_RX * 2)); band.setAttribute('height', String(COIN_H));
              band.setAttribute('fill', 'url(#cSide)'); band.style.opacity = '0';
              const bottom = document.createElementNS(NS, 'ellipse');
              bottom.setAttribute('cx', String(cx)); bottom.setAttribute('cy', String(bottomY));
              bottom.setAttribute('rx', String(COIN_RX)); bottom.setAttribute('ry', String(COIN_RY));
              bottom.setAttribute('fill', 'url(#cSide)'); bottom.style.opacity = '0';
              const face = document.createElementNS(NS, 'ellipse');
              face.setAttribute('cx', String(cx)); face.setAttribute('cy', String(faceY));
              face.setAttribute('rx', String(COIN_RX)); face.setAttribute('ry', String(COIN_RY));
              face.setAttribute('fill', 'url(#cTop)'); face.style.opacity = '0';
              const ring = document.createElementNS(NS, 'ellipse');
              ring.setAttribute('cx', String(cx)); ring.setAttribute('cy', String(faceY));
              ring.setAttribute('rx', String(COIN_RX - 7)); ring.setAttribute('ry', String(COIN_RY - 1));
              ring.setAttribute('fill', 'none'); ring.setAttribute('stroke', '#D4880A');
              ring.setAttribute('stroke-width', '0.7'); ring.style.opacity = '0';
              svg.appendChild(band); svg.appendChild(bottom); svg.appendChild(face); svg.appendChild(ring);
              if (isTop) {
                const lbl = document.createElementNS(NS, 'text');
                lbl.setAttribute('x', String(cx)); lbl.setAttribute('y', String(faceY + 1));
                lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('dominant-baseline', 'central');
                lbl.setAttribute('font-size', '8'); lbl.setAttribute('font-weight', '500');
                lbl.setAttribute('fill', '#9A5E00'); lbl.textContent = '£'; lbl.style.opacity = '0';
                svg.appendChild(lbl);
                coins.push([band, bottom, face, ring, lbl]);
              } else {
                coins.push([band, bottom, face, ring]);
              }
            }
            const DELAY = Math.min(60, 900 / Math.max(numCoins, 1));
            coins.forEach((group, i) => {
              setTimeout(() => { group.forEach(el => { el.style.transition='opacity 0.1s ease'; el.style.opacity='1'; }); }, 300 + i * DELAY);
            });
            const totalDur = 300 + numCoins * DELAY + 200;
            const start = performance.now();
            function countUp(now) {
              const t = Math.min((now - start) / totalDur, 1);
              const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
              amountEl.textContent = (bonusRaw * ease).toLocaleString('en-GB', { style:'currency', currency:'GBP' });
              if (t < 1) requestAnimationFrame(countUp);
            }
            setTimeout(() => requestAnimationFrame(countUp), 300);
          });
        });
      }

      await racePromise;
    }

    function showTab(tabId, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
      if (tabId === 'bonus') loadBonusTab();
    }

    async function renderRace(playerName, allRanked, playerId) {
      const wrap = document.getElementById('race-wrap');
      if (!wrap) return;

      // Build racer list: top 3 + player (deduplicated), sorted by rank
      const top3 = allRanked.slice(0, 3);
      const racerIds = new Set(top3.map(r => r.id));
      racerIds.add(playerId);
      const racers = allRanked
        .filter(r => racerIds.has(r.id))
        .sort((a, b) => a.rank - b.rank)
        .map((r, i) => ({
          ...r,
          isPlayer: r.id === playerId,
          silkIdx:  i % SILKS.length
        }));

      const n          = racers.length;
      const LANE_H     = 52;
      const totalH     = n * LANE_H;
      const leaderM    = racers[0]?.fyM || 1;

      // Build DOM
      wrap.innerHTML = '';

      const sky = document.createElement('div');
      sky.className = 'race-sky-mini';
      [[10,4,70],[40,2,55],[72,5,85]].forEach(([l,t,w]) => {
        const c = document.createElement('div');
        c.style.cssText = `position:absolute;left:${l}%;top:${t}px;width:${w}px;height:${w*0.35}px;background:rgba(255,255,255,0.85);border-radius:40px`;
        sky.appendChild(c);
      });
      wrap.appendChild(sky);

      const railTop = document.createElement('div'); railTop.className = 'race-rail-mini';
      wrap.appendChild(railTop);

      const lanesEl = document.createElement('div');
      lanesEl.className = 'race-lanes-mini';
      lanesEl.style.height = totalH + 'px';
      wrap.appendChild(lanesEl);

      const railBot = document.createElement('div'); railBot.className = 'race-rail-bot-mini';
      wrap.appendChild(railBot);

      // Small delay to ensure DOM is painted and dimensions are available
      await new Promise(r => setTimeout(r, 50));

      // Use window width minus sidebar/padding rather than offsetWidth which may be 0
      const viewW   = wrap.offsetWidth || (window.innerWidth - 40);
      lanesEl.style.width = viewW + 'px';
      const startX  = 30;
      const finishX = viewW - 30;
      const maxX    = finishX - 60;


      // Lane backgrounds
      racers.forEach((r, i) => {
        const bg = document.createElement('div');
        bg.className = `race-lane-bg-mini ${i%2===0?'odd':'even'}`;
        bg.style.cssText = `top:${i*LANE_H}px;height:${LANE_H}px`;
        lanesEl.appendChild(bg);
      });

      // Finish line — hidden initially
      const fl = document.createElement('div');
      fl.className = 'race-finish-mini';
      fl.style.left = finishX + 'px';
      const fp1 = document.createElement('div'); fp1.className='race-f-post-mini'; fp1.style.left='0';
      const fp2 = document.createElement('div'); fp2.className='race-f-post-mini'; fp2.style.right='-10px';
      const fb  = document.createElement('div'); fb.className='race-f-banner-mini';
      fl.appendChild(fp1); fl.appendChild(fp2); fl.appendChild(fb);
      lanesEl.appendChild(fl);

      // Horse units — preload photos
      const HORSE_SIZE = 28;
      const PHOTO_SIZE = 18;
      const SILK_W = 14, SILK_H = 10;
      const BADGE_SIZE = 12;
      const NAME_SIZE = 9;

      const units = {};
      racers.forEach((r, i) => {
        const silk = SILKS[r.silkIdx], cap = CAPS[r.silkIdx];
        const y    = i * LANE_H;
        // Minimum 8% progress so nobody sits right on the start line
        const minTarget = startX + (maxX - startX) * 0.08;
        const targetX = Math.max(minTarget, r.fyM > 0 ? startX + (r.fyM / leaderM) * (maxX - startX) : minTarget);

        const unit = document.createElement('div');
        unit.className = 'race-horse-unit';
        unit.style.cssText = `top:${y + Math.floor(LANE_H*0.5 - HORSE_SIZE*0.5)}px;left:${startX}px`;
        unit._currentX = startX;
        unit._targetX  = targetX;

        const stack = document.createElement('div'); stack.className = 'race-horse-stack';

        const horse = document.createElement('div'); horse.className = 'race-horse-emoji';
        horse.textContent = '🐎'; horse.style.fontSize = HORSE_SIZE + 'px';
        stack.appendChild(horse);

        const jw = document.createElement('div'); jw.className = 'race-jockey-wrap';
        const ph = document.createElement('img'); ph.className = 'race-jockey-photo';
        ph.style.cssText = `width:${PHOTO_SIZE}px;height:${PHOTO_SIZE}px`;
        ph.src = `${IMG_PATH}${encodeURIComponent(r.name)}_cvface1.jpg`;
        ph.onerror = function() {
          this.style.display='none';
          const fb=document.createElement('div');
          fb.style.cssText=`background:${silk};width:${PHOTO_SIZE}px;height:${PHOTO_SIZE}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:900;color:#fff;border:2px solid #fff`;
          fb.textContent=r.initials.slice(0,2);
          this.parentNode.insertBefore(fb,this.nextSibling);
        };
        jw.appendChild(ph);

        const sd = document.createElement('div'); sd.className = 'race-jockey-silk';
        sd.style.cssText = `background:${silk};width:${SILK_W}px;height:${SILK_H}px`;
        const ss = document.createElement('div'); ss.className = 'race-silk-stripe'; ss.style.background = cap;
        sd.appendChild(ss); jw.appendChild(sd);
        stack.appendChild(jw);

        const badge = document.createElement('div'); badge.className = 'race-pos-badge';
        badge.style.cssText = `background:${r.rank===1?'#ffd700':r.rank===2?'#c0c0c0':r.rank===3?'#cd7f32':'#333'};color:${r.rank<=3?'#000':'#fff'};width:${BADGE_SIZE}px;height:${BADGE_SIZE}px`;
        badge.textContent = r.rank;
        stack.appendChild(badge);
        unit.appendChild(stack);

        const nm = document.createElement('div');
        nm.className = 'race-horse-name' + (r.isPlayer ? ' race-player-label' : '');
        nm.style.fontSize = NAME_SIZE + 'px';
        nm.style.maxWidth = '80px';
        nm.style.overflow = 'hidden';
        nm.style.textOverflow = 'ellipsis';
        const shortFirst = r.name.split(' ')[0];
        nm.textContent   = r.isPlayer && r.rank > 3
          ? `${shortFirst} (You)`
          : `${shortFirst} ${(r.name.split(' ')[1]?.[0]||'')}${r.name.split(' ')[1]?'.':''}`;
        unit.appendChild(nm);

        lanesEl.appendChild(unit);
        units[r.id] = { unit, targetX };
      });

      document.getElementById('race-spinner')?.style && (document.getElementById('race-spinner').style.display = 'none');

      // ── Animate — all horses run at the same pace, once ──
      const RACE_MS = 8000;
      let startTs = null;

      await new Promise(resolve => {
        function frame(ts) {
          if (!startTs) startTs = ts;
          const elapsed  = ts - startTs;
          const progress = Math.min(elapsed / RACE_MS, 1);
          let anyMoving  = false;

          racers.forEach(r => {
            const u = units[r.id]; if (!u) return;
            const dist = u.targetX - startX;
            const newX = startX + progress * dist;
            if (newX < u.targetX) anyMoving = true;
            u.unit._currentX = Math.min(newX, u.targetX);
            u.unit.style.left = Math.round(u.unit._currentX) + 'px';
          });

          // Fade finish line in at 75%
          if (progress > 0.75) {
            fl.style.opacity = String(Math.min(1, (progress - 0.75) * 4));
          }

          if (progress < 1) requestAnimationFrame(frame);
          else resolve();
        }
        requestAnimationFrame(frame);
      });
    }

    build().catch(e => {
      console.error(e);
      document.getElementById('main-spinner').style.display = 'none';
      document.getElementById('content').innerHTML = `<div class="error">Error loading stats. Please try again.</div>`;
    });
  </script>
</body>
</html>
