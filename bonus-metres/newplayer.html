<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonus Metres – My Stats</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex; flex-direction: column;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .header img { max-width: 70px; height: auto; }

    /* ── Hero ── */
    .hero {
      background: #fff;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .hero-face img {
      border-radius: 50%;
      width: 48px; height: 48px;
      border: 3px solid #ddd;
      flex-shrink: 0;
    }
    .hero-info h1 {
      margin: 0 0 1px;
      font-size: 16px;
      line-height: 1.2;
    }
    .hero-info .subtitle {
      color: #999;
      font-size: 11px;
    }

    /* ── Stats grid — 2 cols mobile first ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      padding: 8px;
      flex-shrink: 0;
    }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      min-width: 0; /* prevents overflow */
    }
    .stat-card.highlight { border-top: 3px solid #c00; }

    /* ── Coin stack ── */
    .coin-wrap {
      flex-shrink: 0;
      background: #fff;
      border-radius: 8px;
      margin: 0 8px 6px;
      padding: 12px 16px 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .coin-stack-container {
      flex-shrink: 0;
      width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 120px;
      position: relative;
    }
    .coin-stack-svg {
      position: absolute;
      bottom: 0;
      width: 80px;
    }
    .coin-info {
      flex: 1;
    }
    .coin-label {
      font-size: 10px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }
    .coin-amount {
      font-size: 26px;
      font-weight: bold;
      color: #1b5e20;
      line-height: 1;
      margin-bottom: 4px;
    }
    .coin-sub {
      font-size: 11px;
      color: #aaa;
    }
    .stat-card.full-width { grid-column: 1 / -1; }

    /* Two equal halves inside a full-width card */
    .two-col-inner {
      display: flex;
      gap: 0;
    }
    .two-col-inner > div {
      flex: 1;
      padding: 4px 0;
    }
    .two-col-inner > div:first-child {
      border-right: 1px solid #eee;
    }

    .stat-card .label {
      font-size: 9px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 3px;
    }
    .stat-card .value {
      font-size: 15px;
      font-weight: bold;
      color: #222;
      line-height: 1.2;
    }
    .stat-card .sub {
      font-size: 10px;
      color: #bbb;
      margin-top: 2px;
    }

    /* Arrow colours */
    .up   { color: #2a9d2a; }
    .down { color: #c00; }
    .same { color: #888; }

    /* ── Message banner ── */
    .msg-banner {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      margin: 0 8px 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      line-height: 1.3;
    }
    .msg-emoji { font-size: 20px; flex-shrink: 0; }
    .msg-gold     { background: #fff8e1; border-left: 4px solid gold;    color: #7a5c00; }
    .msg-positive { background: #e8f5e9; border-left: 4px solid #2a9d2a; color: #1b5e20; }
    .msg-warning  { background: #fff3e0; border-left: 4px solid #e65100; color: #7a3300; }
    .msg-neutral  { background: #f0f4ff; border-left: 4px solid #3a7bd5; color: #1a3a6e; }

    /* ── Racetrack ── */
    .race-wrap {
      flex-shrink: 0;
      position: relative;
      background: #fff;
      margin: 0 8px 8px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 4px 0;
    }
    #racetrack { width: 100%; }

    /* ── Spinners ── */
    .spinner-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #f0f0f0;
      border-top-color: #c00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error / not found ── */
    .error {
      text-align: center;
      padding: 40px 20px;
      color: #c00;
      font-size: 16px;
    }
    .not-found {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
    .not-found h2 { color: #333; margin-bottom: 8px; }

    /* ── Scale up for larger screens ── */
    @media (min-width: 400px) {
      .header img        { max-width: 90px; }
      .hero-face img     { width: 56px; height: 56px; }
      .hero-info h1      { font-size: 18px; }
      .stat-card .value  { font-size: 17px; }
    }

    @media (min-width: 540px) {
      .stats-grid        { grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
      .stat-card.full-width { grid-column: 1 / -1; }
      .stat-card .value  { font-size: 19px; }
      .header img        { max-width: 110px; }
    }

    @media (min-width: 768px) {
      .header img        { max-width: 140px; }
      .hero              { padding: 14px 20px; }
      .hero-face img     { width: 72px; height: 72px; }
      .hero-info h1      { font-size: 22px; }
      .stats-grid        { padding: 12px 16px; gap: 10px; }
      .stat-card         { padding: 12px; }
      .stat-card .label  { font-size: 11px; }
      .stat-card .value  { font-size: 22px; }
      .stat-card .sub    { font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="/img/JHB Logo.png" alt="JHB Logo">
  </div>

  <div id="content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;">
    <div class="spinner-overlay" id="main-spinner">
      <div class="spinner"></div>
    </div>
  </div>

  <script src="/js/people.js"></script>
  <script>
    const CSV_URL  = '/bonus-metres/data/actual_distances.csv';
    const IMG_PATH = '/img/';

    // Kick off fetches immediately
    const csvPromise = fetchCSV();

    function getPlayerName() {
      return decodeURIComponent(new URLSearchParams(location.search).get('name') || '').trim();
    }

    async function fetchCSV() {
      const r = await fetch(CSV_URL, { cache: 'no-cache' });
      if (!r.ok) throw new Error('CSV failed: ' + r.status);
      const txt = await r.text();
      const lines = txt.trim().split(/\r?\n/);
      const keys = lines.shift().split(',').map(h => h.trim());
      return lines.map(l => {
        const cols = l.split(',');
        return keys.reduce((o, k, i) => (o[k] = (cols[i] || '').trim(), o), {});
      });
    }

    async function loadImage(src) {
      return new Promise(res => {
        const img = new Image(); img.crossOrigin = 'anonymous';
        img.onload = () => res(img);
        img.onerror = () => {
          const c = document.createElement('canvas'); c.width = c.height = 64;
          c.getContext('2d').fillStyle = '#ccc';
          c.getContext('2d').fillRect(0, 0, 64, 64);
          res(c);
        };
        img.src = src;
      });
    }

    async function drawIcon(name, haloColor, faceSize = 64, halo = haloColor ? 10 : 0) {
      const total = faceSize + halo * 2;
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = total;
      const ctx = canvas.getContext('2d');
      if (haloColor) {
        ctx.fillStyle = haloColor;
        ctx.beginPath();
        ctx.arc(total/2, total/2, faceSize/2 + halo, 0, 2*Math.PI);
        ctx.arc(total/2, total/2, faceSize/2, 0, 2*Math.PI);
        ctx.fill('evenodd');
      }
      const img = await loadImage(`${IMG_PATH}${encodeURIComponent(name.trim())}_cvface1.png`);
      ctx.drawImage(img, halo, halo, faceSize, faceSize);
      return canvas.toDataURL();
    }

    function val(row, col) {
      return parseFloat((row[col] || '0').replace(/,/g, '')) || 0;
    }

    function haloForRank(rank) {
      return rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? '#cd7f32' : null;
    }

    async function build() {
      const name    = getPlayerName();
      const content = document.getElementById('content');

      if (!name || !PEOPLE.includes(name)) {
        document.getElementById('main-spinner').style.display = 'none';
        content.innerHTML = `
          <div class="not-found">
            <h2>Player not found</h2>
            <p>No player named "<strong>${name || '?'}</strong>" exists in the leaderboard.</p>
          </div>`;
        return;
      }

      // Load CSV
      const [data] = await Promise.all([csvPromise]);

      const player = data.find(r => r['NAME'] === name);
      if (!player) {
        document.getElementById('main-spinner').style.display = 'none';
        content.innerHTML = `<div class="not-found"><h2>No data found for ${name}</h2></div>`;
        return;
      }

      // Overall rank by total metres
      const ranked = data
        .filter(r => PEOPLE.includes(r['NAME']) && val(r, 'TOTAL METERS') > 0)
        .sort((a, b) => val(b, 'TOTAL METERS') - val(a, 'TOTAL METERS'));
      let lastVal = null, overallRank = 0;
      ranked.forEach((r, i) => {
        const v = val(r, 'TOTAL METERS');
        if (v !== lastVal) { overallRank = i + 1; lastVal = v; }
        r._overallRank = overallRank;
      });

      // This month rank
      const tmRanked = data
        .filter(r => PEOPLE.includes(r['NAME']) && r['T/M RANK'])
        .sort((a, b) => +a['T/M RANK'] - +b['T/M RANK']);
      let lastTM = null, tmRank = 0;
      tmRanked.forEach((r, i) => {
        const v = +r['T/M RANK'];
        if (v !== lastTM) { tmRank = i + 1; lastTM = v; }
        r._tmRank = tmRank;
      });

      // Last month rank
      const lmRanked = data
        .filter(r => PEOPLE.includes(r['NAME']) && r['L/M RANK'])
        .sort((a, b) => +a['L/M RANK'] - +b['L/M RANK']);
      let lastLM = null, lmRank = 0;
      lmRanked.forEach((r, i) => {
        const v = +r['L/M RANK'];
        if (v !== lastLM) { lmRank = i + 1; lastLM = v; }
        r._lmRank = lmRank;
      });

      const myTM      = val(player, 'THIS MONTH');
      const myLM      = val(player, 'LAST MONTH');
      const myTotal   = val(player, 'TOTAL METERS');
      const myTMRank  = tmRanked.find(r => r['NAME'] === name)?._tmRank  || '-';
      const myLMRank  = lmRanked.find(r => r['NAME'] === name)?._lmRank  || '-';
      const myOverall = ranked.find(r => r['NAME'] === name)?._overallRank || '-';

      // Bonus calculation — £0.03 per metre this month
      const RATE = 0.03;
      const myBonus = (myTM * RATE).toLocaleString('en-GB', { style: 'currency', currency: 'GBP' });

      const tmLeader  = val(tmRanked[0], 'THIS MONTH');
      const lmLeader  = val(lmRanked[0], 'LAST MONTH');
      const totLeader = val(ranked[0],   'TOTAL METERS');

      const tmDiff  = myTM    === tmLeader  ? 'Leader' : `-${(tmLeader  - myTM).toLocaleString()}m`;
      const lmDiff  = myLM    === lmLeader  ? 'Leader' : `-${(lmLeader  - myLM).toLocaleString()}m`;
      const totDiff = myTotal === totLeader ? 'Leader' : `-${(totLeader - myTotal).toLocaleString()}m`;

      // Positional change
      const tmCurrent = +player['T/M RANK'] || 0;
      const tmLast    = +player['T/M LAST RANK'] || 0;
      let changeArrow = '—', changeText = 'No change', changeClass = 'same';
      const placesChanged = tmLast && tmCurrent ? tmLast - tmCurrent : 0;
      if (tmLast && tmCurrent) {
        if      (tmCurrent < tmLast) { changeArrow = '▲'; changeText = `Up ${placesChanged}`; changeClass = 'up'; }
        else if (tmCurrent > tmLast) { changeArrow = '▼'; changeText = `Down ${Math.abs(placesChanged)}`; changeClass = 'down'; }
      }

      // --- Motivational message ---
      const tmGap  = tmLeader  - myTM;
      const lmGap  = lmLeader  - myLM;
      const totGap = totLeader - myTotal;

      let msgText = '', msgEmoji = '', msgClass = 'msg-neutral';

      if (myTotal >= totLeader) {
        // They ARE the overall leader
        msgEmoji = '🏆';
        msgText  = "You're leading the way — everyone else is chasing you!";
        msgClass = 'msg-gold';
      } else if (totGap <= 500) {
        // Within 500m of overall leader
        msgEmoji = '🔥';
        msgText  = "So close! You're right on the overall leader's heels!";
        msgClass = 'msg-positive';
      } else if (myTM >= tmLeader) {
        // Leading this month
        msgEmoji = '⚡';
        msgText  = "You're top of the table this month — brilliant effort!";
        msgClass = 'msg-gold';
      } else if (tmGap < lmGap) {
        // Closing the gap vs leader this month
        msgEmoji = '📈';
        msgText  = "You're closing the gap on the leader — keep pushing!";
        msgClass = 'msg-positive';
      } else if (tmGap > lmGap * 1.2) {
        // Gap growing by more than 20%
        msgEmoji = '⚠️';
        msgText  = "The leader is pulling away — now's the time to push!";
        msgClass = 'msg-warning';
      } else if (placesChanged >= 5) {
        // Big jump up
        msgEmoji = '🚀';
        msgText  = "What a month! You've rocketed up the rankings!";
        msgClass = 'msg-positive';
      } else if (placesChanged > 0) {
        // Moving up
        msgEmoji = '👍';
        msgText  = "Moving in the right direction — nice work!";
        msgClass = 'msg-positive';
      } else if (placesChanged < -2) {
        // Dropped places
        msgEmoji  = '💪';
        msgText   = "Tough month — but there's everything to play for!";
        msgClass  = 'msg-warning';
      } else {
        // Holding steady
        msgEmoji = '🎯';
        msgText  = "You're holding your ground — stay consistent!";
        msgClass = 'msg-neutral';
      }

      // Draw player face
      const playerIcon = await drawIcon(name, null, 64, 0);

      // Render page
      document.getElementById('main-spinner').style.display = 'none';
      content.innerHTML = `
        <div class="hero">
          <div class="hero-face"><img src="${playerIcon}" alt="${name}"></div>
          <div class="hero-info">
            <h1>${name}</h1>
            <div class="subtitle">Bonus Metres – Personal Stats</div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card highlight full-width two-col">
            <div class="two-col-inner">
              <div>
                <div class="label">This Month</div>
                <div class="value">${myTM.toLocaleString()}m</div>
                <div class="sub">Rank #${myTMRank}</div>
              </div>
              <div>
                <div class="label">Last Month</div>
                <div class="value">${myLM.toLocaleString()}m</div>
                <div class="sub">Rank #${myLMRank}</div>
              </div>
            </div>
          </div>
          <div class="stat-card highlight full-width">
            <div class="label">Total Metres</div>
            <div class="value">${myTotal.toLocaleString()}m</div>
            <div class="sub">Overall #${myOverall}</div>
          </div>
          <div class="stat-card full-width two-col">
            <div class="two-col-inner">
              <div>
                <div class="label">vs This Month Leader</div>
                <div class="value">${tmDiff}</div>
              </div>
              <div>
                <div class="label">vs Last Month Leader</div>
                <div class="value">${lmDiff}</div>
              </div>
            </div>
          </div>
          <div class="stat-card full-width">
            <div class="label">vs Overall Leader</div>
            <div class="value">${totDiff}</div>
          </div>
          <div class="stat-card full-width">
            <div class="label">Positional Change This Month</div>
            <div class="value ${changeClass}">${changeArrow} ${changeText}</div>
          </div>
        </div>

        <div class="coin-wrap">
          <div class="coin-stack-container">
            <svg class="coin-stack-svg" id="coinStackSvg" viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="cTop" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#FFE566"/>
                  <stop offset="100%" stop-color="#F9A825"/>
                </linearGradient>
                <linearGradient id="cSide" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#E6900A"/>
                  <stop offset="100%" stop-color="#BF6E00"/>
                </linearGradient>
              </defs>
              <!-- Coins rendered by JS here -->
            </svg>
          </div>
          <div class="coin-info">
            <div class="coin-label">💰 This Month's Bonus</div>
            <div class="coin-amount" id="coinAmount">£0.00</div>
            <div class="coin-sub">${myTM.toLocaleString()}m @ £0.03/m</div>
          </div>
        </div>

        <div class="msg-banner ${msgClass}">
          <span class="msg-emoji">${msgEmoji}</span>
          <span class="msg-text">${msgText}</span>
        </div>

        <div class="race-wrap">
          <div class="spinner-overlay" id="race-spinner"><div class="spinner"></div></div>
          <div id="racetrack"></div>
        </div>
      `;

      await renderRace(name, ranked, data);

      // Coin stack animation
      const bonusRaw   = myTM * 0.03;
      const COIN_VALUE = 15;  // £15 per coin
      const numCoins   = Math.max(1, Math.round(bonusRaw / COIN_VALUE));
      const COIN_H     = 8;   // height of each coin (side + face)
      const COIN_RX    = 34;  // x radius of coin ellipse
      const COIN_RY    = 8;   // y radius of coin ellipse
      const SVG_BOTTOM = 118; // bottom of SVG

      const svg = document.getElementById('coinStackSvg');
      const amountEl = document.getElementById('coinAmount');

      // Update viewBox to fit the stack
      const stackHeight = numCoins * COIN_H + COIN_RY * 2 + 10;
      const svgH = Math.max(40, stackHeight);
      svg.setAttribute('viewBox', `0 0 80 ${svgH}`);

      // Build coins bottom to top, reveal one by one
      const coins = [];
      for (let i = 0; i < numCoins; i++) {
        const bottomY  = svgH - 4 - (i * COIN_H);
        const sideTop  = bottomY - COIN_H;
        const faceY    = sideTop;
        const isTop    = i === numCoins - 1;

        // Side band
        const side = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        side.setAttribute('cx', '40');
        side.setAttribute('cy', String(bottomY));
        side.setAttribute('rx', String(COIN_RX));
        side.setAttribute('ry', String(COIN_RY));
        side.setAttribute('fill', 'url(#cSide)');
        side.style.opacity = '0';

        const band = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        band.setAttribute('x', String(40 - COIN_RX));
        band.setAttribute('y', String(sideTop));
        band.setAttribute('width', String(COIN_RX * 2));
        band.setAttribute('height', String(COIN_H));
        band.setAttribute('fill', 'url(#cSide)');
        band.style.opacity = '0';

        // Face (top ellipse)
        const face = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        face.setAttribute('cx', '40');
        face.setAttribute('cy', String(faceY));
        face.setAttribute('rx', String(COIN_RX));
        face.setAttribute('ry', String(COIN_RY));
        face.setAttribute('fill', 'url(#cTop)');
        face.style.opacity = '0';

        // Ring detail on face
        const ring = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        ring.setAttribute('cx', '40');
        ring.setAttribute('cy', String(faceY));
        ring.setAttribute('rx', String(COIN_RX - 8));
        ring.setAttribute('ry', String(COIN_RY - 2));
        ring.setAttribute('fill', 'none');
        ring.setAttribute('stroke', '#D4880A');
        ring.setAttribute('stroke-width', '0.8');
        ring.style.opacity = '0';

        svg.appendChild(side);
        svg.appendChild(band);
        svg.appendChild(face);
        svg.appendChild(ring);

        // £ sign on top coin only
        if (isTop) {
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', '40');
          label.setAttribute('y', String(faceY + 1));
          label.setAttribute('text-anchor', 'middle');
          label.setAttribute('dominant-baseline', 'central');
          label.setAttribute('font-size', '9');
          label.setAttribute('font-weight', '500');
          label.setAttribute('fill', '#9A5E00');
          label.textContent = '£';
          label.style.opacity = '0';
          svg.appendChild(label);
          coins.push([side, band, face, ring, label]);
        } else {
          coins.push([side, band, face, ring]);
        }
      }

      // Animate coins dropping in one by one
      const DELAY_PER_COIN = Math.min(120, 1400 / numCoins);
      coins.forEach((group, i) => {
        setTimeout(() => {
          group.forEach(el => {
            el.style.transition = 'opacity 0.15s ease';
            el.style.opacity = '1';
          });
        }, 400 + i * DELAY_PER_COIN);
      });

      // Count up amount in sync
      const totalDuration = 400 + numCoins * DELAY_PER_COIN + 200;
      const start = performance.now();
      function countUp(now) {
        const t = Math.min((now - start) / totalDuration, 1);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        amountEl.textContent = (bonusRaw * ease).toLocaleString('en-GB', {
          style: 'currency', currency: 'GBP'
        });
        if (t < 1) requestAnimationFrame(countUp);
      }
      setTimeout(() => requestAnimationFrame(countUp), 400);
    }

    async function renderRace(playerName, ranked, data) {
      document.getElementById('race-spinner').style.display = 'none';

      // Build racers: top 3 + player (deduplicated)
      const top3 = ranked.slice(0, 3);
      const allNames = [...new Set([...top3.map(r => r['NAME']), playerName])];
      const racers = allNames.map(n => {
        const row      = data.find(r => r['NAME'] === n);
        const total    = val(row, 'TOTAL METERS');
        const rank     = ranked.find(r => r['NAME'] === n)?._overallRank || 99;
        const isPlayer = n === playerName;
        const halo     = isPlayer && rank > 3 ? '#1a73e8' : haloForRank(rank);
        return { name: n, total, rank, isPlayer, halo };
      }).sort((a, b) => a.rank - b.rank);

      const leaderTotal = racers[0].total;

      // Layout constants
      const svgW      = 680;
      const PAD_L     = 20;
      const PAD_R     = 20;
      const TRACK_Y   = 120;  // vertical centre of the track
      const FACE_D    = 48;   // face diameter
      const TRACK_H   = 10;
      const trackW    = svgW - PAD_L - PAD_R;
      const svgH      = TRACK_Y + FACE_D / 2 + 40;

      // Draw all icons in parallel
      const icons = await Promise.all(
        racers.map(r => drawIcon(r.name, r.halo, FACE_D, r.halo ? 6 : 0))
      );

      const NS  = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('width', '100%');
      svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
      svg.style.display = 'block';

      // Track background
      const trackBg = document.createElementNS(NS, 'rect');
      trackBg.setAttribute('x', String(PAD_L));
      trackBg.setAttribute('y', String(TRACK_Y - TRACK_H / 2));
      trackBg.setAttribute('width', String(trackW));
      trackBg.setAttribute('height', String(TRACK_H));
      trackBg.setAttribute('rx', String(TRACK_H / 2));
      trackBg.setAttribute('fill', '#e8e8e8');
      svg.appendChild(trackBg);

      // Draw each racer
      racers.forEach((racer, i) => {
        const pct    = leaderTotal > 0 ? racer.total / leaderTotal : 0;
        const xPos   = PAD_L + trackW * pct;
        const faceSize = FACE_D + (racer.halo ? 12 : 0);

        // Progress fill up to this racer (only draw for leader to avoid overlap)
        if (i === 0) {
          const fill = document.createElementNS(NS, 'rect');
          fill.setAttribute('x', String(PAD_L));
          fill.setAttribute('y', String(TRACK_Y - TRACK_H / 2));
          fill.setAttribute('width', '0');
          fill.setAttribute('height', String(TRACK_H));
          fill.setAttribute('rx', String(TRACK_H / 2));
          fill.setAttribute('fill', '#ffe082');
          svg.appendChild(fill);
          setTimeout(() => {
            fill.style.transition = 'width 1.4s cubic-bezier(0.4,0,0.2,1)';
            fill.setAttribute('width', String(trackW * pct));
          }, 200);
        }

        // Label above the face — name and metres
        const shortName = racer.isPlayer && racer.rank > 3
          ? racer.name.split(' ')[0] + ' (You)'
          : racer.name.split(' ')[0] + (racer.name.split(' ')[1] ? ' ' + racer.name.split(' ')[1][0] + '.' : '');

        // Alternating label height to avoid overlap
        const labelY = i % 2 === 0 ? TRACK_Y - faceSize / 2 - 28 : TRACK_Y - faceSize / 2 - 8;

        const nameEl = document.createElementNS(NS, 'text');
        nameEl.setAttribute('x', String(xPos));
        nameEl.setAttribute('y', String(labelY));
        nameEl.setAttribute('text-anchor', 'middle');
        nameEl.setAttribute('font-size', '11');
        nameEl.setAttribute('font-weight', '500');
        nameEl.setAttribute('fill', '#333');
        nameEl.style.opacity = '0';
        nameEl.textContent = shortName;
        svg.appendChild(nameEl);

        const metresEl = document.createElementNS(NS, 'text');
        metresEl.setAttribute('x', String(xPos));
        metresEl.setAttribute('y', String(labelY + 14));
        metresEl.setAttribute('text-anchor', 'middle');
        metresEl.setAttribute('font-size', '10');
        metresEl.setAttribute('fill', '#888');
        metresEl.style.opacity = '0';
        metresEl.textContent = `${Math.round(racer.total).toLocaleString()}m`;
        svg.appendChild(metresEl);

        // Tick mark on track
        const tick = document.createElementNS(NS, 'line');
        tick.setAttribute('x1', String(xPos));
        tick.setAttribute('y1', String(TRACK_Y - TRACK_H / 2 - 2));
        tick.setAttribute('x2', String(xPos));
        tick.setAttribute('y2', String(TRACK_Y + TRACK_H / 2 + 2));
        tick.setAttribute('stroke', racer.isPlayer && racer.rank > 3 ? '#1a73e8' : '#f9a825');
        tick.setAttribute('stroke-width', '2');
        svg.appendChild(tick);

        // Face — starts off-screen left, slides to position
        const faceGroup = document.createElementNS(NS, 'g');
        faceGroup.setAttribute('transform',
          `translate(${PAD_L - faceSize / 2}, ${TRACK_Y - faceSize / 2})`);
        faceGroup.style.transition = `transform 1.4s cubic-bezier(0.4,0,0.2,1)`;

        const faceImg = document.createElementNS(NS, 'image');
        faceImg.setAttribute('href', icons[i]);
        faceImg.setAttribute('width', String(faceSize));
        faceImg.setAttribute('height', String(faceSize));
        faceGroup.appendChild(faceImg);
        svg.appendChild(faceGroup);

        // Animate face and labels
        setTimeout(() => {
          faceGroup.setAttribute('transform',
            `translate(${xPos - faceSize / 2}, ${TRACK_Y - faceSize / 2})`);
          nameEl.style.transition   = 'opacity 0.4s ease';
          metresEl.style.transition = 'opacity 0.4s ease';
          nameEl.style.opacity   = '1';
          metresEl.style.opacity = '1';
        }, 200 + i * 100);
      });

      document.getElementById('racetrack').appendChild(svg);
    }

    build().catch(e => {
      console.error(e);
      document.getElementById('main-spinner').style.display = 'none';
      document.getElementById('content').innerHTML =
        `<div class="error">Error loading stats. Please try again.</div>`;
    });
  </script>
</body>
</html>
