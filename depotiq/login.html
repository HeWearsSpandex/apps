<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DepotIQ — Sign In</title>
  <link rel="stylesheet" href="depotiq.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 24px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-brand img {
      height: 48px;
      margin-bottom: 12px;
    }

    .login-brand-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .login-brand-name span { color: var(--red); }

    .login-brand-sub {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .login-card {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-top: 3px solid var(--red);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow-md);
    }

    .login-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    .login-error {
      background: var(--red-light);
      border: 1px solid #ffcccc;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }

    .btn-login {
      width: 100%;
      justify-content: center;
      padding: 11px;
      font-size: 14px;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <img src="/img/JHB Logo.png" alt="JHB" onerror="this.style.display='none'">
      <div class="login-brand-name">Depot<span>IQ</span></div>
      <div class="login-brand-sub">Stock Intelligence</div>
    </div>

    <div class="login-card">
      <div class="login-title">Sign In</div>

      <div class="login-error" id="loginError"></div>

      <button class="btn btn-primary btn-login" id="loginBtn">
        <img src="https://authjs.dev/img/providers/microsoft-entra-id.svg" style="height:18px;vertical-align:middle;margin-right:8px;">
        Sign in with Microsoft
      </button>

      <div style="margin-top:16px;font-size:12px;color:var(--text-muted);text-align:center;" id="loginMsg"></div>
    </div>

    <div class="login-footer">
      JHB Line Marking &nbsp;·&nbsp; DepotIQ v1.0
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      DEPOTIQ_CONFIG.SUPABASE_URL,
      DEPOTIQ_CONFIG.SUPABASE_ANON_KEY
    );

    // Handle OAuth callback — extract tokens from URL hash
    if (location.hash && location.hash.includes('access_token')) {
      const params       = new URLSearchParams(location.hash.replace('#', ''));
      const accessToken  = params.get('access_token');
      const refreshToken = params.get('refresh_token');

      if (accessToken) {
        await supabase.auth.setSession({
          access_token:  accessToken,
          refresh_token: refreshToken,
        });
        window.location.href = 'index.html';
      }
    }

    // Redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'index.html';

    const loginBtn = document.getElementById('loginBtn');
    const loginMsg = document.getElementById('loginMsg');
    const errorEl  = document.getElementById('loginError');

    loginBtn.addEventListener('click', async () => {
      loginBtn.disabled    = true;
      loginBtn.textContent = 'Redirecting…';

      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'azure',
        options: {
          scopes:     'email',
          redirectTo: 'https://apps-nu-sand.vercel.app/depotiq/index.html',
        }
      });

      if (error) {
        errorEl.textContent   = error.message;
        errorEl.style.display = 'block';
        loginBtn.disabled     = false;
        loginBtn.innerHTML    = '<img src="https://authjs.dev/img/providers/microsoft-entra-id.svg" style="height:18px;vertical-align:middle;margin-right:8px;"> Sign in with Microsoft';
      }
    });
  </script>

  <script src="config.js"></script>
</body>
</html>
