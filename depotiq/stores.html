<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DepotIQ — Stores & Vehicles</title>
  <link rel="stylesheet" href="depotiq.css">
  <style>
    .asset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .asset-card {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow var(--transition);
    }
    .asset-card:hover { box-shadow: var(--shadow-md); }

    .asset-card-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .asset-card-header.vehicle { border-top: 3px solid var(--blue); }
    .asset-card-header.store   { border-top: 3px solid var(--red); }

    .asset-type-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 10px;
    }
    .asset-type-badge.store   { background: var(--red-light);  color: var(--red); }
    .asset-type-badge.vehicle { background: var(--blue-light); color: var(--blue); }

    .asset-card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .asset-card-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .asset-card-body { padding: 14px 18px; }

    .asset-stat-row {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }

    .asset-stat-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
    }
    .asset-stat-value.blue { color: var(--blue); }

    .asset-stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 2px;
    }

    .asset-items-list { margin-top: 8px; }

    .asset-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 12px;
    }
    .asset-item-row:last-child { border-bottom: none; }
    .asset-item-name  { color: var(--text); font-weight: 600; }
    .asset-item-qty   { color: var(--text-dim); }
    .asset-item-qty.low { color: var(--red); font-weight: 700; }

    .asset-card-footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      margin-top: 24px;
    }

    .section-header:first-child { margin-top: 0; }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .reg-plate {
      display: inline-block;
      background: #fff7d6;
      border: 1px solid #e6c800;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #333;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="/img/JHB Logo.png" alt="JHB" onerror="this.style.display='none'">
      <span class="sidebar-logo-text">Depot<span>IQ</span></span>
      <button class="sidebar-toggle" id="sidebarToggle">‹</button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="index.html"        class="nav-item" data-label="Dashboard"><span class="icon">⬛</span><span class="nav-label-text">Dashboard</span></a>
      <a href="deliveries.html"   class="nav-item" data-label="Deliveries"><span class="icon">🚚</span><span class="nav-label-text">Deliveries</span></a>
      <a href="stock-takes.html"  class="nav-item" data-label="Stock Takes"><span class="icon">📋</span><span class="nav-label-text">Stock Takes</span></a>
      <a href="orders.html"       class="nav-item" data-label="Orders"><span class="icon">📦</span><span class="nav-label-text">Orders</span></a>
      <div class="nav-section">Manage</div>
      <a href="stock-levels.html" class="nav-item" data-label="Stock Levels"><span class="icon">📈</span><span class="nav-label-text">Stock Levels</span></a>
      <a href="stock-items.html"  class="nav-item" data-label="Stock Items"><span class="icon">🗂</span><span class="nav-label-text">Stock Items</span></a>
      <a href="stores.html"       class="nav-item active" data-label="Stores & Vehicles"><span class="icon">🏪</span><span class="nav-label-text">Stores & Vehicles</span></a>
      <a href="reports.html"      class="nav-item" data-label="Reports"><span class="icon">📊</span><span class="nav-label-text">Reports</span></a>
      <div class="nav-section">System</div>
      <a href="settings.html"     class="nav-item" data-label="Settings"><span class="icon">⚙️</span><span class="nav-label-text">Settings</span></a>
      <a href="tv.html"           class="nav-item" data-label="TV Display" target="_blank"><span class="icon">📺</span><span class="nav-label-text">TV Display</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="userAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">Loading…</div>
          <div class="sidebar-user-role" id="userRole">—</div>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Sign out">⏻</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="page-body">

      <div class="page-header-row">
        <div>
          <div class="page-title">Stores & Vehicles</div>
          <div class="page-subtitle">Manage storage containers and fleet vehicles</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:400;text-transform:none;letter-spacing:0;cursor:pointer;color:var(--text-dim);">
            <input type="checkbox" id="showInactive"> Show inactive
          </label>
          <button class="btn btn-ghost" id="addVehicleBtn">+ Add Vehicle</button>
          <button class="btn btn-primary" id="addStoreBtn">+ Add Store</button>
        </div>
      </div>

      <!-- Stores section -->
      <div class="section-header">
        <div class="section-title">
          🏪 Stores <span class="section-count" id="storeCount"></span>
        </div>
      </div>
      <div id="storesGrid" class="asset-grid">
        <div class="loading-spinner" style="grid-column:1/-1;"><div class="spinner"></div> Loading…</div>
      </div>

      <!-- Vehicles section -->
      <div class="section-header">
        <div class="section-title">
          🚛 Vehicles <span class="section-count" id="vehicleCount"></span>
        </div>
      </div>
      <div id="vehiclesGrid" class="asset-grid">
        <div class="loading-spinner" style="grid-column:1/-1;"><div class="spinner"></div> Loading…</div>
      </div>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="assetModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Add Store</div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="assetId">
        <input type="hidden" id="assetType">

        <div class="form-group">
          <label for="assetName" id="nameLabel">Store Name *</label>
          <input type="text" id="assetName" placeholder="e.g. Container A">
        </div>

        <div class="form-group" id="registrationGroup" style="display:none;">
          <label for="assetReg">Registration Plate *</label>
          <input type="text" id="assetReg" placeholder="e.g. AB12 CDE" style="text-transform:uppercase;">
        </div>

        <div class="form-group">
          <label for="assetDescription">Description</label>
          <textarea id="assetDescription" rows="2" placeholder="Optional description"></textarea>
        </div>

        <div class="form-group" id="activeToggleGroup" style="display:none;">
          <label>Status</label>
          <div style="display:flex;gap:10px;margin-top:4px;">
            <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-size:13px;font-weight:400;letter-spacing:0;cursor:pointer;">
              <input type="radio" name="assetActive" value="true" id="activeYes"> Active
            </label>
            <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-size:13px;font-weight:400;letter-spacing:0;cursor:pointer;">
              <input type="radio" name="assetActive" value="false" id="activeNo"> Inactive
            </label>
          </div>
        </div>

        <div id="modalError" style="display:none;background:var(--red-light);border:1px solid #ffcccc;border-radius:var(--radius);padding:10px 12px;font-size:13px;color:var(--red);margin-top:8px;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalCancel">Cancel</button>
        <button class="btn btn-primary" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm modal -->
  <div class="modal-overlay" id="confirmModal" style="display:none;">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <div class="modal-title" id="confirmTitle">Confirm</div>
        <button class="modal-close" id="confirmClose">✕</button>
      </div>
      <div class="modal-body">
        <p id="confirmText" style="font-size:13px;line-height:1.6;color:var(--text-dim);"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
        <button class="btn" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(DEPOTIQ_CONFIG.SUPABASE_URL, DEPOTIQ_CONFIG.SUPABASE_ANON_KEY);

    // ── Auth ──────────────────────────────────────────────
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; }

    const { data: profile } = await supabase
      .from('depotiq_user_profiles').select('full_name,role').eq('id', session.user.id).single();
    const displayName = profile?.full_name || session.user.email.split('@')[0];
    document.getElementById('userName').textContent   = displayName;
    document.getElementById('userRole').textContent   = profile?.role || 'user';
    document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();

    // ── Sidebar ───────────────────────────────────────────
    const sidebar = document.getElementById('sidebar');
    const mainEl  = document.getElementById('main');
    if (localStorage.getItem('depotiq_sidebar_collapsed') === 'true') {
      sidebar.classList.add('collapsed'); mainEl.classList.add('collapsed');
    }
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      const c = sidebar.classList.toggle('collapsed');
      mainEl.classList.toggle('collapsed', c);
      localStorage.setItem('depotiq_sidebar_collapsed', c);
    });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut(); window.location.href = 'login.html';
    });

    // ── State ─────────────────────────────────────────────
    let allAssets    = [];
    let stockByAsset = {};
    let showInactive = false;

    // ── Toast ─────────────────────────────────────────────
    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    // ── Load assets ───────────────────────────────────────
    async function loadAssets() {
      const [assetsRes, stockRes] = await Promise.all([
        supabase.from('depotiq_stores').select('*').order('asset_type').order('name'),
        supabase.from('depotiq_stock_levels').select('store_id, stock_item_id, item_name, current_quantity, unit_of_measure, minimum_threshold')
      ]);

      if (assetsRes.error) { toast('Failed to load assets', 'error'); return; }
      allAssets = assetsRes.data || [];

      stockByAsset = {};
      (stockRes.data || []).forEach(r => {
        if (!stockByAsset[r.store_id]) stockByAsset[r.store_id] = [];
        stockByAsset[r.store_id].push(r);
      });

      renderAssets();
    }

    function renderAssets() {
      const assets   = showInactive ? allAssets : allAssets.filter(a => a.is_active);
      const stores   = assets.filter(a => a.asset_type === 'store');
      const vehicles = assets.filter(a => a.asset_type === 'vehicle');

      document.getElementById('storeCount').textContent   = `(${stores.length})`;
      document.getElementById('vehicleCount').textContent = `(${vehicles.length})`;

      renderGrid('storesGrid',   stores,   'store');
      renderGrid('vehiclesGrid', vehicles, 'vehicle');
    }

    function renderGrid(gridId, assets, type) {
      const grid = document.getElementById(gridId);

      if (!assets.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-state-icon">${type === 'store' ? '🏪' : '🚛'}</div>
          <div class="empty-state-text">No ${type === 'store' ? 'stores' : 'vehicles'} configured yet</div>
        </div>`;
        return;
      }

      grid.innerHTML = assets.map(asset => {
        const items    = stockByAsset[asset.id] || [];
        const inStock  = items.filter(i => parseFloat(i.current_quantity) > 0);
        const lowCount = items.filter(i => parseFloat(i.current_quantity) <= parseFloat(i.minimum_threshold) && parseFloat(i.minimum_threshold) > 0).length;
        const topItems = inStock.sort((a,b) => b.current_quantity - a.current_quantity).slice(0, 5);

        const itemsHtml = topItems.length
          ? topItems.map(i => {
              const qty = parseFloat(i.current_quantity);
              const low = parseFloat(i.minimum_threshold) > 0 && qty <= parseFloat(i.minimum_threshold);
              return `
                <div class="asset-item-row">
                  <span class="asset-item-name">${i.item_name}</span>
                  <span class="asset-item-qty ${low ? 'low' : ''}">
                    ${qty % 1 === 0 ? qty : qty.toFixed(2)} ${i.unit_of_measure}${low ? ' ⚠' : ''}
                  </span>
                </div>`;
            }).join('') +
            (inStock.length > 5 ? `<div style="font-size:11px;color:var(--text-muted);padding:5px 0;">+ ${inStock.length - 5} more items</div>` : '')
          : `<div style="font-size:12px;color:var(--text-muted);padding:6px 0;">No stock recorded</div>`;

        return `
          <div class="asset-card" style="${!asset.is_active ? 'opacity:0.6;' : ''}">
            <div class="asset-card-header ${type}">
              <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                  <span class="asset-type-badge ${type}">${type === 'store' ? 'Store' : 'Vehicle'}</span>
                  ${!asset.is_active ? '<span class="badge badge-neutral">Inactive</span>' : ''}
                </div>
                <div class="asset-card-name">${asset.name}</div>
                ${asset.asset_type === 'vehicle' && asset.registration
                  ? `<div class="asset-card-sub"><span class="reg-plate">${asset.registration}</span></div>`
                  : asset.description ? `<div class="asset-card-sub">${asset.description}</div>` : ''}
              </div>
            </div>
            <div class="asset-card-body">
              <div class="asset-stat-row">
                <div>
                  <div class="asset-stat-value ${type === 'vehicle' ? 'blue' : ''}">${inStock.length}</div>
                  <div class="asset-stat-label">Items in stock</div>
                </div>
                ${lowCount > 0 ? `
                  <div>
                    <div class="asset-stat-value" style="color:var(--red);">${lowCount}</div>
                    <div class="asset-stat-label">Low / empty</div>
                  </div>` : ''}
              </div>
              <div class="asset-items-list">${itemsHtml}</div>
            </div>
            <div class="asset-card-footer">
              <span style="font-size:11px;color:var(--text-muted);">
                Added ${new Date(asset.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}
              </span>
              <div style="display:flex;gap:6px;">
                <button class="btn btn-ghost btn-sm" onclick="openEditModal('${asset.id}')">Edit</button>
                <button class="btn btn-ghost btn-sm"
                  onclick="confirmToggle('${asset.id}','${asset.name}',${asset.is_active})"
                  style="${asset.is_active ? 'color:var(--red);' : 'color:var(--green);'}">
                  ${asset.is_active ? 'Retire' : 'Activate'}
                </button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Show inactive toggle ──────────────────────────────
    document.getElementById('showInactive').addEventListener('change', e => {
      showInactive = e.target.checked;
      renderAssets();
    });

    // ── Modal helpers ─────────────────────────────────────
    function openModal(type) {
      const isVehicle = type === 'vehicle';
      document.getElementById('nameLabel').textContent         = isVehicle ? 'Vehicle Name *' : 'Store Name *';
      document.getElementById('assetName').placeholder         = isVehicle ? 'e.g. Van 1 — Wayne' : 'e.g. Container A';
      document.getElementById('assetType').value               = type;
      document.getElementById('registrationGroup').style.display = isVehicle ? 'block' : 'none';
      document.getElementById('assetModal').style.display      = 'flex';
    }

    function closeModal() {
      document.getElementById('assetModal').style.display      = 'none';
      document.getElementById('modalError').style.display      = 'none';
      document.getElementById('assetId').value                 = '';
      document.getElementById('assetName').value               = '';
      document.getElementById('assetReg').value                = '';
      document.getElementById('assetDescription').value        = '';
      document.getElementById('activeToggleGroup').style.display = 'none';
    }

    function showModalError(msg) {
      const el = document.getElementById('modalError');
      el.textContent = msg; el.style.display = 'block';
    }

    document.getElementById('addStoreBtn').addEventListener('click', () => {
      document.getElementById('modalTitle').textContent = 'Add Store';
      closeModal(); openModal('store');
    });

    document.getElementById('addVehicleBtn').addEventListener('click', () => {
      document.getElementById('modalTitle').textContent = 'Add Vehicle';
      closeModal(); openModal('vehicle');
    });

    window.openEditModal = (id) => {
      const asset = allAssets.find(a => a.id === id);
      if (!asset) return;
      const isVehicle = asset.asset_type === 'vehicle';

      document.getElementById('modalTitle').textContent = isVehicle ? 'Edit Vehicle' : 'Edit Store';
      document.getElementById('assetId').value          = asset.id;
      document.getElementById('assetName').value        = asset.name;
      document.getElementById('assetReg').value         = asset.registration || '';
      document.getElementById('assetDescription').value = asset.description || '';
      document.getElementById('activeToggleGroup').style.display = 'block';
      document.getElementById(asset.is_active ? 'activeYes' : 'activeNo').checked = true;

      openModal(asset.asset_type);
    };

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('assetModal').addEventListener('click', e => {
      if (e.target === document.getElementById('assetModal')) closeModal();
    });

    document.getElementById('modalSave').addEventListener('click', async () => {
      const id          = document.getElementById('assetId').value;
      const type        = document.getElementById('assetType').value;
      const name        = document.getElementById('assetName').value.trim();
      const reg         = document.getElementById('assetReg').value.trim().toUpperCase();
      const description = document.getElementById('assetDescription').value.trim();
      const isActive    = id ? document.querySelector('input[name="assetActive"]:checked')?.value !== 'false' : true;

      if (!name) return showModalError(`${type === 'vehicle' ? 'Vehicle' : 'Store'} name is required`);
      if (type === 'vehicle' && !id && !reg) return showModalError('Registration plate is required');

      document.getElementById('modalSave').textContent = 'Saving…';
      document.getElementById('modalSave').disabled    = true;

      const payload = {
        name, description: description || null,
        asset_type: type, is_active: isActive,
        registration: reg || null,
      };

      const { error } = id
        ? await supabase.from('depotiq_stores').update(payload).eq('id', id)
        : await supabase.from('depotiq_stores').insert(payload);

      document.getElementById('modalSave').textContent = 'Save';
      document.getElementById('modalSave').disabled    = false;

      if (error) { showModalError(error.message); return; }

      toast(id ? `${type === 'vehicle' ? 'Vehicle' : 'Store'} updated` : `${type === 'vehicle' ? 'Vehicle' : 'Store'} added`);
      closeModal();
      loadAssets();
    });

    // ── Activate / Retire ─────────────────────────────────
    window.confirmToggle = (id, name, isActive) => {
      const asset   = allAssets.find(a => a.id === id);
      const typeStr = asset?.asset_type === 'vehicle' ? 'Vehicle' : 'Store';
      document.getElementById('confirmTitle').textContent = isActive ? `Retire ${typeStr}` : `Activate ${typeStr}`;
      document.getElementById('confirmText').innerHTML   = isActive
        ? `Retire <strong>${name}</strong>? It will no longer appear in delivery or stock take screens.`
        : `Reactivate <strong>${name}</strong>?`;
      const okBtn = document.getElementById('confirmOk');
      okBtn.style.background = isActive ? 'var(--red)' : 'var(--green)';
      okBtn.style.color      = '#fff';
      okBtn.textContent      = isActive ? 'Retire' : 'Activate';
      okBtn.onclick = async () => {
        const { error } = await supabase.from('depotiq_stores').update({ is_active: !isActive }).eq('id', id);
        if (error) toast(error.message, 'error');
        else { toast(isActive ? `${typeStr} retired` : `${typeStr} activated`); loadAssets(); }
        document.getElementById('confirmModal').style.display = 'none';
      };
      document.getElementById('confirmModal').style.display = 'flex';
    };

    document.getElementById('confirmClose').addEventListener('click',  () => document.getElementById('confirmModal').style.display = 'none');
    document.getElementById('confirmCancel').addEventListener('click', () => document.getElementById('confirmModal').style.display = 'none');

    // ── Init ──────────────────────────────────────────────
    loadAssets();
  </script>
</body>
</html>
